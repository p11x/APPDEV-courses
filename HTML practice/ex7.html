<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marquee Line Control</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">


<style>
  .row {
    white-space: nowrap;
    width: 100%;
  }
  marquee {
    display: inline-block;
    width: 20%;
    height: 80px;
    line-height: 80px;
    font-size: 80px;
  }
</style>

<script>
  function stopLine(rowId) {
    let mqs = document.querySelectorAll("#" + rowId + " marquee");
    mqs.forEach(m => m.stop());
  }

  function startLine(rowId) {
    let mqs = document.querySelectorAll("#" + rowId + " marquee");
    mqs.forEach(m => m.start());
  }
</script>

</head>
<body>

<div class="row" id="leftRow"
     onmouseover="stopLine('leftRow')"
     onmouseout="startLine('leftRow')">

  <marquee direction="left" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="left" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="left" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="left" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="left" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>


</div>

<br><br>

<div class="row" id="rightRow"
     onmouseover="stopLine('rightRow')"
     onmouseout="startLine('rightRow')">

  <marquee direction="right" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="right" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="right" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="right" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="right" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>

</div>
<br><br>

<div class="row" id="leftRow2"
     onmouseover="stopLine('leftRow2')"
     onmouseout="startLine('leftRow2')">

  <marquee direction="left" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="left" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="left" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="left" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="left" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>


</div>

<br><br>

<div class="row" id="rightRow2"
     onmouseover="stopLine('rightRow2')"
     onmouseout="startLine('rightRow2')">

  <marquee direction="right" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="right" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="right" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="right" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>
  <marquee direction="right" scrollamount="12"><i class="fa-sharp fa-solid fa-address-card"></i></marquee>

</div>

</body>
</html>
