<!DOCTYPE html>
<html>
<head>
    <title>Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
     }

        .field {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            margin-bottom: 4px;
        }

        input, select {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: rgb(10, 113, 232);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <h3>Details form:</h3>
    <br>

    <form>

        <div class="row">
            <div class="field">
            <label>Door Number </label>
            <input type="text" name="door">
            </div>

            <div class="field">
            <label>Street Name </label>
            <input type="text" name="street">
            </div>

            <div class="field">
            <label>Area Name </label>
            <input type="text" name="area">
            </div>

            <div class="field">
            <label>District Name </label>
            <input type="text" name="district">
            </div>
        </div>

        <div class="row">
            <div class="field">
            <label>Pin Code </label>
            <input type="text" name="pincode">
            </div>

            <div class="field">
            <label>Country </label>
            <select name="country">
                <option value="">Select Country</option>
                <option>India</option>
                <option>USA</option>
            </select>
            </div>

            <div class="field">
            <label>State </label>
            <select name="state">
                <option value="">Select State</option>
            </select>
            </div>

            <div class="field">
            <label>City </label>
            <select name="city">
                <option value="">Select City</option>
            </select>
            </div>
        </div>

        <button type="submit">➕ Add Employee</button>

    </form>

</body>
</html>
