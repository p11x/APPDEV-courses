<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Bootstrap CSS: Include Bootstrap 5.3.2 from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    
    <!-- Bootstrap Container:
         Properties:
         - .container: Provides a responsive fixed-width container
         - Centers content horizontally with auto margins
         - Max-width adjusts based on viewport breakpoint -->
    <div class="container">
        
        <!-- Bootstrap Heading: .text-primary applies primary brand color (blue) -->
        <h1 class="text-primary">Bootstrap Heading</h1>
        
        <!-- Bootstrap Typography: .lead class makes paragraph stand out with larger font size -->
        <p class="lead">This paragraph stands out using the Bootstrap .lead class for emphasis.</p>
        
        <!-- Bootstrap Button:
             - .btn: Button base class
             - .btn-primary: Primary color button (blue) -->
        <button class="btn btn-primary">Bootstrap Button</button>
    </div>

    <!-- Bootstrap JavaScript Bundle: Required for interactive components -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
