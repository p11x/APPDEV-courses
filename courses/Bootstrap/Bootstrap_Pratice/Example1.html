<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Example</title>
    <!-- Bootstrap CSS: Include Bootstrap 5.3.2 from CDN for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Bootstrap Container: Provides a responsive fixed-width container
        Properties:
        - .container: Fixed width container that centers content
        - .mt-4: Margin top utility (1rem / 16px) spacing between top and content -->
    <div class="container mt-4">
        <!-- Bootstrap Heading: .text-primary applies the primary brand color (blue) -->
        <h1 class="text-primary">Bootstrap Heading</h1>
        
        <!-- Bootstrap Typography: .lead class makes paragraph stand out with larger font size and lighter weight -->
        <p class="lead">This paragraph stands out using the Bootstrap .lead class for emphasis.</p>
        
        <!-- Bootstrap Button: 
            - .btn: Bootstrap button base class
            - .btn-primary: Bootstrap button with primary brand color (blue) -->
        <button class="btn btn-primary">Bootstrap Button</button>
    </div>

    <!-- Bootstrap JavaScript: Include Bootstrap JS bundle (includes Popper)
         Required for interactive components like modals, tooltips, dropdowns -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
