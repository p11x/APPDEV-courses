<!DOCTYPE html>
<!-- ============================================================= -->
<!-- 06_04_01: React Bootstrap Integration                          -->
<!-- Demonstrates React Bootstrap patterns, JSX rendering, hooks,  -->
<!-- react-bootstrap component library usage, and state management -->
<!-- ============================================================= -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport meta tag ensures proper scaling on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Bootstrap Integration</title>
    <!-- Bootstrap 5.3.3 CSS CDN for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- React and ReactDOM CDN for client-side rendering -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel standalone for JSX transformation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-light">
    <!-- ============================================================= -->
    <!-- React mount point: React will render components into this div -->
    <!-- ============================================================= -->
    <div id="root"></div>

    <!-- ============================================================= -->
    <!-- React Bootstrap Integration Patterns                          -->
    <!-- Key concepts:                                                -->
    // 1. JSX syntax compiles to React.createElement calls           -->
    <!-- 2. Hooks (useState, useEffect) manage component state        -->
    <!-- 3. react-bootstrap maps Bootstrap components to React        -->
    <!-- 4. Virtual DOM enables efficient re-rendering                -->
    <!-- ============================================================= -->
    <script type="text/babel">
        <!-- ============================================================= -->
        <!-- Destructure React hooks for state and lifecycle management   -->
        <!-- useState: manages local component state                      -->
        <!-- useEffect: handles side effects (API calls, subscriptions)   -->
        <!-- ============================================================= -->
        const { useState, useEffect, useCallback, useMemo } = React;

        <!-- ============================================================= -->
        <!-- AlertBanner Component                                        -->
        <!-- Demonstrates: Bootstrap alert classes, conditional rendering, -->
        <!-- dynamic className based on state (dismissible alerts)         -->
        <!-- ============================================================= -->
        function AlertBanner({ type, message, dismissible = true }) {
            <!-- State hook controls visibility of the alert -->
            const [visible, setVisible] = useState(true);

            <!-- Early return if alert is dismissed -->
            if (!visible) return null;

            <!-- Dynamically build Bootstrap alert classes based on props -->
            <!-- alert-{type} maps to Bootstrap color variants            -->
            <!-- alert-dismissible adds close button styling              -->
            const alertClasses = `alert alert-${type} ${dismissible ? 'alert-dismissible fade show' : ''}`;

            return (
                <div className={alertClasses} role="alert">
                    <!-- Slot message content via props -->
                    {message}
                    <!-- Dismissible close button using Bootstrap data attributes -->
                    {dismissible && (
                        <button
                            type="button"
                            className="btn-close"
                            aria-label="Close"
                            onClick={() => setVisible(false)}
                        ></button>
                    )}
                </div>
            );
        }

        <!-- ============================================================= -->
        <!-- Counter Component                                            -->
        <!-- Demonstrates: useState hook, event handlers, Bootstrap       -->
        <!-- buttons, badges, and responsive layout with container/row/col -->
        <!-- ============================================================= -->
        function Counter() {
            <!-- useState returns [currentValue, setterFunction] -->
            const [count, setCount] = useState(0);

            <!-- useCallback memoizes functions to prevent unnecessary re-renders -->
            const increment = useCallback(() => setCount(prev => prev + 1), []);
            const decrement = useCallback(() => setCount(prev => prev - 1), []);
            const reset = useCallback(() => setCount(0), []);

            <!-- useMemo computes derived state efficiently -->
            const badgeVariant = useMemo(() => {
                if (count > 0) return 'success';   <!-- Positive: green badge -->
                if (count < 0) return 'danger';    <!-- Negative: red badge -->
                return 'secondary';                 <!-- Zero: gray badge -->
            }, [count]);

            return (
                <!-- Bootstrap card component with shadow -->
                <div className="card shadow-sm mb-4">
                    <div className="card-header bg-primary text-white">
                        <h5 className="mb-0">React Counter with Hooks</h5>
                    </div>
                    <div className="card-body text-center">
                        <!-- Bootstrap badge displays current count with dynamic variant -->
                        <p className="display-4 mb-3">
                            Count: <span className={`badge bg-${badgeVariant}`}>{count}</span>
                        </p>
                        <!-- Bootstrap button group for layout -->
                        <div className="btn-group" role="group">
                            <button className="btn btn-outline-danger" onClick={decrement}>
                                - Decrement
                            </button>
                            <button className="btn btn-outline-secondary" onClick={reset}>
                                Reset
                            </button>
                            <button className="btn btn-outline-success" onClick={increment}>
                                + Increment
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        <!-- ============================================================= -->
        <!-- TodoList Component                                           -->
        <!-- Demonstrates: controlled inputs, list rendering with keys,   -->
        <!-- Bootstrap form groups, list groups, and dynamic class binding -->
        <!-- ============================================================= -->
        function TodoList() {
            <!-- Array state for todo items with unique IDs -->
            const [todos, setTodos] = useState([
                { id: 1, text: 'Learn React Hooks', completed: false },
                { id: 2, text: 'Master Bootstrap 5', completed: true },
                { id: 3, text: 'Build React-Bootstrap app', completed: false },
            ]);
            <!-- Controlled input state -->
            const [newTodo, setNewTodo] = useState('');

            <!-- Add new todo item to the list -->
            const addTodo = (e) => {
                e.preventDefault(); <!-- Prevent form submission page reload -->
                if (!newTodo.trim()) return;
                setTodos(prev => [
                    ...prev, <!-- Spread existing items -->
                    { id: Date.now(), text: newTodo, completed: false }
                ]);
                setNewTodo(''); <!-- Clear input after adding -->
            };

            <!-- Toggle todo completion status using immutable update -->
            const toggleTodo = (id) => {
                setTodos(prev =>
                    prev.map(todo =>
                        todo.id === id ? { ...todo, completed: !todo.completed } : todo
                    )
                );
            };

            <!-- Remove todo by filtering it out -->
            const removeTodo = (id) => {
                setTodos(prev => prev.filter(todo => todo.id !== id));
            };

            return (
                <div className="card shadow-sm mb-4">
                    <div className="card-header bg-success text-white">
                        <h5 className="mb-0">React Todo List (useState)</h5>
                    </div>
                    <div className="card-body">
                        <!-- Bootstrap form with inline submit handler -->
                        <form onSubmit={addTodo} className="mb-3">
                            <div className="input-group">
                                <!-- Controlled input bound to state -->
                                <input
                                    type="text"
                                    className="form-control"
                                    placeholder="Add a new todo..."
                                    value={newTodo}
                                    onChange={(e) => setNewTodo(e.target.value)}
                                />
                                <button className="btn btn-success" type="submit">
                                    Add Todo
                                </button>
                            </div>
                        </form>
                        <!-- Bootstrap list group for todo items -->
                        <ul className="list-group">
                            <!-- Map over todos array, key prop required for React reconciliation -->
                            {todos.map(todo => (
                                <li
                                    key={todo.id}
                                    <!-- Dynamic classes based on completion state -->
                                    className={`list-group-item d-flex justify-content-between align-items-center ${todo.completed ? 'list-group-item-success' : ''}`}
                                >
                                    <span
                                        <!-- Toggle on click, apply strikethrough if completed -->
                                        style={{ textDecoration: todo.completed ? 'line-through' : 'none', cursor: 'pointer' }}
                                        onClick={() => toggleTodo(todo.id)}
                                    >
                                        {todo.text}
                                    </span>
                                    <!-- Remove button with Bootstrap styling -->
                                    <button
                                        className="btn btn-sm btn-outline-danger"
                                        onClick={() => removeTodo(todo.id)}
                                    >
                                        Remove
                                    </button>
                                </li>
                            ))}
                        </ul>
                    </div>
                </div>
            );
        }

        <!-- ============================================================= -->
        <!-- DataFetcher Component                                        -->
        <!-- Demonstrates: useEffect for API calls, loading states,       -->
        <!-- error handling, Bootstrap spinners and cards                 -->
        <!-- ============================================================= -->
        function DataFetcher() {
            <!-- Separate state slices for data, loading, and errors -->
            const [users, setUsers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            <!-- useEffect runs after component mounts (empty dependency array) -->
            useEffect(() => {
                <!-- Async function inside useEffect for data fetching -->
                const fetchUsers = async () => {
                    try {
                        setLoading(true);
                        <!-- Fetch from JSONPlaceholder mock API -->
                        const response = await fetch('https://jsonplaceholder.typicode.com/users');
                        if (!response.ok) throw new Error('Failed to fetch');
                        const data = await response.json();
                        setUsers(data);
                    } catch (err) {
                        setError(err.message);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchUsers();
            }, []); <!-- Empty array = run once on mount -->

            <!-- Conditional rendering based on loading/error state -->
            if (loading) {
                return (
                    <!-- Bootstrap spinner for loading state -->
                    <div className="text-center p-4">
                        <div className="spinner-border text-primary" role="status">
                            <span className="visually-hidden">Loading...</span>
                        </div>
                    </div>
                );
            }

            if (error) {
                return <AlertBanner type="danger" message={`Error: ${error}`} />;
            }

            return (
                <div className="card shadow-sm mb-4">
                    <div className="card-header bg-info text-white">
                        <h5 className="mb-0">React useEffect - Data Fetching</h5>
                    </div>
                    <div className="card-body">
                        <!-- Bootstrap responsive grid for user cards -->
                        <div className="row">
                            {users.slice(0, 6).map(user => (
                                <div key={user.id} className="col-md-4 mb-3">
                                    <div className="card h-100">
                                        <div className="card-body">
                                            <h6 className="card-title">{user.name}</h6>
                                            <p className="card-text text-muted small">
                                                {user.email}<br />
                                                {user.company.name}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        <!-- ============================================================= -->
        <!-- App Component                                                -->
        <!-- Root component that composes all child components            -->
        <!-- Demonstrates: component composition, prop passing             -->
        <!-- ============================================================= -->
        function App() {
            return (
                <!-- Bootstrap container for responsive max-width -->
                <div className="container py-5">
                    <!-- Page header -->
                    <div className="text-center mb-5">
                        <h1 className="display-4 fw-bold text-primary">React + Bootstrap 5</h1>
                        <p className="lead text-muted">JSX, Hooks, and Component Patterns</p>
                    </div>

                    <!-- Alert banners with different Bootstrap color variants -->
                    <AlertBanner type="primary" message="React Bootstrap integration demo - using useState, useEffect, and useCallback hooks" />
                    <AlertBanner type="info" message="All components use Bootstrap 5 utility classes and component styles" />

                    <!-- Bootstrap responsive grid layout -->
                    <div className="row">
                        <div className="col-lg-6">
                            <!-- Counter demonstrates useState and useMemo -->
                            <Counter />
                        </div>
                        <div className="col-lg-6">
                            <!-- TodoList demonstrates controlled forms and list rendering -->
                            <TodoList />
                        </div>
                    </div>

                    <!-- DataFetcher demonstrates useEffect for async operations -->
                    <DataFetcher />

                    <!-- React Bootstrap component mapping reference -->
                    <div className="card shadow-sm">
                        <div className="card-header bg-dark text-white">
                            <h5 className="mb-0">React-Bootstrap Component Mapping</h5>
                        </div>
                        <div className="card-body">
                            <!-- Bootstrap table showing react-bootstrap equivalents -->
                            <table className="table table-striped">
                                <thead>
                                    <tr>
                                        <th>Bootstrap HTML</th>
                                        <th>React-Bootstrap</th>
                                        <th>Notes</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr><td>&lt;button class="btn"&gt;</td><td>&lt;Button&gt;</td><td>Variant prop replaces class</td></tr>
                                    <tr><td>&lt;div class="card"&gt;</td><td>&lt;Card&gt;</td><td>Compound components: Card.Header, Card.Body</td></tr>
                                    <tr><td>&lt;div class="modal"&gt;</td><td>&lt;Modal&gt;</td><td>Show/onHide props control visibility</td></tr>
                                    <tr><td>&lt;nav class="navbar"&gt;</td><td>&lt;Navbar&gt;</td><td>Expand prop for responsive collapse</td></tr>
                                    <tr><td>&lt;div class="alert"&gt;</td><td>&lt;Alert&gt;</td><td>Variant and dismissible props</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        <!-- ============================================================= -->
        <!-- ReactDOM.createRoot renders the App component into the DOM    -->
        <!-- React 18 uses createRoot API for concurrent features          -->
        <!-- ============================================================= -->
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Bootstrap 5.3.3 JS Bundle (includes Popper.js) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
