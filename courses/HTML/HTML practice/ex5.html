<!DOCTYPE html>
<html>
<head>
    <title>School Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 300px;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid black;
            padding: 6px;
            text-align: center;
        }
        th {
            font-weight: bold;
        }
        tfoot td {
            font-weight: bold;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <th>School</th>
        <th>Total</th>
    </tr>
    <tr>
        <td>School 1</td>
        <td>105</td>
    </tr>
    <tr>
        <td>School 2</td>
        <td>65</td>
    </tr>
    <tr>
        <td>School 3</td>
        <td>116</td>
    </tr>
    <tr>
        <td>School 4</td>
        <td>148</td>
    </tr>
    <tr>
        <td>School 5</td>
        <td>77</td>
    </tr>
    <tr>
        <td>School 6</td>
        <td>103</td>
    </tr>
    <tfoot>
        <tr>
            <td>Total</td>
            <td>614</td>
        </tr>
    </tfoot>
</table>

</body>
</html>
