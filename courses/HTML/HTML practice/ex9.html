<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>La Boheme</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Main hero section */
    .hero {
      background-image: url("https://imgs.search.brave.com/sfk5ydjHjd6WuLmVPliJCLjins0Mn_pFqDBKZ4f3dro/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly90NC5m/dGNkbi5uZXQvanBn/LzE1LzYzLzI2LzA1/LzM2MF9GXzE1NjMy/NjA1Mzhfb09HZFRO/N1J6QXhzbmVCRnBF/N3ZFWTFjaVdiTjl4/SkIuanBn"); /* replace with your image */
      background-size: cover;
      background-position: center;
      height: 100vh;
      color: white;
      position: relative;
    }

    /* Top navigation bar */
    .navbar {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      font-size: 14px;
    }

    .navbar a {
      text-decoration: none;
      color: white;
    }

    /* Center text content */
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .content h1 {
      font-size: 50px;
      margin: 10px 0;
    }

    .content h2 {
      font-size: 28px;
      font-weight: normal;
    }

    /* Button */
    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background-color: red;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .btn:hover {
      background-color: darkred;
    }
  </style>
</head>

<body>

  <div class="hero">

    <!-- Navigation -->
    <div class="navbar">
      <a href="#">EVENTS</a>
      <a href="#">REPERTOIRE</a>
      <a href="#">FESTIVAL</a>
      <a href="#">ABOUT THEATRE</a>
      <a href="#">NEWS</a>
      <a href="#">CONTACTS</a>
    </div>

    <!-- Center text -->
    <div class="content">
      <h1>LA BOHEME</h1>
      <h2>19th of June</h2>
      <button class="btn">Events and Tickets</button>
    </div>

  </div>

</body>
</html>
