<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redux Dispatch</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        .concept { background: white; padding: 20px; margin: 15px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #764abc; }
        h2 { color: #34495e; }
        .code { background: #282c34; color: #abb2bf; padding: 15px; border-radius: 5px; font-family: monospace; }
        .output { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4caf50; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>37. Redux Dispatch</h1>
    
    <div class="concept">
        <h2>Dispatch Actions</h2>
        <p>Dispatch sends actions to the reducer to update state.</p>
        <div class="code">
dispatch({ type: 'ADD_TODO', payload: { text: 'Learn Redux' } });
        </div>
    </div>
    
    <div class="concept">
        <h2>Todo App Demo</h2>
        <input type="text" id="todoInput" placeholder="Enter todo...">
        <button onclick="addTodo()">Add</button>
        <button onclick="clearAll()">Clear All</button>
    </div>
    
    <div class="output">
        <strong>Todos:</strong>
        <ul id="todoList"></ul>
    </div>
    
    <script>
        const createStore = (reducer) => {
            let state;
            let listeners = [];
            return {
                getState: () => state,
                dispatch: (action) => {
                    state = reducer(state, action);
                    listeners.forEach(l => l());
                },
                subscribe: (listener) => {
                    listeners.push(listener);
                    return () => { listeners = listeners.filter(l => l !== listener); };
                }
            };
        };
        
        const todoReducer = (state = { todos: [] }, action) => {
            switch (action.type) {
                case 'ADD_TODO':
                    return { todos: [...state.todos, action.payload] };
                case 'REMOVE_TODO':
                    return { todos: state.todos.filter((_, i) => i !== action.index) };
                case 'CLEAR_ALL':
                    return { todos: [] };
                default:
                    return state;
            }
        };
        
        const store = createStore(todoReducer);
        
        store.subscribe(() => {
            const todos = store.getState().todos;
            document.getElementById('todoList').innerHTML = 
                todos.map((t, i) => '<li>' + t.text + ' <button onclick="removeTodo(' + i + ')">X</button></li>').join('');
        });
        
        function addTodo() {
            const input = document.getElementById('todoInput');
            if (input.value.trim()) {
                store.dispatch({ type: 'ADD_TODO', payload: { text: input.value } });
                input.value = '';
            }
        }
        
        function removeTodo(index) {
            store.dispatch({ type: 'REMOVE_TODO', index });
        }
        
        function clearAll() {
            store.dispatch({ type: 'CLEAR_ALL' });
        }
    </script>
</body>
</html>
