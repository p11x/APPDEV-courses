<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11 - Service Worker Basic</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .output { background: #f0f0f0; padding: 15px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
        button { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #1976D2; }
        .info { background: #e3f2fd; padding: 10px; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>11 - Service Worker Basic</h1>
    <p>Service Workers act as a proxy between web app and network.</p>
    
    <div class="info">
        <strong>Note:</strong> Service Workers require HTTPS and must be served from a server.
        This example demonstrates the API structure and registration.
    </div>
    
    <button onclick="checkSWSupport()">Check Service Worker Support</button>
    <button onclick="checkSWStatus()">Check SW Status</button>
    <div id="output" class="output">Output will appear here...</div>

    <script>
        let output = [];

        function log(message) {
            output.push(message);
            document.getElementById('output').textContent = output.join('\n');
        }

        function checkSWSupport() {
            output = [];
            if ('serviceWorker' in navigator) {
                log('Service Workers are SUPPORTED in this browser');
                log('Browser: ' + navigator.userAgent);
            } else {
                log('Service Workers are NOT SUPPORTED');
                log('Consider using a modern browser like Chrome, Firefox, or Edge');
            }
        }

        function checkSWStatus() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistration()
                    .then(registration => {
                        if (registration) {
                            log('Service Worker registered');
                            log('Scope: ' + registration.scope);
                            log('State: ' + registration.active ? 'active' : 'inactive');
                        } else {
                            log('No Service Worker registered yet');
                        }
                    })
                    .catch(err => log('Error: ' + err.message));
            } else {
                log('Service Workers not supported');
            }
        }
    </script>
</body>
</html>
