<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15 - Shared Worker</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .output { background: #f0f0f0; padding: 15px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
        button { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #1976D2; }
        .info { background: #e3f2fd; padding: 10px; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>15 - Shared Worker</h1>
    <p>Shared Workers can be accessed by multiple scripts in different windows.</p>
    
    <div class="info">
        <strong>Note:</strong> Shared Workers require a separate file. This demo simulates the API.
    </div>
    
    <button onclick="testSharedWorker()">Test Shared Worker API</button>
    <button onclick="testPortAPI()">Test Port API</button>
    <div id="output" class="output">Output will appear here...</div>

    <script>
        let output = [];

        function log(message) {
            output.push(message);
            document.getElementById('output').textContent = output.join('\n');
        }

        function testSharedWorker() {
            output = [];
            log('Testing SharedWorker API...');
            
            if (!('SharedWorker' in window)) {
                log('SharedWorker not supported in this browser');
                return;
            }
            
            const workerCode = `
                let connections = 0;
                self.onconnect = function(e) {
                    connections++;
                    const port = e.ports[0];
                    port.postMessage('Connected! Total: ' + connections);
                    port.onmessage = function(e) {
                        port.postMessage('Echo: ' + e.data);
                    };
                };
            `;
            
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const worker = new SharedWorker(URL.createObjectURL(blob));
            
            worker.port.onmessage = function(e) {
                log('From shared worker: ' + e.data);
            };
            
            worker.port.start();
            log('SharedWorker created and connected');
            
            setTimeout(() => {
                worker.port.postMessage('Hello');
            }, 500);
        }

        function testPortAPI() {
            log('Testing Port API for message passing...');
            
            const channel = new MessageChannel();
            const port1 = channel.port1;
            const port2 = channel.port2;
            
            port1.onmessage = function(e) {
                log('Port1 received: ' + e.data);
            };
            
            port2.onmessage = function(e) {
                log('Port2 received: ' + e.data);
            };
            
            port1.start();
            port2.start();
            
            port1.postMessage('Message from port1');
            port2.postMessage('Message from port2');
            
            log('MessageChannel created with two ports');
        }
    </script>
</body>
</html>
