<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>26 - Object Clone</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .output { background: #f0f0f0; padding: 15px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
        button { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #1976D2; }
    </style>
</head>
<body>
    <h1>26 - Object Clone</h1>
    <p>Methods to clone objects in JavaScript.</p>
    
    <button onclick="testSpreadClone()">Spread Operator</button>
    <button onclick="testObjectAssign()">Object.assign</button>
    <button onclick="testReference()">Reference Demo</button>
    <div id="output" class="output">Output will appear here...</div>

    <script>
        let output = [];

        function log(message) {
            output.push(message);
            document.getElementById('output').textContent = output.join('\n');
        }

        function testSpreadClone() {
            output = [];
            log('Testing spread operator clone...');
            
            const original = { name: 'John', age: 30, city: 'NYC' };
            const clone = { ...original };
            
            clone.age = 31;
            
            log('Original age: ' + original.age);
            log('Clone age: ' + clone.age);
            log('Original unchanged: ' + (original.age === 30));
            
            const nested = { data: { x: 1, y: 2 } };
            const shallowClone = { ...nested };
            shallowClone.data.x = 100;
            log('Nested still shared: ' + (nested.data.x === 100));
        }

        function testObjectAssign() {
            log('Testing Object.assign()...');
            
            const target = { a: 1 };
            const source = { b: 2, c: 3 };
            const result = Object.assign(target, source);
            
            log('Result: ' + JSON.stringify(result));
            log('Target modified: ' + (target === result));
            
            const clone = Object.assign({}, { name: 'Alice', age: 25 });
            log('Cloned: ' + JSON.stringify(clone));
        }

        function testReference() {
            log('Reference vs value demonstration...');
            
            const obj = { value: 10 };
            const ref = obj;
            ref.value = 20;
            
            log('Original value after ref change: ' + obj.value);
            log('Same reference: ' + (obj === ref));
            
            const copy = { ...obj };
            copy.value = 30;
            log('Original after copy change: ' + obj.value);
        }
    </script>
</body>
</html>
