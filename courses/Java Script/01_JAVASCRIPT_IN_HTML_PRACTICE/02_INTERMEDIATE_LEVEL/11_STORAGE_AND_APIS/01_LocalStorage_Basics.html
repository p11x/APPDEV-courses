<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalStorage Basics</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 20px; }
        button { margin: 5px; padding: 10px 15px; cursor: pointer; }
        input { padding: 8px; margin: 5px; }
        pre { background: #2d2d2d; color: #0f0; padding: 10px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>LocalStorage Basics - CRUD Operations</h1>
    
    <h3>Create / Update</h3>
    <input type="text" id="keyInput" placeholder="Key">
    <input type="text" id="valueInput" placeholder="Value">
    <button onclick="saveItem()">Save to LocalStorage</button>

    <h3>Read</h3>
    <input type="text" id="readKeyInput" placeholder="Key to read">
    <button onclick="readItem()">Read</button>
    <button onclick="listAllItems()">List All Items</button>

    <h3>Delete</h3>
    <input type="text" id="deleteKeyInput" placeholder="Key to delete">
    <button onclick="deleteItem()">Delete</button>
    <button onclick="clearAll()">Clear All</button>

    <div class="output">
        <h3>Output:</h3>
        <pre id="output"></pre>
    </div>

    <script>
        // Save (Create/Update) an item to localStorage
        function saveItem() {
            const key = document.getElementById('keyInput').value;
            const value = document.getElementById('valueInput').value;
            
            if (key && value) {
                localStorage.setItem(key, value);  // Set item in localStorage
                displayOutput(`Saved: "${key}" = "${value}"`);
            } else {
                displayOutput('Please enter both key and value');
            }
        }

        // Read a specific item from localStorage
        function readItem() {
            const key = document.getElementById('readKeyInput').value;
            const value = localStorage.getItem(key);  // Get item from localStorage
            
            if (value !== null) {
                displayOutput(`Read: "${key}" = "${value}"`);
            } else {
                displayOutput(`Key "${key}" not found in localStorage`);
            }
        }

        // List all items in localStorage
        function listAllItems() {
            let output = 'All LocalStorage Items:\n';
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);  // Get key at index
                const value = localStorage.getItem(key);
                output += `${i + 1}. ${key}: ${value}\n`;
            }
            displayOutput(output || 'No items in localStorage');
        }

        // Delete a specific item from localStorage
        function deleteItem() {
            const key = document.getElementById('deleteKeyInput').value;
            
            if (localStorage.getItem(key)) {
                localStorage.removeItem(key);  // Remove specific item
                displayOutput(`Deleted: "${key}"`);
            } else {
                displayOutput(`Key "${key}" not found`);
            }
        }

        // Clear all items from localStorage
        function clearAll() {
            localStorage.clear();  // Clear all localStorage
            displayOutput('All localStorage cleared');
        }

        // Helper function to display output
        function displayOutput(message) {
            document.getElementById('output').textContent = message;
        }
    </script>
</body>
</html>
