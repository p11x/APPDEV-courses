<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>27 - Deep Clone</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .output { background: #f0f0f0; padding: 15px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
        button { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #1976D2; }
    </style>
</head>
<body>
    <h1>27 - Deep Clone</h1>
    <p>Deep cloning for nested objects and arrays.</p>
    
    <button onclick="testJSONClone()">JSON Method</button>
    <button onclick="testStructuredClone()">Structured Clone</button>
    <button onclick="testRecursiveClone()">Recursive Clone</button>
    <div id="output" class="output">Output will appear here...</div>

    <script>
        let output = [];

        function log(message) {
            output.push(message);
            document.getElementById('output').textContent = output.join('\n');
        }

        function testJSONClone() {
            output = [];
            log('Testing JSON method for deep clone...');
            
            const original = {
                name: 'John',
                address: { city: 'NYC', zip: '10001' },
                scores: [90, 85, 95]
            };
            
            const clone = JSON.parse(JSON.stringify(original));
            
            clone.address.city = 'LA';
            clone.scores.push(100);
            
            log('Original city: ' + original.address.city);
            log('Clone city: ' + clone.address.city);
            log('Original scores: [' + original.scores.join(', ') + ']');
            log('Clone scores: [' + clone.scores.join(', ') + ']');
            
            log('Deep clone successful: ' + (original.address.city === 'NYC'));
        }

        function testStructuredClone() {
            log('Testing structuredClone() (modern API)...');
            
            const original = {
                name: 'Alice',
                data: new Map([['key', 'value']]),
                date: new Date('2024-01-01'),
                nested: { deep: { value: 42 } }
            };
            
            try {
                const clone = structuredClone(original);
                clone.nested.deep.value = 100;
                
                log('Original nested: ' + original.nested.deep.value);
                log('Clone nested: ' + clone.nested.deep.value);
                log('Map copied: ' + (clone.data instanceof Map));
                log('Date copied: ' + (clone.date instanceof Date));
            } catch (e) {
                log('Error: ' + e.message);
            }
        }

        function testRecursiveClone() {
            log('Testing custom recursive clone...');
            
            function deepClone(obj) {
                if (obj === null || typeof obj !== 'object') return obj;
                if (Array.isArray(obj)) return obj.map(item => deepClone(item));
                
                const clone = {};
                for (const key in obj) {
                    if (obj.hasOwnProperty(key)) {
                        clone[key] = deepClone(obj[key]);
                    }
                }
                return clone;
            }
            
            const original = {
                user: { profile: { name: 'Bob', age: 25 } },
                tags: ['a', 'b', 'c']
            };
            
            const clone = deepClone(original);
            clone.user.profile.name = 'Changed';
            
            log('Original name: ' + original.user.profile.name);
            log('Clone name: ' + clone.user.profile.name);
            log('Deep clone working!');
        }
    </script>
</body>
</html>
