<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13 - Web Worker Basic</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .output { background: #f0f0f0; padding: 15px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
        button { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #1976D2; }
    </style>
</head>
<body>
    <h1>13 - Web Worker Basic</h1>
    <p>Web Workers run scripts in background threads.</p>
    
    <button onclick="startWorker()">Start Web Worker</button>
    <button onclick="stopWorker()">Stop Worker</button>
    <button onclick="postMessage()">Send Message</button>
    <div id="output" class="output">Output will appear here...</div>

    <script>
        let worker = null;
        let output = [];

        function log(message) {
            output.push(message);
            document.getElementById('output').textContent = output.join('\n');
        }

        function startWorker() {
            output = [];
            log('Starting Web Worker...');
            
            const workerCode = `
                self.onmessage = function(e) {
                    console.log('Worker received:', e.data);
                    let result = 0;
                    for (let i = 0; i < 1000000000; i++) {
                        result += i;
                    }
                    self.postMessage('Worker completed: ' + result);
                };
            `;
            
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            worker = new Worker(URL.createObjectURL(blob));
            
            worker.onmessage = function(e) {
                log('Message from worker: ' + e.data);
            };
            
            worker.onerror = function(e) {
                log('Worker error: ' + e.message);
            };
            
            log('Worker started with inline code');
        }

        function stopWorker() {
            if (worker) {
                worker.terminate();
                worker = null;
                log('Worker terminated');
            } else {
                log('No worker running');
            }
        }

        function postMessage() {
            if (worker) {
                worker.postMessage('Hello from main thread!');
                log('Message sent to worker');
            } else {
                log('Start worker first');
            }
        }
    </script>
</body>
</html>
