<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>22 - AJAX Get</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .output { background: #f0f0f0; padding: 15px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
        button { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #1976D2; }
    </style>
</head>
<body>
    <h1>22 - AJAX GET Request</h1>
    <p>Using XMLHttpRequest for GET requests.</p>
    
    <button onclick="ajaxGet()">AJAX GET</button>
    <button onclick="ajaxGetJSON()">GET JSON</button>
    <div id="output" class="output">Output will appear here...</div>

    <script>
        let output = [];

        function log(message) {
            output.push(message);
            document.getElementById('output').textContent = output.join('\n');
        }

        function ajaxGet() {
            output = [];
            log('Making AJAX GET request...');
            
            const xhr = new XMLHttpRequest();
            xhr.open('GET', 'https://jsonplaceholder.typicode.com/posts/1', true);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        log('Status: ' + xhr.status);
                        log('Response: ' + xhr.responseText.substring(0, 100) + '...');
                    } else {
                        log('Error: ' + xhr.status);
                    }
                }
            };
            
            xhr.onerror = function() {
                log('Network error occurred');
            };
            
            xhr.send();
            log('Request sent...');
        }

        function ajaxGetJSON() {
            output = [];
            log('Fetching JSON data...');
            
            const xhr = new XMLHttpRequest();
            xhr.open('GET', 'https://jsonplaceholder.typicode.com/users', true);
            xhr.setRequestHeader('Accept', 'application/json');
            
            xhr.onload = function() {
                if (xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    log('Received ' + data.length + ' users');
                    
                    data.slice(0, 3).forEach(user => {
                        log(' - ' + user.name + ' (' + user.email + ')');
                    });
                } else {
                    log('Error: ' + xhr.status);
                }
            };
            
            xhr.send();
        }
    </script>
</body>
</html>
