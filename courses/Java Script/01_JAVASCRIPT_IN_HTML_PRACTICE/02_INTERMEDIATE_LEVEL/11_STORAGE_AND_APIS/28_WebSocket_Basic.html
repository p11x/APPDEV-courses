<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>28 - WebSocket Basic</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .output { background: #f0f0f0; padding: 15px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
        button { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #1976D2; }
        .info { background: #e3f2fd; padding: 10px; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>28 - WebSocket Basic</h1>
    <p>WebSocket provides full-duplex communication.</p>
    
    <div class="info">
        <strong>Note:</strong> WebSocket requires a server. This demo shows the API without connection.
    </div>
    
    <button onclick="testWebSocketAPI()">Test WebSocket API</button>
    <button onclick="simulateConnection()">Simulate Connection</button>
    <div id="output" class="output">Output will appear here...</div>

    <script>
        let output = [];

        function log(message) {
            output.push(message);
            document.getElementById('output').textContent = output.join('\n');
        }

        function testWebSocketAPI() {
            output = [];
            log('Testing WebSocket API...');
            
            if (!('WebSocket' in window)) {
                log('WebSocket not supported');
                return;
            }
            
            log('WebSocket is supported');
            
            const ws = new WebSocket('wss://echo.websocket.org');
            
            log('Created WebSocket instance');
            log('Ready states:');
            log('  0 = CONNECTING');
            log('  1 = OPEN');
            log('  2 = CLOSING');
            log('  3 = CLOSED');
            log('Current state: ' + ws.readyState);
            
            ws.onopen = function() {
                log('Connection opened');
            };
            
            ws.onclose = function() {
                log('Connection closed');
            };
            
            ws.close();
            log('Closed test connection');
        }

        function simulateConnection() {
            log('Simulating WebSocket message flow...');
            
            const stateNames = ['CONNECTING', 'OPEN', 'CLOSING', 'CLOSED'];
            
            for (let i = 0; i < 4; i++) {
                log('State ' + i + ': ' + stateNames[i]);
            }
            
            log('\nWebSocket methods:');
            log('  - send(data): Send data');
            log('  - close(): Close connection');
            log('  - binaryType: Set to "arraybuffer" or "blob"');
            
            log('\nWebSocket events:');
            log('  - onopen: Connection established');
            log('  - onmessage: Message received');
            log('  - onerror: Error occurred');
            log('  - onclose: Connection closed');
        }
    </script>
</body>
</html>
