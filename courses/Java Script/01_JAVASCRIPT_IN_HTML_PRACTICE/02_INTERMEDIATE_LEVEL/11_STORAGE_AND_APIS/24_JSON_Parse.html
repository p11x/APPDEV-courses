<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24 - JSON Parse</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .output { background: #f0f0f0; padding: 15px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
        button { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #1976D2; }
    </style>
</head>
<body>
    <h1>24 - JSON Parse</h1>
    <p>JSON.parse() converts JSON string to JavaScript objects.</p>
    
    <button onclick="parseSimpleJSON()">Parse Simple JSON</button>
    <button onclick="parseNestedJSON()">Parse Nested JSON</button>
    <button onclick="parseWithReviver()">Parse with Reviver</button>
    <div id="output" class="output">Output will appear here...</div>

    <script>
        let output = [];

        function log(message) {
            output.push(message);
            document.getElementById('output').textContent = output.join('\n');
        }

        function parseSimpleJSON() {
            output = [];
            log('Parsing simple JSON...');
            
            const jsonString = '{"name": "John", "age": 30, "city": "New York"}';
            log('Input: ' + jsonString);
            
            try {
                const obj = JSON.parse(jsonString);
                log('Parsed successfully!');
                log('name: ' + obj.name);
                log('age: ' + obj.age);
                log('city: ' + obj.city);
            } catch (e) {
                log('Error: ' + e.message);
            }
        }

        function parseNestedJSON() {
            log('Parsing nested JSON...');
            
            const jsonString = '{"user": {"name": "Alice", "email": "alice@example.com"}, "posts": [1, 2, 3]}';
            log('Input: ' + jsonString);
            
            const obj = JSON.parse(jsonString);
            log('user.name: ' + obj.user.name);
            log('user.email: ' + obj.user.email);
            log('posts: [' + obj.posts.join(', ') + ']');
        }

        function parseWithReviver() {
            log('Parsing with reviver function...');
            
            const jsonString = '{"timestamp": 1699999999, "value": 100}';
            log('Original: ' + jsonString);
            
            const obj = JSON.parse(jsonString, (key, value) => {
                if (key === 'timestamp') {
                    return new Date(value * 1000).toISOString();
                }
                return value;
            });
            
            log('After reviver:');
            log('timestamp: ' + obj.timestamp);
            log('value: ' + obj.value);
        }
    </script>
</body>
</html>
