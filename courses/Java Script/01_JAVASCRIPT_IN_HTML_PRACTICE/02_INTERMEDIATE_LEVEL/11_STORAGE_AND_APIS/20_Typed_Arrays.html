<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20 - Typed Arrays</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .output { background: #f0f0f0; padding: 15px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
        button { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #1976D2; }
    </style>
</head>
<body>
    <h1>20 - Typed Arrays</h1>
    <p>Typed arrays provide typed views into ArrayBuffers.</p>
    
    <button onclick="testTypedArrays()">Test Typed Arrays</button>
    <button onclick="testInt8Array()">Test Int8Array</button>
    <button onclick="testFloat64Array()">Test Float64Array</button>
    <div id="output" class="output">Output will appear here...</div>

    <script>
        let output = [];

        function log(message) {
            output.push(message);
            document.getElementById('output').textContent = output.join('\n');
        }

        function testTypedArrays() {
            output = [];
            log('Available Typed Array types:');
            
            const types = [
                { name: 'Int8Array', bytes: 1 },
                { name: 'Uint8Array', bytes: 1 },
                { name: 'Uint8ClampedArray', bytes: 1 },
                { name: 'Int16Array', bytes: 2 },
                { name: 'Uint16Array', bytes: 2 },
                { name: 'Int32Array', bytes: 4 },
                { name: 'Uint32Array', bytes: 4 },
                { name: 'Float32Array', bytes: 4 },
                { name: 'Float64Array', bytes: 8 }
            ];
            
            for (const t of types) {
                log(t.name + ' - ' + t.bytes + ' bytes per element');
            }
            
            const arr = new Uint8Array([72, 101, 108, 108, 111]);
            log('\nUint8Array example: ' + String.fromCharCode(...arr));
        }

        function testInt8Array() {
            log('Testing Int8Array (signed 8-bit)...');
            
            const arr = new Int8Array(4);
            arr[0] = 127;
            arr[1] = -128;
            arr[2] = 0;
            arr[3] = 50;
            
            log('Values: ' + Array.from(arr).join(', '));
            log('Min: ' + arr.MIN_VALUE + ', Max: ' + arr.MAX_VALUE);
            
            const buffer = arr.buffer;
            log('Buffer size: ' + buffer.byteLength + ' bytes');
        }

        function testFloat64Array() {
            log('Testing Float64Array (double precision)...');
            
            const arr = new Float64Array([3.14159, 2.71828, 1.41421]);
            log('Values: ' + Array.from(arr).join(', '));
            
            arr[0] = arr[0] * 2;
            log('Doubled first: ' + arr[0]);
            
            arr.sort((a, b) => b - a);
            log('Sorted: ' + Array.from(arr).join(', '));
        }
    </script>
</body>
</html>
