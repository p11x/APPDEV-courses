<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25 - JSON Stringify</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .output { background: #f0f0f0; padding: 15px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
        button { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #1976D2; }
    </style>
</head>
<body>
    <h1>25 - JSON Stringify</h1>
    <p>JSON.stringify() converts JavaScript objects to JSON strings.</p>
    
    <button onclick="stringifyBasic()">Stringify Basic</button>
    <button onclick="stringifyPretty()">Stringify Pretty</button>
    <button onclick="stringifyWithReplacer()">Stringify with Replacer</button>
    <div id="output" class="output">Output will appear here...</div>

    <script>
        let output = [];

        function log(message) {
            output.push(message);
            document.getElementById('output').textContent = output.join('\n');
        }

        function stringifyBasic() {
            output = [];
            log('Stringifying basic object...');
            
            const obj = { name: 'John', age: 30, city: 'NYC' };
            log('Object: ' + JSON.stringify(obj));
            
            const arr = [1, 2, 3, 'four', true];
            log('Array: ' + JSON.stringify(arr));
            
            const nested = { a: { b: { c: 1 } } };
            log('Nested: ' + JSON.stringify(nested));
        }

        function stringifyPretty() {
            log('Stringifying with pretty print...');
            
            const obj = {
                name: 'Alice',
                age: 25,
                skills: ['JavaScript', 'Python', 'React']
            };
            
            log('Compact: ' + JSON.stringify(obj));
            log('\nPretty (2 spaces):');
            log(JSON.stringify(obj, null, 2));
        }

        function stringifyWithReplacer() {
            log('Stringifying with replacer...');
            
            const obj = {
                name: 'Secret',
                password: '12345',
                age: 30,
                token: 'abc123'
            };
            
            const result = JSON.stringify(obj, (key, value) => {
                if (key === 'password' || key === 'token') {
                    return undefined;
                }
                return value;
            });
            
            log('Original: ' + JSON.stringify(obj));
            log('Filtered: ' + result);
        }
    </script>
</body>
</html>
