<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Number</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .demo-section { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .output { background: #f5f5f5; padding: 10px; margin-top: 10px; border-radius: 3px; font-family: monospace; white-space: pre-wrap; }
        input, select, button { margin: 5px; padding: 8px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        label { display: block; margin: 10px 0 5px; }
    </style>
</head>
<body>
    <h1>Number Input Type</h1>
    <p>Demonstrates number inputs with min, max, step validation</p>

    <div class="demo-section">
        <h2>Form with Number Inputs</h2>
        <form id="numberForm">
            <label for="quantity">Quantity (1-10, step 1):</label>
            <input type="number" id="quantity" name="quantity" min="1" max="10" step="1" value="1">
            
            <label for="price">Price (0-1000, step 0.01):</label>
            <input type="number" id="price" name="price" min="0" max="1000" step="0.01" value="0.00">
            
            <label for="rating">Rating (0-5, step 0.5):</label>
            <input type="number" id="rating" name="rating" min="0" max="5" step="0.5" value="0">
            
            <label for="percentage">Percentage (0-100, step 5):</label>
            <input type="number" id="percentage" name="percentage" min="0" max="100" step="5" value="0">
            
            <label for="anyNumber">Any Number:</label>
            <input type="number" id="anyNumber" name="anyNumber">
            
            <button type="button" onclick="incrementQuantity()">+ Increment</button>
            <button type="button" onclick="decrementQuantity()">- Decrement</button>
            <button type="submit">Submit</button>
        </form>
    </div>

    <div class="demo-section">
        <h2>Number Operations</h2>
        <button type="button" onclick="getNumberValues()">Get Number Values</button>
        <button type="button" onclick="demonstrateNumberProperties()">Number Properties</button>
        <div id="output" class="output">Click a button to see results...</div>
    </div>

    <script>
        const quantityInput = document.getElementById('quantity');
        const priceInput = document.getElementById('price');
        const ratingInput = document.getElementById('rating');
        const percentageInput = document.getElementById('percentage');
        const anyNumberInput = document.getElementById('anyNumber');
        
        // Increment quantity
        function incrementQuantity() {
            let val = parseFloat(quantityInput.value) || 0;
            const step = parseFloat(quantityInput.getAttribute('step')) || 1;
            const max = parseFloat(quantityInput.getAttribute('max'));
            
            if (max && val + step > max) {
                quantityInput.value = max;
            } else {
                quantityInput.value = val + step;
            }
            
            getNumberValues();
        }
        
        // Decrement quantity
        function decrementQuantity() {
            let val = parseFloat(quantityInput.value) || 0;
            const step = parseFloat(quantityInput.getAttribute('step')) || 1;
            const min = parseFloat(quantityInput.getAttribute('min'));
            
            if (min && val - step < min) {
                quantityInput.value = min;
            } else {
                quantityInput.value = val - step;
            }
            
            getNumberValues();
        }
        
        // Get all number values
        function getNumberValues() {
            let result = 'NUMBER VALUES:\n================\n\n';
            result += `quantity: ${quantityInput.value}\n`;
            result += `price: ${priceInput.value}\n`;
            result += `rating: ${ratingInput.value}\n`;
            result += `percentage: ${percentageInput.value}\n`;
            result += `anyNumber: ${anyNumberInput.value || '(empty)'}`;
            
            document.getElementById('output').textContent = result;
        }
        
        // Demonstrate number properties
        function demonstrateNumberProperties() {
            let result = 'NUMBER INPUT PROPERTIES:\n========================\n\n';
            result += `quantity.min: ${quantityInput.getAttribute('min')}\n`;
            result += `quantity.max: ${quantityInput.getAttribute('max')}\n`;
            result += `quantity.step: ${quantityInput.getAttribute('step')}\n`;
            result += `quantity.value: ${quantityInput.value}\n\n`;
            
            result += `price.min: ${priceInput.getAttribute('min')}\n`;
            result += `price.max: ${priceInput.getAttribute('max')}\n`;
            result += `price.step: ${priceInput.getAttribute('step')}\n`;
            result += `price.value: ${priceInput.value}\n\n`;
            
            result += `INPUT TYPE PROPERTIES:\n`;
            result += `validity.rangeOverflow: ${quantityInput.validity.rangeOverflow}\n`;
            result += `validity.rangeUnderflow: ${quantityInput.validity.rangeUnderflow}\n`;
            result += `validity.stepMismatch: ${quantityInput.validity.stepMismatch}`;
            
            document.getElementById('output').textContent = result;
        }
        
        // Form submit
        document.getElementById('numberForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (e.target.checkValidity()) {
                getNumberValues();
            }
        });
        
        // Input events
        anyNumberInput.addEventListener('input', function(e) {
            const value = parseFloat(e.target.value);
            console.log('Input:', value, 'isNaN:', isNaN(value));
        });
    </script>
</body>
</html>
