<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Events</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .demo-section { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .output { background: #f5f5f5; padding: 10px; margin-top: 10px; border-radius: 3px; font-family: monospace; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
        input, select, button { margin: 5px; padding: 8px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        label { display: block; margin: 10px 0 5px; }
    </style>
</head>
<body>
    <h1>Input Event Handlers Demo</h1>
    <p>Demonstrates various input event handlers</p>

    <div class="demo-section">
        <h2>Form with Various Inputs</h2>
        <form id="eventForm">
            <label for="textInput">Text Input (try typing):</label>
            <input type="text" id="textInput" name="textInput" placeholder="Type something...">
            
            <label for="emailInput">Email Input (try typing):</label>
            <input type="email" id="emailInput" name="emailInput" placeholder="email@example.com">
            
            <label for="selectInput">Select:</label>
            <select id="selectInput" name="selectInput">
                <option value="">-- Select --</option>
                <option value="a">Option A</option>
                <option value="b">Option B</option>
                <option value="c">Option C</option>
            </select>
            
            <button type="button" onclick="clearLog()">Clear Log</button>
        </form>
    </div>

    <div class="demo-section">
        <h2>Event Log</h2>
        <div id="output" class="output">Start typing in the inputs to see events...</div>
    </div>

    <script>
        const output = document.getElementById('output');
        let eventCount = 0;
        
        function logEvent(eventName, target) {
            eventCount++;
            const time = new Date().toLocaleTimeString();
            const message = `[${eventCount}] ${time}: ${eventName} on #${target.id} | value: "${target.value}"`;
            output.textContent = message + '\n' + output.textContent;
        }
        
        function clearLog() {
            output.textContent = 'Event log cleared. Start typing in the inputs to see events...\n';
            eventCount = 0;
        }
        
        const textInput = document.getElementById('textInput');
        const emailInput = document.getElementById('emailInput');
        const selectInput = document.getElementById('selectInput');
        
        // input event - fires when value changes
        textInput.addEventListener('input', function(e) {
            logEvent('INPUT', e.target);
        });
        
        emailInput.addEventListener('input', function(e) {
            logEvent('INPUT', e.target);
        });
        
        // change event - fires when value is changed and focus is lost
        textInput.addEventListener('change', function(e) {
            logEvent('CHANGE', e.target);
        });
        
        emailInput.addEventListener('change', function(e) {
            logEvent('CHANGE', e.target);
        });
        
        selectInput.addEventListener('change', function(e) {
            logEvent('CHANGE', e.target);
        });
        
        // focus event - fires when input gains focus
        textInput.addEventListener('focus', function(e) {
            logEvent('FOCUS', e.target);
        });
        
        emailInput.addEventListener('focus', function(e) {
            logEvent('FOCUS', e.target);
        });
        
        selectInput.addEventListener('focus', function(e) {
            logEvent('FOCUS', e.target);
        });
        
        // blur event - fires when input loses focus
        textInput.addEventListener('blur', function(e) {
            logEvent('BLUR', e.target);
        });
        
        emailInput.addEventListener('blur', function(e) {
            logEvent('BLUR', e.target);
        });
        
        selectInput.addEventListener('blur', function(e) {
            logEvent('BLUR', e.target);
        });
        
        // invalid event - fires when input value is invalid
        emailInput.addEventListener('invalid', function(e) {
            logEvent('INVALID', e.target);
        });
        
        // Additional demonstration: select more events
        const form = document.getElementById('eventForm');
        
        // form level events
        form.addEventListener('reset', function(e) {
            logEvent('RESET', e.target);
        });
        
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            logEvent('SUBMIT', e.target);
        });
    </script>
</body>
</html>
