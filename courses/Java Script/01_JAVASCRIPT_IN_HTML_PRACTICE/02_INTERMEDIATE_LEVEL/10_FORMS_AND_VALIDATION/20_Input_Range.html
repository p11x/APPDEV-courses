<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Range</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .demo-section { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .output { background: #f5f5f5; padding: 10px; margin-top: 10px; border-radius: 3px; font-family: monospace; white-space: pre-wrap; }
        input, select, button { margin: 5px; padding: 8px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        label { display: block; margin: 10px 0 5px; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        .slider-container input[type="range"] { flex: 1; }
        .slider-value { min-width: 30px; text-align: right; }
    </style>
</head>
<body>
    <h1>Range Slider Input</h1>
    <p>Demonstrates range input with value feedback</p>

    <div class="demo-section">
        <h2>Form with Range Inputs</h2>
        <form id="rangeForm">
            <label for="volume">Volume (0-100):</label>
            <div class="slider-container">
                <input type="range" id="volume" name="volume" min="0" max="100" value="50">
                <span class="slider-value" id="volumeValue">50</span>
            </div>
            
            <label for="brightness">Brightness (0-255):</label>
            <div class="slider-container">
                <input type="range" id="brightness" name="brightness" min="0" max="255" value="128">
                <span class="slider-value" id="brightnessValue">128</span>
            </div>
            
            <label for="temperature">Temperature (0-100, step 0.1):</label>
            <div class="slider-container">
                <input type="range" id="temperature" name="temperature" min="0" max="100" step="0.1" value="50">
                <span class="slider-value" id="temperatureValue">50.0</span>
            </div>
            
            <label for="opacity">Opacity (0-1, step 0.01):</label>
            <div class="slider-container">
                <input type="range" id="opacity" name="opacity" min="0" max="1" step="0.01" value="1">
                <span class="slider-value" id="opacityValue">1.00</span>
            </div>
            
            <button type="button" onclick="getRangeValues()">Get Range Values</button>
        </form>
    </div>

    <div class="demo-section">
        <h2>Range Events</h2>
        <button type="button" onclick="showRangeProperties()">Show Range Properties</button>
        <div id="output" class="output">Move sliders to see events...</div>
    </div>

    <script>
        const volumeInput = document.getElementById('volume');
        const brightnessInput = document.getElementById('brightness');
        const temperatureInput = document.getElementById('temperature');
        const opacityInput = document.getElementById('opacity');
        
        const volumeValue = document.getElementById('volumeValue');
        const brightnessValue = document.getElementById('brightnessValue');
        const temperatureValue = document.getElementById('temperatureValue');
        const opacityValue = document.getElementById('opacityValue');
        
        // Update volume display
        volumeInput.addEventListener('input', function(e) {
            volumeValue.textContent = e.target.value;
        });
        
        // Update brightness display
        brightnessInput.addEventListener('input', function(e) {
            brightnessValue.textContent = e.target.value;
        });
        
        // Update temperature display
        temperatureInput.addEventListener('input', function(e) {
            temperatureValue.textContent = parseFloat(e.target.value).toFixed(1);
        });
        
        // Update opacity display
        opacityInput.addEventListener('input', function(e) {
            opacityValue.textContent = parseFloat(e.target.value).toFixed(2);
        });
        
        // Get range values
        function getRangeValues() {
            let result = 'RANGE VALUES:\n================\n\n';
            result += `volume: ${volumeInput.value}\n`;
            result += `brightness: ${brightnessInput.value}\n`;
            result += `temperature: ${temperatureInput.value}\n`;
            result += `opacity: ${opacityInput.value}`;
            
            document.getElementById('output').textContent = result;
        }
        
        // Show range properties
        function showRangeProperties() {
            let result = 'RANGE PROPERTIES:\n================\n\n';
            result += `volume.min: ${volumeInput.getAttribute('min')}\n`;
            result += `volume.max: ${volumeInput.getAttribute('max')}\n`;
            result += `volume.step: ${volumeInput.getAttribute('step')}\n`;
            result += `volume.value: ${volumeInput.value}\n\n`;
            
            result += `opacity.min: ${opacityInput.getAttribute('min')}\n`;
            result += `opacity.max: ${opacityInput.getAttribute('max')}\n`;
            result += `opacity.step: ${opacityInput.getAttribute('step')}\n`;
            result += `opacity.value: ${opacityInput.value}`;
            
            document.getElementById('output').textContent = result;
        }
    </script>
</body>
</html>
