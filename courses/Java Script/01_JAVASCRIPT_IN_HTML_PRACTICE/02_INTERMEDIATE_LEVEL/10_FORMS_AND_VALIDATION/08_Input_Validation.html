<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Validation</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .demo-section { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .output { background: #f5f5f5; padding: 10px; margin-top: 10px; border-radius: 3px; font-family: monospace; white-space: pre-wrap; }
        input, select, button { margin: 5px; padding: 8px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        label { display: block; margin: 10px 0 5px; }
        .error { border-color: red !important; }
    </style>
</head>
<body>
    <h1>HTML5 Built-in Validation Demo</h1>
    <p>Demonstrates HTML5 validation attributes</p>

    <div class="demo-section">
        <h2>Validation Attributes</h2>
        <form id="validationForm" novalidate>
            <label for="requiredInput">Required (required):</label>
            <input type="text" id="requiredInput" name="requiredInput" required placeholder="This field is required">
            
            <label for="minInput">Minimum Value (min="10"):</label>
            <input type="number" id="minInput" name="minInput" min="10" placeholder="Enter number >= 10">
            
            <label for="maxInput">Maximum Value (max="100"):</label>
            <input type="number" id="maxInput" name="maxInput" max="100" placeholder="Enter number <= 100">
            
            <label for="minLengthInput">Minimum Length (minlength="5"):</label>
            <input type="text" id="minLengthInput" name="minLengthInput" minlength="5" placeholder="Enter at least 5 characters">
            
            <label for="maxLengthInput">Maximum Length (maxlength="10"):</label>
            <input type="text" id="maxLengthInput" name="maxLengthInput" maxlength="10" placeholder="Max 10 characters">
            
            <label for="patternInput">Pattern (pattern="[A-Za-z]{3}"):</label>
            <input type="text" id="patternInput" name="patternInput" pattern="[A-Za-z]{3}" placeholder="Enter exactly 3 letters">
            
            <button type="button" onclick="checkValidationState()">Check Validation State</button>
            <button type="submit">Submit Form</button>
        </form>
    </div>

    <div class="demo-section">
        <h2>Validation Results</h2>
        <button type="button" onclick="getValidationInfo()">Get Validation Info</button>
        <div id="output" class="output">Click a button to see validation information...</div>
    </div>

    <script>
        // Check validation state for all inputs
        function checkValidationState() {
            const form = document.getElementById('validationForm');
            const inputs = form.querySelectorAll('input');
            let result = 'VALIDATION STATE:\n================\n\n';
            
            inputs.forEach(input => {
                const validity = input.validity;
                result += `${input.id}:\n`;
                result += `  value: "${input.value}"\n`;
                result += `  valid: ${validity.valid}\n`;
                result += `  required: ${validity.required}\n`;
                result += `  tooLong: ${validity.tooLong}\n`;
                result += `  tooShort: ${validity.tooShort}\n`;
                result += `  rangeOverflow: ${validity.rangeOverflow}\n`;
                result += `  rangeUnderflow: ${validity.rangeUnderflow}\n`;
                result += `  patternMismatch: ${validity.patternMismatch}\n`;
                result += `  valid CustomError: ${validity.customError}\n\n`;
            });
            
            document.getElementById('output').textContent = result;
        }
        
        // Get detailed validation information
        function getValidationInfo() {
            const form = document.getElementById('validationForm');
            const inputs = form.querySelectorAll('input');
            let result = 'DETAILED VALIDATION INFO:\n======================\n\n';
            
            inputs.forEach(input => {
                result += `${input.id}:\n`;
                result += `  willValidate: ${input.willValidate}\n`;
                result += `  checkValidity(): ${input.checkValidity()}\n`;
                result += `  validationMessage: "${input.validationMessage}"\n\n`;
            });
            
            document.getElementById('output').textContent = result;
        }
        
        // Form submit handler
        document.getElementById('validationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const form = e.target;
            if (form.checkValidity()) {
                alert('Form is valid! Submitting...');
            } else {
                alert('Form has validation errors.');
            }
        });
    </script>
</body>
</html>
