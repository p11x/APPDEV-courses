<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autocomplete</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .demo-section { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .output { background: #f5f5f5; padding: 10px; margin-top: 10px; border-radius: 3px; font-family: monospace; white-space: pre-wrap; }
        input, select, button { margin: 5px; padding: 8px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        label { display: block; margin: 10px 0 5px; }
    </style>
</head>
<body>
    <h1>Autocomplete Attribute</h1>
    <p>Demonstrates autocomplete attribute values for form hints</p>

    <div class="demo-section">
        <h2>Form with Autocomplete</h2>
        <form id="autoForm">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" autocomplete="name">
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" autocomplete="email">
            
            <label for="tel">Phone:</label>
            <input type="tel" id="tel" name="tel" autocomplete="tel">
            
            <label for="address">Street Address:</label>
            <input type="text" id="address" name="address" autocomplete="street-address">
            
            <label for="city">City:</label>
            <input type="text" id="city" name="city" autocomplete="address-level2">
            
            <label for="state">State:</label>
            <input type="text" id="state" name="state" autocomplete="address-level1">
            
            <label for="zip">ZIP Code:</label>
            <input type="text" id="zip" name="zip" autocomplete="postal-code">
            
            <label for="country">Country:</label>
            <input type="text" id="country" name="country" autocomplete="country">
            
            <label for="cc-name">Credit Card Name:</label>
            <input type="text" id="cc-name" name="cc-name" autocomplete="cc-name">
            
            <label for="cc-number">Credit Card Number:</label>
            <input type="text" id="cc-number" name="cc-number" autocomplete="cc-number">
            
            <label for="cc-exp">Credit Card Expiry:</label>
            <input type="text" id="cc-exp" name="cc-exp" autocomplete="cc-exp">
            
            <label for="cc-csc">Credit Card CSC:</label>
            <input type="text" id="cc-csc" name="cc-csc" autocomplete="cc-csc">
            
            <button type="button" onclick="showAutocompleteInfo()">Show Autocomplete Info</button>
        </form>
    </div>

    <div class="demo-section">
        <h2>Autocomplete Values</h2>
        <button type="button" onclick="listAutocompleteValues()">List All Values</button>
        <div id="output" class="output">Click a button to see autocomplete values...</div>
    </div>

    <script>
        // Show autocomplete info
        function showAutocompleteInfo() {
            const form = document.getElementById('autoForm');
            const inputs = form.querySelectorAll('input');
            let result = 'AUTOCOMPLETE ATTRIBUTES:\n========================\n\n';
            
            inputs.forEach(input => {
                result += `${input.id}: autocomplete="${input.getAttribute('autocomplete')}"\n`;
            });
            
            document.getElementById('output').textContent = result;
        }
        
        // List all autocomplete values
        function listAutocompleteValues() {
            let result = 'AUTOCOMPLETE VALUES:\n====================\n\n';
            result += 'Name:\n';
            result += '  name, given-name, family-name\n';
            result += '  nickname, additional-name, honorific-prefix\n';
            result += '  honorific-suffix\n\n';
            result += 'Email & Communication:\n';
            result += '  email, tel, tel-country-code\n';
            result += '  tel-national, impp, url\n\n';
            result += 'Address:\n';
            result += '  street-address, address-line1-3\n';
            result += '  address-level1 (state)\n';
            result += '  address-level2 (city)\n';
            result += '  address-level3, postal-code\n';
            result += '  country, country-name\n\n';
            result += 'Payment:\n';
            result += '  cc-name, cc-number\n';
            result += '  cc-exp, cc-exp-month\n';
            result += '  cc-exp-year, cc-csc\n';
            result += '  cc-type\n\n';
            result += 'Transaction:\n';
            result += '  transaction-currency, transaction-amount\n';
            result += '  language, bday, gender\n';
            result += '  tel-area-code, tel-local\n';
            result += '  impp, url';
            
            document.getElementById('output').textContent = result;
        }
    </script>
</body>
</html>
