<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Serialize</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .demo-section { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .output { background: #f5f5f5; padding: 10px; margin-top: 10px; border-radius: 3px; font-family: monospace; white-space: pre-wrap; }
        input, select, button { margin: 5px; padding: 8px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        label { display: block; margin: 10px 0 5px; }
    </style>
</head>
<body>
    <h1>Serializing Form Data</h1>
    <p>Demonstrates serializing form data to JSON and URLSearchParams</p>

    <div class="demo-section">
        <h2>Registration Form</h2>
        <form id="registerForm">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" value="johndoe">
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="john@example.com">
            
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" value="25">
            
            <label for="country">Country:</label>
            <select id="country" name="country">
                <option value="us" selected>United States</option>
                <option value="uk">United Kingdom</option>
                <option value="ca">Canada</option>
            </select>
            
            <label>
                <input type="checkbox" name="terms" checked> Accept terms
            </label>
            
            <label>
                <input type="radio" name="newsletter" value="daily" checked> Daily
                <input type="radio" name="newsletter" value="weekly"> Weekly
                <input type="radio" name="newsletter" value="monthly"> Monthly
            </label>
            
            <button type="button" onclick="serializeToJSON()">Serialize to JSON</button>
            <button type="button" onclick="serializeToURLParams()">Serialize to URLSearchParams</button>
            <button type="button" onclick="serializeToObject()">Serialize to Plain Object</button>
        </form>
    </div>

    <div class="demo-section">
        <h2>Serialization Methods</h2>
        <button type="button" onclick="allSerializationMethods()">All Methods</button>
        <div id="output" class="output">Click a button to serialize form data...</div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        
        // Serialize to JSON
        function serializeToJSON() {
            const data = serializeObject(form);
            const json = JSON.stringify(data, null, 2);
            document.getElementById('output').textContent = 'JSON:\n====\n\n' + json;
        }
        
        // Serialize to URLSearchParams
        function serializeToURLParams() {
            const formData = new FormData(form);
            const params = new URLSearchParams(formData);
            document.getElementById('output').textContent = 'URLSearchParams:\n================\n\n' + params.toString();
        }
        
        // Serialize to plain object
        function serializeToObject() {
            const data = serializeObject(form);
            let result = 'Plain Object:\n============\n\n';
            for (let key in data) {
                result += `${key}: ${JSON.stringify(data[key])}\n`;
            }
            document.getElementById('output').textContent = result;
        }
        
        // Helper: serialize form to object
        function serializeObject(formElement) {
            const formData = new FormData(formElement);
            const data = {};
            for (let [key, value] of formData) {
                if (data[key]) {
                    if (!Array.isArray(data[key])) {
                        data[key] = [data[key]];
                    }
                    data[key].push(value);
                } else {
                    data[key] = value;
                }
            }
            return data;
        }
        
        // Show all methods
        function allSerializationMethods() {
            const formData = new FormData(form);
            const data = serializeObject(form);
            
            let result = 'SERIALIZATION METHODS:\n========================\n\n';
            result += '1. FormData:\n';
            result += '   const formData = new FormData(form)\n';
            result += '   for (let [key, value] of formData)\n\n';
            
            result += '2. URLSearchParams:\n';
            result += '   const params = new URLSearchParams(formData)\n';
            result += '   params.toString()\n\n';
            
            result += '3. JSON:\n';
            result += '   JSON.stringify(Object.fromEntries(formData))\n\n';
            
            result += 'Current data:\n';
            result += JSON.stringify(data, null, 2);
            
            document.getElementById('output').textContent = result;
        }
    </script>
</body>
</html>
