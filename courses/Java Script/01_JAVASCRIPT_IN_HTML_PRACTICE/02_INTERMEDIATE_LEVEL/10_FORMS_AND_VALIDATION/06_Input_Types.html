<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Types</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .demo-section { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .output { background: #f5f5f5; padding: 10px; margin-top: 10px; border-radius: 3px; font-family: monospace; white-space: pre-wrap; }
        input, select, button { margin: 5px; padding: 8px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        label { display: block; margin: 10px 0 5px; }
        .input-row { display: flex; align-items: center; margin: 8px 0; }
        .input-row label { flex: 150px; margin: 0; }
        .input-row input { flex: 1; }
    </style>
</head>
<body>
    <h1>HTML5 Input Types Demo</h1>
    <p>Demonstrates all available HTML5 input types</p>

    <div class="demo-section">
        <h2>All Input Types</h2>
        <form id="inputForm">
            <div class="input-row">
                <label for="text">text:</label>
                <input type="text" id="text" name="text" placeholder="Text input">
            </div>
            <div class="input-row">
                <label for="email">email:</label>
                <input type="email" id="email" name="email" placeholder="email@example.com">
            </div>
            <div class="input-row">
                <label for="password">password:</label>
                <input type="password" id="password" name="password" placeholder="Password">
            </div>
            <div class="input-row">
                <label for="number">number:</label>
                <input type="number" id="number" name="number" placeholder="123">
            </div>
            <div class="input-row">
                <label for="tel">tel:</label>
                <input type="tel" id="tel" name="tel" placeholder="555-123-4567">
            </div>
            <div class="input-row">
                <label for="url">url:</label>
                <input type="url" id="url" name="url" placeholder="https://example.com">
            </div>
            <div class="input-row">
                <label for="search">search:</label>
                <input type="search" id="search" name="search" placeholder="Search...">
            </div>
            <div class="input-row">
                <label for="range">range:</label>
                <input type="range" id="range" name="range" min="0" max="100" value="50">
            </div>
            <div class="input-row">
                <label for="color">color:</label>
                <input type="color" id="color" name="color" value="#ff0000">
            </div>
            <div class="input-row">
                <label for="date">date:</label>
                <input type="date" id="date" name="date">
            </div>
            <div class="input-row">
                <label for="time">time:</label>
                <input type="time" id="time" name="time">
            </div>
            <div class="input-row">
                <label for="datetime-local">datetime-local:</label>
                <input type="datetime-local" id="datetime-local" name="datetime-local">
            </div>
            <div class="input-row">
                <label for="month">month:</label>
                <input type="month" id="month" name="month">
            </div>
            <div class="input-row">
                <label for="week">week:</label>
                <input type="week" id="week" name="week">
            </div>
            <div class="input-row">
                <label for="file">file:</label>
                <input type="file" id="file" name="file">
            </div>
            <div class="input-row">
                <label for="hidden">hidden:</label>
                <input type="hidden" id="hidden" name="hidden" value="hidden-value">
            </div>
            <div class="input-row">
                <label for="checkbox">checkbox:</label>
                <input type="checkbox" id="checkbox" name="checkbox">
            </div>
            <div class="input-row">
                <label for="radio1">radio (1):</label>
                <input type="radio" id="radio1" name="radio" value="1">
            </div>
            <div class="input-row">
                <label for="radio2">radio (2):</label>
                <input type="radio" id="radio2" name="radio" value="2">
            </div>
            <div class="input-row">
                <button type="button" onclick="detectAllTypes()">Detect All Input Types</button>
            </div>
        </form>
    </div>

    <div class="demo-section">
        <h2>Input Type Information</h2>
        <button type="button" onclick="detectType()">Detect Selected Type</button>
        <div id="output" class="output">Select an input and click detect to see its type information...</div>
    </div>

    <script>
        // Detect and display input type information
        function detectType() {
            const form = document.getElementById('inputForm');
            const inputs = form.querySelectorAll('input');
            let result = 'INPUT TYPE INFORMATION:\n\n';
            
            inputs.forEach(input => {
                result += `Type: ${input.type.padEnd(15)} | ID: ${input.id.padEnd(15)} | Value: ${input.value || '(empty)'}\n`;
            });
            
            document.getElementById('output').textContent = result;
        }

        // Detect all input types in the form
        function detectAllTypes() {
            const form = document.getElementById('inputForm');
            const inputs = form.querySelectorAll('input');
            let result = 'ALL INPUT TYPES IN FORM:\n';
            result += '========================\n\n';
            
            inputs.forEach(input => {
                result += `${input.type}\n`;
            });
            
            document.getElementById('output').textContent = result;
        }

        // Add event listeners to all inputs to show real-time type detection
        document.getElementById('inputForm').addEventListener('input', function(e) {
            const input = e.target;
            if (input.type === 'range') {
                console.log(`Range value: ${input.value}`);
            } else if (input.type === 'color') {
                console.log(`Color value: ${input.value}`);
            } else if (input.type === 'checkbox') {
                console.log(`Checkbox checked: ${input.checked}`);
            }
        });
    </script>
</body>
</html>
