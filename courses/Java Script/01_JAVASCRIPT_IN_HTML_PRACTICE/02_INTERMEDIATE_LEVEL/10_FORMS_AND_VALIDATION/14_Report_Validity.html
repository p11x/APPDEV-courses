<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Validity</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .demo-section { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .output { background: #f5f5f5; padding: 10px; margin-top: 10px; border-radius: 3px; font-family: monospace; white-space: pre-wrap; }
        input, select, button { margin: 5px; padding: 8px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        label { display: block; margin: 10px 0 5px; }
    </style>
</head>
<body>
    <h1>Using reportValidity() Method</h1>
    <p>Demonstrates reportValidity() vs checkValidity() and how it displays messages</p>

    <div class="demo-section">
        <h2>Form with Validation</h2>
        <form id="reportForm">
            <label for="nameInput">Name (required):</label>
            <input type="text" id="nameInput" name="nameInput" required placeholder="Enter name">
            
            <label for="emailInput">Email (required, email):</label>
            <input type="email" id="emailInput" name="emailInput" required placeholder="email@example.com">
            
            <label for="phoneInput">Phone (pattern: 10 digits):</label>
            <input type="text" id="phoneInput" name="phoneInput" pattern="[0-9]{10}" placeholder="1234567890">
            
            <button type="button" onclick="demoReportValidity()">reportValidity() Demo</button>
            <button type="button" onclick="demoCheckValidity()">checkValidity() Demo</button>
            <button type="submit">Submit</button>
        </form>
    </div>

    <div class="demo-section">
        <h2>Comparison</h2>
        <button type="button" onclick="compareMethods()">Compare Methods</button>
        <div id="output" class="output">Click a button to see demonstration...</div>
    </div>

    <script>
        // Compare checkValidity and reportValidity
        function compareMethods() {
            let result = 'COMPARISON:\n============\n\n';
            result += 'checkValidity():\n';
            result += '  - Returns boolean (true/false)\n';
            result += '  - Does NOT display validation message\n';
            result += '  - Does NOT move focus to invalid element\n\n';
            result += 'reportValidity():\n';
            result += '  - Returns boolean (true/false)\n';
            result += '  - DISPLAYS validation message to user\n';
            result += '  - Sets focus to first invalid element\n';
            result += '  - Uses browser default or custom message';
            
            document.getElementById('output').textContent = result;
        }
        
        // Demo reportValidity
        function demoReportValidity() {
            const nameInput = document.getElementById('nameInput');
            const emailInput = document.getElementById('emailInput');
            const phoneInput = document.getElementById('phoneInput');
            
            let result = 'reportValidity() RESULTS:\n========================\n\n';
            
            // Try reportValidity on name
            result += `nameInput.reportValidity() = ${nameInput.reportValidity()}\n`;
            
            // Try reportValidity on email
            result += `emailInput.reportValidity() = ${emailInput.reportValidity()}\n`;
            
            // Try reportValidity on phone
            result += `phoneInput.reportValidity() = ${phoneInput.reportValidity()}`;
            
            document.getElementById('output').textContent = result;
        }
        
        // Demo checkValidity
        function demoCheckValidity() {
            const nameInput = document.getElementById('nameInput');
            const emailInput = document.getElementById('emailInput');
            const phoneInput = document.getElementById('phoneInput');
            
            let result = 'checkValidity() RESULTS:\n========================\n\n';
            
            // Try checkValidity on name
            const nameValid = nameInput.checkValidity();
            result += `nameInput.checkValidity() = ${nameValid}\n`;
            result += `  (no message displayed)\n\n`;
            
            // Try checkValidity on email
            const emailValid = emailInput.checkValidity();
            result += `emailInput.checkValidity() = ${emailValid}\n`;
            result += `  (no message displayed)\n\n`;
            
            // Try checkValidity on phone
            const phoneValid = phoneInput.checkValidity();
            result += `phoneInput.checkValidity() = ${phoneValid}\n`;
            result += `  (no message displayed)\n\n`;
            
            result += 'Notice: checkValidity does NOT show any message!';
            
            document.getElementById('output').textContent = result;
        }
        
        // Form submit handler
        document.getElementById('reportForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const form = e.target;
            if (form.reportValidity()) {
                document.getElementById('output').textContent = 'Form is valid! Submitted.';
            } else {
                document.getElementById('output').textContent = 'Form has validation errors (message was displayed).';
            }
        });
    </script>
</body>
</html>
