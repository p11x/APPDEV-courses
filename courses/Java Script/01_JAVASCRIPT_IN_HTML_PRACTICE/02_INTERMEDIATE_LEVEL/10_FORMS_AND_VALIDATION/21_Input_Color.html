<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Color</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .demo-section { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .output { background: #f5f5f5; padding: 10px; margin-top: 10px; border-radius: 3px; font-family: monospace; white-space: pre-wrap; }
        input, select, button { margin: 5px; padding: 8px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        label { display: block; margin: 10px 0 5px; }
        .color-preview { width: 50px; height: 30px; display: inline-block; border: 1px solid #ccc; vertical-align: middle; }
    </style>
</head>
<body>
    <h1>Color Picker Input</h1>
    <p>Demonstrates color input with color values</p>

    <div class="demo-section">
        <h2>Form with Color Input</h2>
        <form id="colorForm">
            <label for="baseColor">Base Color:</label>
            <input type="color" id="baseColor" name="baseColor" value="#ff5500">
            <span class="color-preview" id="baseColorPreview"></span>
            
            <label for="textColor">Text Color:</label>
            <input type="color" id="textColor" name="textColor" value="#000000">
            <span class="color-preview" id="textColorPreview"></span>
            
            <label for="bgColor">Background Color:</label>
            <input type="color" id="bgColor" name="bgColor" value="#ffffff">
            <span class="color-preview" id="bgColorPreview"></span>
            
            <button type="button" onclick="getColorValues()">Get Color Values</button>
            <button type="button" onclick="convertColorFormat()">Convert Color Format</button>
        </form>
    </div>

    <div class="demo-section">
        <h2>Color Operations</h2>
        <button type="button" onclick="showColorProperties()">Show Color Properties</button>
        <div id="output" class="output">Click a button to see results...</div>
    </div>

    <script>
        const baseColorInput = document.getElementById('baseColor');
        const textColorInput = document.getElementById('textColor');
        const bgColorInput = document.getElementById('bgColor');
        
        // Update previews
        function updatePreviews() {
            document.getElementById('baseColorPreview').style.backgroundColor = baseColorInput.value;
            document.getElementById('textColorPreview').style.backgroundColor = textColorInput.value;
            document.getElementById('bgColorPreview').style.backgroundColor = bgColorInput.value;
        }
        
        // Initial preview update
        updatePreviews();
        
        // Listen to color changes
        baseColorInput.addEventListener('input', function(e) {
            document.getElementById('baseColorPreview').style.backgroundColor = e.target.value;
        });
        
        textColorInput.addEventListener('input', function(e) {
            document.getElementById('textColorPreview').style.backgroundColor = e.target.value;
        });
        
        bgColorInput.addEventListener('input', function(e) {
            document.getElementById('bgColorPreview').style.backgroundColor = e.target.value;
        });
        
        // Get color values
        function getColorValues() {
            let result = 'COLOR VALUES:\n================\n\n';
            result += `baseColor: ${baseColorInput.value}\n`;
            result += `textColor: ${textColorInput.value}\n`;
            result += `bgColor: ${bgColorInput.value}`;
            
            document.getElementById('output').textContent = result;
        }
        
        // Convert color format
        function convertColorFormat() {
            const hex = baseColorInput.value;
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            
            let result = 'COLOR CONVERSION:\n================\n\n';
            result += `Original: ${hex}\n\n`;
            result += `RGB: rgb(${r}, ${g}, ${b})\n`;
            result += `RGBA: rgba(${r}, ${g}, ${b}, 1)\n`;
            result += `HSL: ${rgbToHsl(r, g, b)}\n`;
            result += `HEX (short): #${hex.slice(1, 3)}${hex.slice(3, 5)}${hex.slice(5, 7)}`;
            
            document.getElementById('output').textContent = result;
        }
        
        // RGB to HSL conversion
        function rgbToHsl(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            
            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            
            return `hsl(${Math.round(h * 360)}, ${Math.round(s * 100)}%, ${Math.round(l * 100)}%)`;
        }
        
        // Show color properties
        function showColorProperties() {
            let result = 'COLOR PROPERTIES:\n================\n\n';
            result += `baseColor.type: ${baseColorInput.type}\n`;
            result += `baseColor.value: ${baseColorInput.value}\n`;
            result += `baseColor.valueAsNumber: ${baseColorInput.valueAsNumber}\n`;
            result += `textColor.value: ${textColorInput.value}\n`;
            result += `bgColor.value: ${bgColorInput.value}`;
            
            document.getElementById('output').textContent = result;
        }
    </script>
</body>
</html>
