<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intersection Observer</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        .spacer { height: 200px; }
        #target { padding: 40px; background: lightblue; text-align: center; }
        #target.visible { background: lightgreen; }
    </style>
</head>
<body>
    <h1>Intersection Observer</h1>

    <div class="spacer"></div>
    <p>Scroll down to see the target element</p>
    
    <div id="target">Target Element</div>
    
    <div class="spacer"></div>

    <div id="demo1" class="demo">
        <h3>Intersection Info</h3>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Scroll to see intersection events...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        const target = document.getElementById('target');
        
        const observer = new IntersectionObserver((entries) => {
            for (let entry of entries) {
                target.classList.toggle('visible', entry.isIntersecting);
                output.textContent = 'isIntersecting: ' + entry.isIntersecting + '\n' +
                    'intersectionRatio: ' + entry.intersectionRatio.toFixed(2) + '\n' +
                    'boundingClientRect: ' + 
                        'top=' + entry.boundingClientRect.top.toFixed(0) + ', ' +
                        'bottom=' + entry.boundingClientRect.bottom.toFixed(0);
            }
        }, {
            threshold: [0, 0.25, 0.5, 0.75, 1]
        });
        
        observer.observe(target);
    </script>
</body>
</html>
