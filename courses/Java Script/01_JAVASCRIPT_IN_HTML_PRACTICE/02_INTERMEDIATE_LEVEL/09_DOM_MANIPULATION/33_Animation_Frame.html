<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Frame</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        #box { width: 50px; height: 50px; background: lightblue; position: relative; }
    </style>
</head>
<body>
    <h1>Animation Frame - requestAnimationFrame()</h1>

    <div id="demo1" class="demo">
        <h3>Smooth Animation</h3>
        <div id="box"></div>
        <button onclick="startAnimation()">Start Animation</button>
        <button onclick="stopAnimation()">Stop</button>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click Start Animation...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        const box = document.getElementById('box');
        let animationId;
        let position = 0;
        
        function animate() {
            position = (position + 2) % 300;
            box.style.left = position + 'px';
            box.style.background = position % 60 === 0 ? 
                'lightblue' : 'lightgreen';
            animationId = requestAnimationFrame(animate);
        }
        
        function startAnimation() {
            if (!animationId) {
                animate();
                output.textContent = 'Animation running...\n' +
                    'requestAnimationFrame() provides smooth 60fps';
            }
        }
        
        function stopAnimation() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
                output.textContent = 'Animation stopped at position: ' + position + 'px';
            }
        }
    </script>
</body>
</html>
