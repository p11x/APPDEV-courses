<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Window Events</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .output { background: #fff; padding: 15px; border-radius: 5px; min-height: 100px; }
    </style>
</head>
<body>
    <h1>39. Window Events</h1>
    
    <div class="demo">
        <h3>Window Event Types</h3>
        <p>Interact with the page to trigger events.</p>
    </div>
    
    <div class="demo">
        <h3>Resize Events</h3>
        <div class="output" id="resizeOutput">Resize the window...</div>
    </div>
    
    <div class="demo">
        <h3>Scroll Events</h3>
        <div class="output" id="scrollOutput">Scroll the page...</div>
    </div>
    
    <div class="demo">
        <h3>Other Window Events</h3>
        <div class="output" id="otherOutput">Focus/blur the window...</div>
    </div>
    
    <div style="height: 2000px;">
        <p>Scroll down for more content...</p>
    </div>
    
    <script>
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                document.getElementById('resizeOutput').innerHTML = 
                    'Width: ' + window.innerWidth + 'px<br>' +
                    'Height: ' + window.innerHeight + 'px';
            }, 150);
        });
        
        let scrollTimeout;
        window.addEventListener('scroll', () => {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                document.getElementById('scrollOutput').innerHTML = 
                    'scrollX: ' + window.scrollX + 'px<br>' +
                    'scrollY: ' + window.scrollY + 'px';
            }, 50);
        });
        
        window.addEventListener('load', () => {
            document.getElementById('otherOutput').innerHTML += '<br>load event fired';
        });
        
        window.addEventListener('beforeunload', (e) => {
            e.preventDefault();
            e.returnValue = '';
        });
        
        window.addEventListener('online', () => {
            document.getElementById('otherOutput').innerHTML += '<br>Window online';
        });
        
        window.addEventListener('offline', () => {
            document.getElementById('otherOutput').innerHTML += '<br>Window offline';
        });
        
        window.addEventListener('storage', (e) => {
            document.getElementById('otherOutput').innerHTML += '<br>Storage event';
        });
        
        window.addEventListener('popstate', () => {
            document.getElementById('otherOutput').innerHTML += '<br>Popstate event';
        });
    </script>
</body>
</html>
