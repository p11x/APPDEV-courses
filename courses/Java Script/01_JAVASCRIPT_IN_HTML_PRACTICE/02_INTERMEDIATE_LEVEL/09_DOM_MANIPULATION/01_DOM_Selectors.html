<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Selectors</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>DOM Selectors - getElementById, querySelector</h1>

    <!-- getElementById Example -->
    <div id="demo1" class="demo">
        <h3>getElementById</h3>
        <p id="target">This paragraph will be selected by ID</p>
        <button onclick="demoGetElementById()">Run getElementById</button>
    </div>

    <!-- querySelector Example -->
    <div id="demo2" class="demo">
        <h3>querySelector</h3>
        <ul>
            <li>First item</li>
            <li class="special">Second item with class</li>
            <li>Third item</li>
        </ul>
        <button onclick="demoQuerySelector()">Run querySelector</button>
    </div>

    <!-- Output Display -->
    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click a button to see output...</pre>
    </div>

    <script>
        // getElementById - selects element by its unique ID
        // Returns a single element or null if not found
        function demoGetElementById() {
            // Using getElementById to select element with id="target"
            const element = document.getElementById('target');
            // Display the tag name and text content of selected element
            document.getElementById('output').textContent = 
                'Selected: <' + element.tagName + '> "' + element.textContent + '"';
        }

        // querySelector - selects first element matching CSS selector
        // Can use any CSS selector (id, class, tag, attribute, etc.)
        function demoQuerySelector() {
            // Using querySelector to select first li with class "special"
            const element = document.querySelector('li.special');
            // Display the tag name and text content
            document.getElementById('output').textContent = 
                'Selected: <' + element.tagName + '> "' + element.textContent + '"';
        }
    </script>
</body>
</html>
