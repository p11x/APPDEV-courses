<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Manipulation</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        input { padding: 8px; margin: 5px; }
        a { display: block; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>Attribute Manipulation - getAttribute, setAttribute</h1>

    <!-- getAttribute -->
    <div id="demo1" class="demo">
        <h3>getAttribute</h3>
        <a id="link" href="https://google.com" target="_blank" title="Google Link">Google Link</a>
        <button onclick="getAttr()">Get Attributes</button>
    </div>

    <!-- setAttribute -->
    <div id="demo2" class="demo">
        <h3>setAttribute</h3>
        <input type="text" id="input1" value="Original value">
        <button onclick="setAttr()">Set Attribute</button>
    </div>

    <!-- removeAttribute -->
    <div id="demo3" class="demo">
        <h3>removeAttribute</h3>
        <input type="text" id="input2" value="Has placeholder" placeholder="Enter text">
        <button onclick="removeAttr()">Remove placeholder</button>
    </div>

    <!-- Output -->
    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        // getAttribute - retrieves attribute value
        function getAttr() {
            const link = document.getElementById('link');
            const href = link.getAttribute('href');
            const target = link.getAttribute('target');
            const title = link.getElementById('link').getAttribute('title');
            const custom = link.getAttribute('data-custom'); // Non-existent
            
            output.textContent = 
                'href: ' + href + '\n' +
                'target: ' + target + '\n' +
                'title: ' + title + '\n' +
                'data-custom (not exist): ' + custom;
        }
        
        // setAttribute - sets attribute value
        function setAttr() {
            const input = document.getElementById('input1');
            input.setAttribute('placeholder', 'New placeholder');
            input.setAttribute('disabled', 'true');
            
            output.textContent = "Set placeholder and disabled attributes";
        }
        
        // removeAttribute - removes attribute
        function removeAttr() {
            const input = document.getElementById('input2');
            input.removeAttribute('placeholder');
            
            output.textContent = "Removed placeholder attribute";
        }
    </script>
</body>
</html>
