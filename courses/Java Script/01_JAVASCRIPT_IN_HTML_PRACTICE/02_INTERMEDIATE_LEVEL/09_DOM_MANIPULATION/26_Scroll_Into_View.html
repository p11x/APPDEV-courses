<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Into View</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        .spacer { height: 300px; }
    </style>
</head>
<body>
    <h1>Scroll Into View - scrollIntoView()</h1>

    <div class="spacer"></div>
    
    <div id="target" style="background: lightblue; padding: 20px; margin: 20px 0;">
        Target Element (scroll here)
    </div>
    
    <div class="spacer"></div>

    <div id="demo1" class="demo">
        <h3>Basic scrollIntoView</h3>
        <button onclick="scrollToTop()">Scroll to Top</button>
        <button onclick="scrollToTarget()">Scroll to Target</button>
        <button onclick="scrollToBottom()">Scroll to Bottom</button>
    </div>

    <div id="demo2" class="demo">
        <h3>With Options</h3>
        <button onclick="smoothScroll()">Smooth Scroll</button>
        <button onclick="centerElement()">Center Element</button>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            output.textContent = 'Scrolled to top of page';
        }
        
        function scrollToTarget() {
            const target = document.getElementById('target');
            target.scrollIntoView();
            output.textContent = 'Scrolled to target element';
        }
        
        function scrollToBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            output.textContent = 'Scrolled to bottom of page';
        }
        
        function smoothScroll() {
            const target = document.getElementById('target');
            target.scrollIntoView({ behavior: 'smooth' });
            output.textContent = 'Smooth scroll to target';
        }
        
        function centerElement() {
            const target = document.getElementById('target');
            target.scrollIntoView({ block: 'center', behavior: 'smooth' });
            output.textContent = 'Element centered in viewport';
        }
    </script>
</body>
</html>
