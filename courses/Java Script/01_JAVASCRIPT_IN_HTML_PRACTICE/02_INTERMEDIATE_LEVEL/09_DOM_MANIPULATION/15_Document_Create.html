<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Create</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        .box { padding: 20px; background: lightblue; margin: 10px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Document Create - document.createDocumentFragment()</h1>

    <div id="demo1" class="demo">
        <h3>Creating DocumentFragment</h3>
        <p>DocumentFragment is a lightweight container for building DOM nodes efficiently.</p>
        <button onclick="createFragment()">Create Fragment</button>
        <div id="fragmentContainer"></div>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click button to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function createFragment() {
            const fragment = document.createDocumentFragment();
            
            for (let i = 1; i <= 5; i++) {
                const div = document.createElement('div');
                div.className = 'box';
                div.textContent = 'Item ' + i + ' (from fragment)';
                fragment.appendChild(div);
            }
            
            document.getElementById('fragmentContainer').appendChild(fragment);
            
            output.textContent = "DocumentFragment created with 5 items.\n" +
                "Fragments don't appear in DOM until appended.\n" +
                "This is efficient for batch insertions.";
        }
    </script>
</body>
</html>
