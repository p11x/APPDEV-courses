<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Manipulation</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        #box { width: 150px; height: 100px; background: lightblue; display: flex; align-items: center; justify-content: center; margin: 10px; }
    </style>
</head>
<body>
    <h1>Style Manipulation - style property</h1>

    <!-- Inline Style -->
    <div id="demo1" class="demo">
        <h3>Inline Style Properties</h3>
        <div id="box" class="box">Box</div>
        <button onclick="changeColor()">Change Color</button>
        <button onclick="changeSize()">Change Size</button>
        <button onclick="changeMultiple()">Multiple Properties</button>
    </div>

    <!-- getComputedStyle -->
    <div id="demo2" class="demo">
        <h3>getComputedStyle</h3>
        <div id="box2" style="width: 100px; height: 100px; background: lightgreen;"></div>
        <button onclick="getComputed()">Get Computed Style</button>
    </div>

    <!-- Output -->
    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        // Access inline style via element.style.property
        // CSS properties use camelCase (background-color -> backgroundColor)
        function changeColor() {
            const box = document.getElementById('box');
            box.style.backgroundColor = 'lightcoral';
            box.style.color = 'white';
            output.textContent = "Changed background-color and color";
        }
        
        function changeSize() {
            const box = document.getElementById('box');
            box.style.width = '200px';
            box.style.height = '150px';
            output.textContent = "Changed width and height";
        }
        
        function changeMultiple() {
            const box = document.getElementById('box');
            box.style.cssText = 'width: 120px; height: 120px; background: lightyellow; border: 2px solid orange;';
            output.textContent = "Changed multiple properties via cssText";
        }
        
        // getComputedStyle - gets computed (resolved) styles
        // Returns style object with all CSS values
        function getComputed() {
            const box = document.getElementById('box2');
            const styles = window.getComputedStyle(box);
            
            output.textContent = 
                'width: ' + styles.width + '\n' +
                'height: ' + styles.height + '\n' +
                'background-color: ' + styles.backgroundColor + '\n' +
                'font-size: ' + styles.fontSize;
        }
    </script>
</body>
</html>
