<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Elements</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; }
        #container { min-height: 50px; border: 2px dashed #ccc; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Create Elements - createElement, createTextNode</h1>

    <!-- createElement Example -->
    <div id="demo1" class="demo">
        <h3>createElement</h3>
        <p>Create new HTML elements dynamically</p>
        <button onclick="demoCreateElement()">Run createElement</button>
    </div>

    <!-- createTextNode Example -->
    <div id="demo2" class="demo">
        <h3>createTextNode</h3>
        <p>Create text nodes (plain text)</p>
        <button onclick="demoCreateTextNode()">Run createTextNode</button>
    </div>

    <!-- Combined Example -->
    <div id="demo3" class="demo">
        <h3>Combined - createElement + createTextNode</h3>
        <p>Create element with text content</p>
        <button onclick="demoCombined()">Run Combined</button>
    </div>

    <!-- Container -->
    <div class="demo">
        <h3>Container (Output):</h3>
        <div id="container">Container is empty</div>
    </div>

    <script>
        // createElement - creates a new element node
        // Takes tag name as argument (e.g., 'div', 'p', 'li')
        function demoCreateElement() {
            const container = document.getElementById('container');
            container.innerHTML = ''; // Clear container
            
            // Create a new div element
            const newDiv = document.createElement('div');
            newDiv.textContent = 'Created with createElement: New DIV';
            newDiv.style.background = 'lightgreen';
            
            container.appendChild(newDiv);
        }

        // createTextNode - creates a text node
        // Used for plain text without HTML tags
        function demoCreateTextNode() {
            const container = document.getElementById('container');
            container.innerHTML = ''; // Clear container
            
            // Create a text node (not an element)
            const textNode = document.createTextNode('This is a plain text node');
            const wrapper = document.createElement('p');
            wrapper.appendChild(textNode);
            wrapper.style.background = 'lightyellow';
            
            container.appendChild(wrapper);
        }

        // Combined - using createElement with text content
        function demoCombined() {
            const container = document.getElementById('container');
            container.innerHTML = ''; // Clear container
            
            // Create a list with items
            const ul = document.createElement('ul');
            
            const items = ['First item', 'Second item', 'Third item'];
            items.forEach(function(itemText) {
                const li = document.createElement('li');
                const text = document.createTextNode(itemText);
                li.appendChild(text);
                ul.appendChild(li);
            });
            
            container.appendChild(ul);
        }
    </script>
</body>
</html>
