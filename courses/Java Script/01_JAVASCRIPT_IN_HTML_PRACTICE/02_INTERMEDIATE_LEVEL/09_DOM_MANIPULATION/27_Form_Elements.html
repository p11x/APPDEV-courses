<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Elements</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        label { display: block; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Form Elements</h1>

    <div id="demo1" class="demo">
        <h3>Text Input</h3>
        <form id="form1">
            <label>Name: <input type="text" id="nameInput" value="John"></label>
            <label>Email: <input type="email" id="emailInput" value="john@test.com"></label>
        </form>
        <button onclick="getTextValues()">Get Values</button>
    </div>

    <div id="demo2" class="demo">
        <h3>Form Properties</h3>
        <form id="form2">
            <label>Age: <input type="number" id="ageInput" value="25"></label>
        </form>
        <button onclick="checkFormProperties()">Check Properties</button>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function getTextValues() {
            const name = document.getElementById('nameInput').value;
            const email = document.getElementById('emailInput').value;
            
            output.textContent = 'Name: ' + name + '\n' +
                'Email: ' + email + '\n' +
                'form property: ' + document.getElementById('nameInput').form.id;
        }
        
        function checkFormProperties() {
            const age = document.getElementById('ageInput');
            
            output.textContent = 'value: ' + age.value + '\n' +
                'defaultValue: ' + age.defaultValue + '\n' +
                'type: ' + age.type + '\n' +
                'disabled: ' + age.disabled + '\n' +
                'placeholder: ' + (age.placeholder || 'not set');
        }
    </script>
</body>
</html>
