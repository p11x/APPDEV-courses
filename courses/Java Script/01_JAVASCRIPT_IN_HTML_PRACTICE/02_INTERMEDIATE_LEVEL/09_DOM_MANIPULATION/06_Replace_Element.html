<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Replace Element</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        #container { min-height: 80px; border: 2px dashed #ccc; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Replace Element - replaceChild, replaceWith</h1>

    <!-- replaceChild Example -->
    <div id="demo1" class="demo">
        <h3>replaceChild</h3>
        <p>Replace a child element with a new node</p>
        <button onclick="demoReplaceChild()">Run replaceChild</button>
    </div>

    <!-- replaceWith Example -->
    <div id="demo2" class="demo">
        <h3>replaceWith</h3>
        <p>Replace element directly (modern method)</p>
        <button onclick="demoReplaceWith()">Run replaceWith</button>
    </div>

    <!-- Container -->
    <div class="demo">
        <h3>Container (Output):</h3>
        <div id="container">
            <div id="target">Original text</div>
        </div>
    </div>

    <script>
        // replaceChild - replaces one child node with another
        // Syntax: parent.replaceChild(newNode, oldNode)
        // Returns the replaced node
        function demoReplaceChild() {
            const container = document.getElementById('container');
            container.innerHTML = '<div id="target">Original text</div>';
            
            const target = document.getElementById('target');
            
            // Create new element to replace with
            const newElement = document.createElement('span');
            newElement.textContent = 'Replaced with span!';
            newElement.style.background = 'lightgreen';
            newElement.style.padding = '5px';
            
            // replaceChild(newNode, oldNode)
            container.replaceChild(newElement, target);
            
            document.getElementById('container').innerHTML += 
                '\n(replaced div with span using replaceChild)';
        }

        // replaceWith - replaces element with new content
        // Can take string (innerHTML replacement) or node
        function demoReplaceWith() {
            const container = document.getElementById('container');
            container.innerHTML = '<div id="target">Original text</div>';
            
            const target = document.getElementById('target');
            
            // Using replaceWith with a new element
            const newElement = document.createElement('p');
            newElement.textContent = 'Replaced with p using replaceWith!';
            newElement.style.background = 'lightyellow';
            newElement.style.padding = '5px';
            
            target.replaceWith(newElement);
            
            container.innerHTML += '\n(replaced div with p using replaceWith)';
        }
    </script>
</body>
</html>
