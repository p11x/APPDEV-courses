<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Computed</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        #target { width: 200px; padding: 20px; background: lightblue; border: 5px solid #333; margin: 10px; }
    </style>
</head>
<body>
    <h1>Style Computed - getComputedStyle()</h1>

    <div id="demo1" class="demo">
        <h3>Getting Computed Styles</h3>
        <div id="target">Target Element</div>
        <button onclick="getComputedStyles()">Get Computed Styles</button>
    </div>

    <div id="demo2" class="demo">
        <h3>Getting Specific Properties</h3>
        <button onclick="getSpecificStyles()">Get Specific</button>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function getComputedStyles() {
            const elem = document.getElementById('target');
            const styles = window.getComputedStyle(elem);
            
            output.textContent = 'width: ' + styles.width + '\n' +
                'height: ' + styles.height + '\n' +
                'padding: ' + styles.padding + '\n' +
                'background-color: ' + styles.backgroundColor + '\n' +
                'border-width: ' + styles.borderWidth + '\n' +
                'font-size: ' + styles.fontSize;
        }
        
        function getSpecificStyles() {
            const elem = document.getElementById('target');
            const styles = window.getComputedStyle(elem);
            
            const width = styles.getPropertyValue('width');
            const border = styles.getPropertyValue('border');
            
            output.textContent = 'getPropertyValue("width"): ' + width + '\n' +
                'getPropertyValue("border"): ' + border;
        }
    </script>
</body>
</html>
