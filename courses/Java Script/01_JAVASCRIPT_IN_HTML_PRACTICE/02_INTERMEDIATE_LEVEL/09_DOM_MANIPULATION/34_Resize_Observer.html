<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resize Observer</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        #resizable { width: 200px; height: 100px; background: lightblue; padding: 10px; overflow: auto; resize: both; border: 1px solid #333; }
    </style>
</head>
<body>
    <h1>Resize Observer</h1>

    <div id="demo1" class="demo">
        <h3>Observing Element Resize</h3>
        <p>Resize the box below to see the observer in action:</p>
        <div id="resizable">Resize me! (drag bottom-right corner)</div>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Resize the box to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        const resizable = document.getElementById('resizable');
        
        const observer = new ResizeObserver((entries) => {
            for (let entry of entries) {
                output.textContent = 'Element resized!\n' +
                    'Content box: ' + entry.contentRect.width.toFixed(1) + ' x ' + entry.contentRect.height.toFixed(1) + '\n' +
                    'Border box: ' + entry.borderBoxSize[0].inlineSize.toFixed(1) + ' x ' + entry.borderBoxSize[0].blockSize.toFixed(1);
            }
        });
        
        observer.observe(resizable);
    </script>
</body>
</html>
