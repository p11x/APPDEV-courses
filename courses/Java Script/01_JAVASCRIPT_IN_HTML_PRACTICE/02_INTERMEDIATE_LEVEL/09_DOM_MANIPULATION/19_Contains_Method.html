<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contains Method</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        .parent { padding: 20px; background: lightblue; border-radius: 5px; }
        .child { padding: 10px; background: lightgreen; margin: 10px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Contains Method - contains()</h1>

    <div id="demo1" class="demo">
        <h3>Checking Element Contains</h3>
        <div id="parent1" class="parent">
            Parent Element
            <div id="child1" class="child">Child Element</div>
        </div>
        <button onclick="checkContains()">Check contains</button>
    </div>

    <div id="demo2" class="demo">
        <h3>Checking Same Element</h3>
        <div id="parent2" class="parent">Same Element Test</div>
        <button onclick="checkSameElement()">Check same element</button>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function checkContains() {
            const parent = document.getElementById('parent1');
            const child = document.getElementById('child1');
            
            const result1 = parent.contains(child);
            const result2 = child.contains(parent);
            const result3 = parent.contains(parent);
            
            output.textContent = "parent.contains(child): " + result1 + "\n" +
                "child.contains(parent): " + result2 + "\n" +
                "parent.contains(parent): " + result3;
        }
        
        function checkSameElement() {
            const elem = document.getElementById('parent2');
            const result = elem.contains(elem);
            output.textContent = "Element contains itself: " + result + "\n" +
                "(Always returns true)";
        }
    </script>
</body>
</html>
