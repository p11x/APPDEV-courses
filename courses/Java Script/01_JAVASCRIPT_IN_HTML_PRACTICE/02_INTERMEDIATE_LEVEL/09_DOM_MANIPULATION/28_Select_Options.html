<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Options</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>Select Options</h1>

    <div id="demo1" class="demo">
        <h3>Select Element</h3>
        <select id="country">
            <option value="us">United States</option>
            <option value="uk">United Kingdom</option>
            <option value="ca">Canada</option>
            <option value="au">Australia</option>
        </select>
        <button onclick="getSelected()">Get Selected</button>
        <button onclick="getAllOptions()">Get All Options</button>
    </div>

    <div id="demo2" class="demo">
        <h3>Adding/Removing Options</h3>
        <select id="dynamicSelect"></select>
        <button onclick="addOption()">Add Option</button>
        <button onclick="removeOption()">Remove Option</button>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function getSelected() {
            const select = document.getElementById('country');
            const selected = select.options[select.selectedIndex];
            
            output.textContent = 'Selected index: ' + select.selectedIndex + '\n' +
                'Selected value: ' + select.value + '\n' +
                'Selected text: ' + selected.text;
        }
        
        function getAllOptions() {
            const select = document.getElementById('country');
            let result = 'All options:\n';
            
            for (let i = 0; i < select.options.length; i++) {
                result += i + ': ' + select.options[i].text + ' (' + select.options[i].value + ')\n';
            }
            output.textContent = result;
        }
        
        let optionCount = 0;
        function addOption() {
            const select = document.getElementById('dynamicSelect');
            optionCount++;
            const option = new Option('Option ' + optionCount, 'val' + optionCount);
            select.add(option);
            output.textContent = 'Added option: Option ' + optionCount;
        }
        
        function removeOption() {
            const select = document.getElementById('dynamicSelect');
            if (select.options.length > 0) {
                select.remove(select.options.length - 1);
                output.textContent = 'Removed last option';
            } else {
                output.textContent = 'No options to remove';
            }
        }
    </script>
</body>
</html>
