<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class List</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        .box { width: 100px; height: 100px; background: lightblue; display: flex; align-items: center; justify-content: center; margin: 10px; }
        .red { background: lightcoral !important; }
        .green { background: lightgreen !important; }
        .bold { font-weight: bold; }
        .border { border: 3px solid #333; }
    </style>
</head>
<body>
    <h1>Class List - classList methods</h1>

    <!-- add/remove -->
    <div id="demo1" class="demo">
        <h3>add(), remove()</h3>
        <div id="box1" class="box">Box 1</div>
        <button onclick="addClass()">Add 'red'</button>
        <button onclick="removeClass()">Remove 'red'</button>
    </div>

    <!-- toggle -->
    <div id="demo2" class="demo">
        <h3>toggle()</h3>
        <div id="box2" class="box">Box 2</div>
        <button onclick="box2.classList.toggle('green')">Toggle 'green'</button>
    </div>

    <!-- contains -->
    <div id="demo3" class="demo">
        <h3>contains()</h3>
        <div id="box3" class="box red">Box 3 (has 'red')</div>
        <button onclick="checkClass()">Check for 'red'</button>
    </div>

    <!-- Output -->
    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        // add() - adds one or more classes
        function addClass() {
            const box = document.getElementById('box1');
            box.classList.add('red');
            output.textContent = "Added 'red' class. Classes: " + box.className;
        }
        
        // remove() - removes one or more classes
        function removeClass() {
            const box = document.getElementById('box1');
            box.classList.remove('red');
            output.textContent = "Removed 'red' class. Classes: " + box.className;
        }
        
        // toggle() - adds if not present, removes if present
        function checkToggle(element) {
            const wasAdded = element.classList.toggle('green');
            output.textContent = wasAdded ? "Added 'green'" : "Removed 'green'";
            output.textContent += "\nClasses: " + element.className;
        }
        
        // contains() - checks if class exists (returns boolean)
        function checkClass() {
            const box = document.getElementById('box3');
            const hasRed = box.classList.contains('red');
            const hasGreen = box.classList.contains('green');
            output.textContent = 
                "contains('red'): " + hasRed + "\n" +
                "contains('green'): " + hasGreen + "\n" +
                "All classes: " + box.className;
        }
    </script>
</body>
</html>
