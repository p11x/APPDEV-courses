<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Events</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>40. Document Events</h1>
    
    <div class="demo">
        <h3>Document Ready Events</h3>
        <div id="readyOutput">Waiting for DOM...</div>
    </div>
    
    <div class="demo">
        <h3>Selection Events</h3>
        <div id="selectionOutput">Select some text on this page...</div>
    </div>
    
    <div class="demo">
        <h3>Visibility Events</h3>
        <div id="visibilityOutput">Check visibility...</div>
    </div>
    
    <div class="demo">
        <h3>Interactive Events</h3>
        <button id="testBtn">Click Me</button>
        <button id="testBtn2">Double Click</button>
        <div id="clickOutput">Click events appear here...</div>
    </div>
    
    <div class="demo">
        <h3>Output</h3>
        <pre id="output"></pre>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('readyOutput').innerHTML = 'DOMContentLoaded fired!';
        });
        
        document.addEventListener('readystatechange', () => {
            document.getElementById('readyOutput').innerHTML += '<br>readystate: ' + document.readyState;
        });
        
        document.addEventListener('selectionchange', () => {
            const selection = document.getSelection();
            if (selection.toString()) {
                document.getElementById('selectionOutput').textContent = 
                    'Selected: "' + selection.toString() + '"';
            }
        });
        
        document.addEventListener('visibilitychange', () => {
            const status = document.hidden ? 'hidden' : 'visible';
            document.getElementById('visibilityOutput').textContent = 
                'Page is: ' + status;
        });
        
        document.getElementById('testBtn').addEventListener('click', (e) => {
            document.getElementById('clickOutput').textContent = 'Button clicked!';
        });
        
        document.getElementById('testBtn2').addEventListener('dblclick', (e) => {
            document.getElementById('clickOutput').textContent = 'Double clicked!';
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                document.getElementById('output').textContent = 'Ctrl+S pressed';
            }
        });
        
        document.addEventListener('mouseover', (e) => {
            if (e.target.tagName === 'BUTTON') {
                document.getElementById('output').textContent = 'Hovering: ' + e.target.textContent;
            }
        });
    </script>
</body>
</html>
