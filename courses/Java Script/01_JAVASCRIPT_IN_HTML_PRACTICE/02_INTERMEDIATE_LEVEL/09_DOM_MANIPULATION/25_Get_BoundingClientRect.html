<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get BoundingClientRect</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        #box { width: 150px; height: 80px; background: lightblue; padding: 10px; border: 3px solid #333; margin: 20px; }
    </style>
</head>
<body>
    <h1>Get BoundingClientRect</h1>

    <div id="demo1" class="demo">
        <h3>Getting Element Position</h3>
        <div id="box">Box Element</div>
        <button onclick="getBoundingRect()">Get BoundingRect</button>
    </div>

    <div id="demo2" class="demo">
        <h3>Getting Relative to Viewport</h3>
        <button onclick="getViewportPosition()">Get Viewport Position</button>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function getBoundingRect() {
            const box = document.getElementById('box');
            const rect = box.getBoundingClientRect();
            
            output.textContent = 'x: ' + rect.x + '\n' +
                'y: ' + rect.y + '\n' +
                'top: ' + rect.top + '\n' +
                'right: ' + rect.right + '\n' +
                'bottom: ' + rect.bottom + '\n' +
                'left: ' + rect.left + '\n' +
                'width: ' + rect.width + '\n' +
                'height: ' + rect.height;
        }
        
        function getViewportPosition() {
            const box = document.getElementById('box');
            const rect = box.getBoundingClientRect();
            
            output.textContent = 'Position relative to viewport:\n' +
                'left: ' + rect.left + 'px\n' +
                'top: ' + rect.top + 'px\n' +
                'Note: Values change on scroll!';
        }
    </script>
</body>
</html>
