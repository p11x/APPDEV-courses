<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove Element</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        #container { min-height: 80px; border: 2px dashed #ccc; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Remove Element - removeChild, remove()</h1>

    <!-- removeChild Example -->
    <div id="demo1" class="demo">
        <h3>removeChild</h3>
        <p>Remove a child element from parent (returns removed node)</p>
        <button onclick="demoRemoveChild()">Run removeChild</button>
    </div>

    <!-- remove() Example -->
    <div id="demo2" class="demo">
        <h3>remove()</h3>
        <p>Remove element directly (modern method)</p>
        <button onclick="demoRemove()">Run remove()</button>
    </div>

    <!-- Container -->
    <div class="demo">
        <h3>Container (Output):</h3>
        <div id="container">
            <div id="item1">Item 1</div>
            <div id="item2">Item 2</div>
            <div id="item3">Item 3</div>
        </div>
    </div>

    <script>
        // removeChild - removes a child node from the DOM
        // Returns the removed node (can be stored and reused)
        // Syntax: parent.removeChild(child)
        function demoRemoveChild() {
            const container = document.getElementById('container');
            container.innerHTML = ''; // Reset
            
            // Create items
            for (let i = 1; i <= 3; i++) {
                const item = document.createElement('div');
                item.id = 'item' + i;
                item.textContent = 'Item ' + i;
                item.style.padding = '5px';
                item.style.margin = '2px';
                item.style.background = 'lightgreen';
                item.style.cursor = 'pointer';
                item.onclick = function() { removeItem(this); };
                container.appendChild(item);
            }
            
            function removeItem(element) {
                // removeChild returns the removed element
                const removed = container.removeChild(element);
                console.log('Removed:', removed.textContent);
            }
        }

        // remove() - modern method to remove element directly
        // No return value, simply removes element from DOM
        function demoRemove() {
            const container = document.getElementById('container');
            container.innerHTML = ''; // Reset
            
            // Create items with different colors
            const colors = ['lightcoral', 'lightblue', 'lightyellow'];
            for (let i = 1; i <= 3; i++) {
                const item = document.createElement('div');
                item.id = 'item' + i;
                item.textContent = 'Click to remove Item ' + i;
                item.style.padding = '5px';
                item.style.margin = '2px';
                item.style.background = colors[i-1];
                item.style.cursor = 'pointer';
                item.onclick = function() { this.remove(); }; // Direct remove()
                container.appendChild(item);
            }
        }
    </script>
</body>
</html>
