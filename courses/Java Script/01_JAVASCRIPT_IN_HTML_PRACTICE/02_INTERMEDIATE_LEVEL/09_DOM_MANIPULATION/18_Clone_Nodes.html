<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clone Nodes</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        .item { padding: 10px; background: lightblue; margin: 5px 0; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Clone Nodes - cloneNode()</h1>

    <div id="demo1" class="demo">
        <h3>Shallow Clone (false)</h3>
        <div id="source1">
            <div class="item" data-id="1">Parent <span style="background:yellow;">Child Span</span></div>
        </div>
        <button onclick="shallowClone()">Clone (shallow)</button>
    </div>

    <div id="demo2" class="demo">
        <h3>Deep Clone (true)</h3>
        <div id="source2">
            <div class="item" data-id="2">Parent <span style="background:yellow;">Child Span</span></div>
        </div>
        <button onclick="deepClone()">Clone (deep)</button>
    </div>

    <div class="demo">
        <h3>Cloned elements appear here:</h3>
        <div id="cloneContainer"></div>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function shallowClone() {
            const source = document.querySelector('#source1 .item');
            const clone = source.cloneNode(false);
            document.getElementById('cloneContainer').appendChild(clone);
            output.textContent = "Shallow clone: only the element itself\n" +
                "Child elements are NOT copied.";
        }
        
        function deepClone() {
            const source = document.querySelector('#source2 .item');
            const clone = source.cloneNode(true);
            document.getElementById('cloneContainer').appendChild(clone);
            output.textContent = "Deep clone: element and ALL children\n" +
                "are copied including nested elements.";
        }
    </script>
</body>
</html>
