<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Attributes</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        .card { padding: 15px; margin: 10px 0; background: lightblue; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Data Attributes - dataset usage</h1>

    <!-- Data Attributes Demo -->
    <div id="demo1" class="demo">
        <h3>Reading Data Attributes</h3>
        <div class="card" data-id="1" data-name="John" data-role="admin">User: John (id: 1, role: admin)</div>
        <div class="card" data-id="2" data-name="Jane" data-role="user">User: Jane (id: 2, role: user)</div>
        <button onclick="readData()">Read Data Attributes</button>
    </div>

    <!-- Writing Data Attributes -->
    <div id="demo2" class="demo">
        <h3>Writing Data Attributes</h3>
        <div id="dynamicCard" class="card">Empty Card</div>
        <button onclick="writeData()">Set Data Attributes</button>
    </div>

    <!-- Dataset API -->
    <div id="demo3" class="demo">
        <h3>dataset API</h3>
        <div id="info" data-user-name="JohnDoe" data-user-age="25" data-active="true">Info Element</div>
        <button onclick="useDataset()">Use dataset</button>
    </div>

    <!-- Output -->
    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        // Data attributes are accessed via data-* attributes in HTML
        // Use element.dataset.property (camelCase for multi-word)
        function readData() {
            const cards = document.querySelectorAll('.card');
            let result = '';
            cards.forEach(function(card) {
                const id = card.dataset.id;
                const name = card.dataset.name;
                const role = card.dataset.role;
                result += 'ID: ' + id + ', Name: ' + name + ', Role: ' + role + '\n';
            });
            output.textContent = result;
        }
        
        // Writing data attributes via dataset
        function writeData() {
            const card = document.getElementById('dynamicCard');
            
            // Set data attributes using dataset
            card.dataset.id = '100';
            card.dataset.category = 'premium';
            card.dataset.price = '99.99';
            
            // Also set as data attributes directly
            card.setAttribute('data-created', new Date().toISOString());
            
            output.textContent = 
                'Set data-id: ' + card.dataset.id + '\n' +
                'Set data-category: ' + card.dataset.category + '\n' +
                'Set data-price: ' + card.dataset.price + '\n' +
                'Set data-created: ' + card.getAttribute('data-created');
        }
        
        // dataset provides easy access to data attributes
        // Multi-word attributes use camelCase (user-name -> userName)
        function useDataset() {
            const info = document.getElementById('info');
            
            // Reading
            const name = info.dataset.userName;
            const age = info.dataset.userAge;
            const active = info.dataset.active;
            
            // Writing
            info.dataset.lastLogin = '2024-01-15';
            
            output.textContent = 
                'userName: ' + name + '\n' +
                'userAge: ' + age + '\n' +
                'active: ' + active + '\n' +
                'lastLogin (added): ' + info.dataset.lastLogin;
        }
    </script>
</body>
</html>
