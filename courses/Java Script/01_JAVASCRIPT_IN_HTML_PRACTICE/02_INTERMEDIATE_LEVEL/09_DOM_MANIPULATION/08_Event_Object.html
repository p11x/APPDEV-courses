<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Object</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        #target { width: 200px; height: 100px; background: lightblue; padding: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Event Object - Event object properties</h1>

    <!-- Event Properties Demo -->
    <div id="demo1" class="demo">
        <h3>Event Object Properties</h3>
        <div id="target">Click or hover this box</div>
    </div>

    <!-- Mouse Position Demo -->
    <div id="demo2" class="demo">
        <h3>Mouse Position</h3>
        <p>Move mouse over this area:</p>
        <div id="mouseArea" style="height: 100px; background: lightyellow; border: 1px solid #ccc;"></div>
    </div>

    <!-- Output -->
    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click/hover to see event properties...</pre>
    </div>

    <script>
        // Event object - automatically passed to event handler
        // Contains properties about the event
        
        const target = document.getElementById('target');
        const output = document.getElementById('output');
        
        // type - the type of event
        // target - the element that triggered the event
        // currentTarget - the element the listener is attached to
        // timestamp - when the event occurred
        target.addEventListener('click', function(event) {
            output.textContent = 
                'type: ' + event.type + '\n' +
                'target id: ' + event.target.id + '\n' +
                'currentTarget id: ' + event.currentTarget.id + '\n' +
                'timestamp: ' + event.timeStamp + '\n' +
                'button: ' + event.button + ' (0=left)';
        });
        
        // Mouse position properties
        const mouseArea = document.getElementById('mouseArea');
        
        mouseArea.addEventListener('mousemove', function(event) {
            // clientX/Y - position relative to viewport
            // pageX/Y - position relative to document
            // offsetX/Y - position relative to target element
            output.textContent = 
                'clientX: ' + event.clientX + '\n' +
                'clientY: ' + event.clientY + '\n' +
                'pageX: ' + event.pageX + '\n' +
                'pageY: ' + event.pageY + '\n' +
                'offsetX: ' + event.offsetX + '\n' +
                'offsetY: ' + event.offsetY;
        });
        
        // key properties for keyboard events
        document.addEventListener('keydown', function(event) {
            output.textContent = 
                'key: ' + event.key + '\n' +
                'code: ' + event.code + '\n' +
                'keyCode: ' + event.keyCode + '\n' +
                'ctrlKey: ' + event.ctrlKey + '\n' +
                'shiftKey: ' + event.shiftKey;
        });
    </script>
</body>
</html>
