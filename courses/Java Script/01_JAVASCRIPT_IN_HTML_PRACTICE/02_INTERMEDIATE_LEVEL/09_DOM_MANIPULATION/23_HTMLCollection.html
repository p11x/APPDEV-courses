<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTMLCollection</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>HTMLCollection</h1>

    <div id="demo1" class="demo">
        <h3>getElementsByClassName returns HTMLCollection</h3>
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
        <button onclick="iterateCollection()">Iterate Collection</button>
    </div>

    <div id="demo2" class="demo">
        <h3>HTMLCollection is Live</h3>
        <div id="container2">
            <span>Span 1</span>
        </div>
        <button onclick="testLiveCollection()">Test Live</button>
    </div>

    <div id="demo3" class="demo">
        <h3>Accessing by Index and Name</h3>
        <form name="myForm">
            <input type="text" name="username" value="John">
            <input type="text" name="email" value="john@example.com">
        </form>
        <button onclick="accessByName()">Access by name</button>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function iterateCollection() {
            const items = document.getElementsByClassName('item');
            let result = 'HTMLCollection length: ' + items.length + '\nItems: ';
            for (let i = 0; i < items.length; i++) {
                result += items[i].textContent + ' ';
            }
            output.textContent = result;
        }
        
        function testLiveCollection() {
            const container = document.getElementById('container2');
            const spans = container.getElementsByTagName('span');
            
            output.textContent = 'Before: ' + spans.length + ' spans';
            
            const newSpan = document.createElement('span');
            newSpan.textContent = 'Span 2';
            container.appendChild(newSpan);
            
            output.textContent += '\nAfter adding: ' + spans.length + ' spans';
        }
        
        function accessByName() {
            const form = document.forms.myForm;
            const username = form.username;
            const email = form['email'];
            
            output.textContent = 'Username: ' + username.value + '\n' +
                'Email: ' + email.value + '\n' +
                'Form length: ' + form.length + ' elements';
        }
    </script>
</body>
</html>
