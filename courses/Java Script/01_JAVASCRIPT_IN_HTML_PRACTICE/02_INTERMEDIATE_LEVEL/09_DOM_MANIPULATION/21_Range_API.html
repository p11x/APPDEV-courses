<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Range API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>Range API</h1>

    <div id="demo1" class="demo">
        <h3>Creating and Using Range</h3>
        <div id="container">
            <p id="para">This is a paragraph with <strong>bold text</strong> and <em>italic text</em>.</p>
        </div>
        <button onclick="createRange()">Create Range</button>
        <button onclick="extractContent()">Extract Content</button>
    </div>

    <div id="demo2" class="demo">
        <h3>Range Bounds</h3>
        <div id="container2">
            <span id="start">START</span> middle <span id="end">END</span>
        </div>
        <button onclick="selectRange()">Select Between</button>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function createRange() {
            const para = document.getElementById('para');
            const strong = para.querySelector('strong');
            
            const range = document.createRange();
            range.setStart(para.firstChild, 5);
            range.setEnd(strong.firstChild, 4);
            
            output.textContent = "Range created:\n" +
                "Start: text node at offset 5\n" +
                "End: text node at offset 4\n" +
                "Selected: '" + range.toString() + "'";
        }
        
        function extractContent() {
            const range = document.createRange();
            const para = document.getElementById('para');
            range.selectNodeContents(para);
            
            const fragment = range.extractContents();
            output.textContent = "Extracted content:\n" + fragment.textContent;
        }
        
        function selectRange() {
            const start = document.getElementById('start');
            const end = document.getElementById('end');
            
            const range = document.createRange();
            range.setStartAfter(start);
            range.setEndBefore(end);
            
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            
            output.textContent = "Range selected: '" + range.toString() + "'";
        }
    </script>
</body>
</html>
