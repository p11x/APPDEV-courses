<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Listeners</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        .box { width: 100px; height: 100px; background: lightblue; display: flex; align-items: center; justify-content: center; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Event Listeners - addEventListener</h1>

    <!-- Basic addEventListener -->
    <div id="demo1" class="demo">
        <h3>addEventListener - Click Event</h3>
        <button id="btn1">Click Me</button>
    </div>

    <!-- Multiple Events -->
    <div id="demo2" class="demo">
        <h3>Multiple Event Listeners</h3>
        <div id="box" class="box">Hover/Click Me</div>
    </div>

    <!-- Remove Event Listener -->
    <div id="demo3" class="demo">
        <h3>removeEventListener</h3>
        <button id="btn2">Add Click Handler</button>
        <button id="btn3">Remove Click Handler</button>
        <p id="status">Handler status: Not added</p>
    </div>

    <!-- Output -->
    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        // addEventListener - attaches event handler to element
        // Syntax: element.addEventListener(event, handler, useCapture)
        
        // Example 1: Basic click event
        const btn1 = document.getElementById('btn1');
        btn1.addEventListener('click', function() {
            document.getElementById('output').textContent = 'Button clicked!';
        });

        // Example 2: Multiple events on same element
        const box = document.getElementById('box');
        
        // Mouse enter event
        box.addEventListener('mouseenter', function() {
            box.style.background = 'lightgreen';
            box.textContent = 'Mouse entered!';
        });
        
        // Mouse leave event
        box.addEventListener('mouseleave', function() {
            box.style.background = 'lightblue';
            box.textContent = 'Hover/Click Me';
        });
        
        // Click event (additional)
        box.addEventListener('click', function() {
            box.textContent = 'Clicked!';
        });

        // Example 3: Remove event listener
        const btn2 = document.getElementById('btn2');
        const btn3 = document.getElementById('btn3');
        const status = document.getElementById('status');
        
        function handler() {
            document.getElementById('output').textContent = 'Handler executed!';
        }
        
        let handlerAdded = false;
        
        btn2.addEventListener('click', function() {
            if (!handlerAdded) {
                btn1.addEventListener('click', handler);
                handlerAdded = true;
                status.textContent = 'Handler status: Added';
            }
        });
        
        btn3.addEventListener('click', function() {
            if (handlerAdded) {
                btn1.removeEventListener('click', handler);
                handlerAdded = false;
                status.textContent = 'Handler status: Removed';
            }
        });
    </script>
</body>
</html>
