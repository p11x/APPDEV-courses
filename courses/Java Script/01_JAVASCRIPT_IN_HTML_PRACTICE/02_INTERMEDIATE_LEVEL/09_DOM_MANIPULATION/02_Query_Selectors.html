<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query Selectors</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>DOM Selectors - querySelectorAll, matches</h1>

    <!-- querySelectorAll Example -->
    <div id="demo1" class="demo">
        <h3>querySelectorAll</h3>
        <ul id="list">
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
            <li>Item 4</li>
        </ul>
        <button onclick="demoQuerySelectorAll()">Run querySelectorAll</button>
    </div>

    <!-- matches Example -->
    <div id="demo2" class="demo">
        <h3>matches</h3>
        <div id="checkElement" class="item active">Check if this matches</div>
        <button onclick="demoMatches()">Run matches</button>
    </div>

    <!-- Output Display -->
    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click a button to see output...</pre>
    </div>

    <script>
        // querySelectorAll - returns all elements matching CSS selector
        // Returns a NodeList (static, not live)
        function demoQuerySelectorAll() {
            // Selecting all li elements inside #list
            const items = document.querySelectorAll('#list li');
            
            // Iterate through the NodeList and collect text content
            let result = 'Found ' + items.length + ' items:\n';
            items.forEach(function(item, index) {
                result += index + ': ' + item.textContent + '\n';
            });
            
            document.getElementById('output').textContent = result;
        }

        // matches - checks if element matches a CSS selector
        // Returns true or false
        function demoMatches() {
            const element = document.getElementById('checkElement');
            
            // Check if element matches different selectors
            const checks = [
                element.matches('.item'),
                element.matches('.active'),
                element.matches('.item.active'),
                element.matches('#checkElement'),
                element.matches('div')
            ];
            
            let result = 'Matches checks:\n';
            result += '.item: ' + checks[0] + '\n';
            result += '.active: ' + checks[1] + '\n';
            result += '.item.active: ' + checks[2] + '\n';
            result += '#checkElement: ' + checks[3] + '\n';
            result += 'div: ' + checks[4];
            
            document.getElementById('output').textContent = result;
        }
    </script>
</body>
</html>
