<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Append Child</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
        #container { min-height: 80px; border: 2px dashed #ccc; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Append Child - appendChild, insertBefore</h1>

    <!-- appendChild Example -->
    <div id="demo1" class="demo">
        <h3>appendChild</h3>
        <p>Add element as the last child of parent</p>
        <button onclick="demoAppendChild()">Run appendChild</button>
    </div>

    <!-- insertBefore Example -->
    <div id="demo2" class="demo">
        <h3>insertBefore</h3>
        <p>Insert element before a specified child</p>
        <button onclick="demoInsertBefore()">Run insertBefore</button>
    </div>

    <!-- Container -->
    <div class="demo">
        <h3>Container (Output):</h3>
        <div id="container">Original content</div>
    </div>

    <script>
        // appendChild - adds a node to the end of the list of children
        // Works on any parent element
        function demoAppendChild() {
            const container = document.getElementById('container');
            container.innerHTML = ''; // Clear
            
            // Create multiple items and append them
            for (let i = 1; i <= 3; i++) {
                const newItem = document.createElement('div');
                newItem.textContent = 'Item ' + i + ' (appended)';
                newItem.style.padding = '5px';
                newItem.style.margin = '2px';
                newItem.style.background = 'lightgreen';
                container.appendChild(newItem); // Adds to end
            }
        }

        // insertBefore - inserts a node before a reference node
        // Takes two arguments: new node and reference node
        function demoInsertBefore() {
            const container = document.getElementById('container');
            container.innerHTML = ''; // Clear
            
            // Create initial items
            const items = ['First', 'Third'];
            items.forEach(function(text) {
                const div = document.createElement('div');
                div.textContent = text;
                div.style.padding = '5px';
                div.style.margin = '2px';
                div.style.background = 'lightblue';
                container.appendChild(div);
            });
            
            // Now insert "Second" before "Third" (last child)
            const secondItem = document.createElement('div');
            secondItem.textContent = 'Second (inserted before Third)';
            secondItem.style.padding = '5px';
            secondItem.style.margin = '2px';
            secondItem.style.background = 'lightyellow';
            
            // Get reference node (last child)
            const referenceNode = container.lastChild;
            container.insertBefore(secondItem, referenceNode);
        }
    </script>
</body>
</html>
