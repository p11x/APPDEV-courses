<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>File Upload</h1>

    <div id="demo1" class="demo">
        <h3>Single File Input</h3>
        <input type="file" id="fileInput">
        <button onclick="getFileInfo()">Get File Info</button>
    </div>

    <div id="demo2" class="demo">
        <h3>Multiple Files</h3>
        <input type="file" id="multiFileInput" multiple>
        <button onclick="getMultipleFiles()">Get Multiple Files</button>
    </div>

    <div id="demo3" class="demo">
        <h3>File Type Filter</h3>
        <input type="file" id="imageInput" accept="image/*">
        <button onclick="getImageInfo()">Get Image Info</button>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Select a file and click button...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function getFileInfo() {
            const input = document.getElementById('fileInput');
            const file = input.files[0];
            
            if (file) {
                output.textContent = 'File name: ' + file.name + '\n' +
                    'File size: ' + file.size + ' bytes\n' +
                    'File type: ' + file.type + '\n' +
                    'Last modified: ' + new Date(file.lastModified);
            } else {
                output.textContent = 'No file selected';
            }
        }
        
        function getMultipleFiles() {
            const input = document.getElementById('multiFileInput');
            const files = input.files;
            
            if (files.length > 0) {
                let result = 'Number of files: ' + files.length + '\n';
                for (let i = 0; i < files.length; i++) {
                    result += 'File ' + (i + 1) + ': ' + files[i].name + '\n';
                }
                output.textContent = result;
            } else {
                output.textContent = 'No files selected';
            }
        }
        
        function getImageInfo() {
            const input = document.getElementById('imageInput');
            const file = input.files[0];
            
            if (file && file.type.startsWith('image/')) {
                output.textContent = 'Image file: ' + file.name + '\n' +
                    'Type: ' + file.type + '\n' +
                    'Size: ' + (file.size / 1024).toFixed(2) + ' KB';
            } else if (file) {
                output.textContent = 'Selected file is not an image';
            } else {
                output.textContent = 'No image selected';
            }
        }
    </script>
</body>
</html>
