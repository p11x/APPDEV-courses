<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NodeList Iteration</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>NodeList Iteration</h1>

    <div id="demo1" class="demo">
        <h3>querySelectorAll returns NodeList</h3>
        <ul id="list">
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>
        <button onclick="iterateFor()">for loop</button>
        <button onclick="iterateForEach()">forEach</button>
        <button onclick="iterateForOf()">for...of</button>
    </div>

    <div id="demo2" class="demo">
        <h3>Live vs Static NodeList</h3>
        <div id="container2">
            <p>Paragraph 1</p>
            <p>Paragraph 2</p>
        </div>
        <button onclick="showLiveNodeList()">Test Live NodeList</button>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        const items = document.querySelectorAll('#list li');
        
        function iterateFor() {
            let result = 'for loop: ';
            for (let i = 0; i < items.length; i++) {
                result += items[i].textContent + ' ';
            }
            output.textContent = result;
        }
        
        function iterateForEach() {
            let result = 'forEach: ';
            items.forEach(item => {
                result += item.textContent + ' ';
            });
            output.textContent = result;
        }
        
        function iterateForOf() {
            let result = 'for...of: ';
            for (const item of items) {
                result += item.textContent + ' ';
            }
            output.textContent = result;
        }
        
        function showLiveNodeList() {
            const container = document.getElementById('container2');
            const paragraphs = container.getElementsByTagName('p');
            
            output.textContent = 'Before: ' + paragraphs.length + ' paragraphs';
            
            const newP = document.createElement('p');
            newP.textContent = 'Paragraph 3';
            container.appendChild(newP);
            
            output.textContent += '\nAfter append: ' + paragraphs.length + ' paragraphs';
        }
    </script>
</body>
</html>
