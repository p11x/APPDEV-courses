<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OuterHTML Usage</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>OuterHTML Usage</h1>

    <div id="demo1" class="demo">
        <h3>Reading outerHTML</h3>
        <div id="container1">
            <p id="target">This element will be read</p>
        </div>
        <button onclick="readOuterHTML()">Read outerHTML</button>
    </div>

    <div id="demo2" class="demo">
        <h3>Writing outerHTML</h3>
        <div id="container2">
            <p id="replaceMe">Original paragraph</p>
        </div>
        <button onclick="replaceOuterHTML()">Replace outerHTML</button>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function readOuterHTML() {
            const elem = document.getElementById('target');
            output.textContent = "outerHTML includes the element itself:\n" + elem.outerHTML;
        }
        
        function replaceOuterHTML() {
            const elem = document.getElementById('replaceMe');
            elem.outerHTML = '<div id="replaceMe" style="background:lightgreen;padding:10px;">Replaced with div!</div>';
            output.textContent = "Element replaced using outerHTML.\nCheck container2 above.";
        }
    </script>
</body>
</html>
