<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnerHTML Usage</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>InnerHTML Usage</h1>

    <div id="demo1" class="demo">
        <h3>Reading innerHTML</h3>
        <div id="container1"><p>Original <strong>paragraph</strong></p></div>
        <button onclick="readInnerHTML()">Read innerHTML</button>
    </div>

    <div id="demo2" class="demo">
        <h3>Writing innerHTML</h3>
        <div id="container2">Content will be replaced</div>
        <button onclick="writeInnerHTML()">Set innerHTML</button>
    </div>

    <div id="demo3" class="demo">
        <h3>Dynamic Content</h3>
        <div id="container3"></div>
        <button onclick="addItems()">Add Items</button>
        <button onclick="clearContent()">Clear</button>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function readInnerHTML() {
            const container = document.getElementById('container1');
            output.textContent = "innerHTML:\n" + container.innerHTML;
        }
        
        function writeInnerHTML() {
            const container = document.getElementById('container2');
            container.innerHTML = '<h2>New Content</h2><p>Replaced with <em>new</em> HTML!</p>';
            output.textContent = "innerHTML set to new content.\nCheck container2 above.";
        }
        
        function addItems() {
            const container = document.getElementById('container3');
            container.innerHTML += '<div style="padding:10px;background:lightblue;margin:5px;">New Item</div>';
            output.textContent = "Added item via innerHTML += (concatenation)";
        }
        
        function clearContent() {
            const container = document.getElementById('container3');
            container.innerHTML = '';
            output.textContent = "Content cleared";
        }
    </script>
</body>
</html>
