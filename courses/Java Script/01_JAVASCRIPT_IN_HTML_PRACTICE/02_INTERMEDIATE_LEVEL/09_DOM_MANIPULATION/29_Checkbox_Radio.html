<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox Radio</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 8px 16px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>Checkbox and Radio</h1>

    <div id="demo1" class="demo">
        <h3>Checkboxes</h3>
        <label><input type="checkbox" name="hobby" value="reading"> Reading</label>
        <label><input type="checkbox" name="hobby" value="gaming" checked> Gaming</label>
        <label><input type="checkbox" name="hobby" value="sports"> Sports</label>
        <br>
        <button onclick="getCheckboxes()">Get Checked</button>
    </div>

    <div id="demo2" class="demo">
        <h3>Radio Buttons</h3>
        <label><input type="radio" name="gender" value="male"> Male</label>
        <label><input type="radio" name="gender" value="female" checked> Female</label>
        <label><input type="radio" name="gender" value="other"> Other</label>
        <br>
        <button onclick="getRadioValue()">Get Selected</button>
    </div>

    <div id="demo3" class="demo">
        <h3>Programmatic Control</h3>
        <input type="checkbox" id="toggleBox">
        <button onclick="toggleCheckbox()">Toggle</button>
        <button onclick="checkCheckbox()">Check</button>
    </div>

    <div class="demo">
        <h3>Output:</h3>
        <pre id="output">Click buttons to see output...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function getCheckboxes() {
            const checkboxes = document.getElementsByName('hobby');
            let checked = [];
            for (let cb of checkboxes) {
                if (cb.checked) {
                    checked.push(cb.value);
                }
            }
            output.textContent = 'Checked values: ' + checked.join(', ');
        }
        
        function getRadioValue() {
            const radios = document.getElementsByName('gender');
            let selected;
            for (let radio of radios) {
                if (radio.checked) {
                    selected = radio.value;
                    break;
                }
            }
            output.textContent = 'Selected gender: ' + selected;
        }
        
        function toggleCheckbox() {
            const box = document.getElementById('toggleBox');
            box.checked = !box.checked;
            output.textContent = 'Checkbox checked: ' + box.checked;
        }
        
        function checkCheckbox() {
            const box = document.getElementById('toggleBox');
            box.checked = true;
            output.textContent = 'Checkbox checked: ' + box.checked;
        }
    </script>
</body>
</html>
