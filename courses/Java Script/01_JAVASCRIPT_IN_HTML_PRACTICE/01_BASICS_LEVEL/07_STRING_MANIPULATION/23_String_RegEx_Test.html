<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String RegEx Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>23. String RegEx test()</h2>
    <p>The test() method tests for a match in a string and returns true or false.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let pattern1 = /hello/i;
        let text1 = "Hello World";
        output += "/hello/i.test('Hello World'): " + pattern1.test(text1) + "\n";
        
        let pattern2 = /[0-9]/;
        let text2 = "abc123";
        output += "/[0-9]/.test('abc123'): " + pattern2.test(text2) + "\n";
        
        let pattern3 = /^[A-Z]/;
        let text3 = "Hello";
        output += "/^[A-Z]/.test('Hello'): " + pattern3.test(text3) + "\n";
        
        let pattern4 = /^\d+$/;
        let text4 = "12345";
        output += "/^\\d+$/.test('12345'): " + pattern4.test(text4) + "\n";
        
        let pattern5 = /^\d+$/;
        let text5 = "123abc";
        output += "/^\\d+$/.test('123abc'): " + pattern5.test(text5) + "\n";
        
        let pattern6 = /[aeiou]/;
        let text6 = "sky";
        output += "/[aeiou]/.test('sky'): " + pattern6.test(text6);

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
