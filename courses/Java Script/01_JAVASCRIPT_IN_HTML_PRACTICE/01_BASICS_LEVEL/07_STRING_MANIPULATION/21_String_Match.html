<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String match()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>21. String match()</h2>
    <p>The match() method returns an array of matches found in a string using a regular expression.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "The quick brown fox jumps over the lazy dog";
        let match1 = text1.match(/o/g);
        output += "match(/o/g): " + JSON.stringify(match1) + "\n";
        
        let text2 = "123abc456abc789";
        let match2 = text2.match(/abc/g);
        output += "match(/abc/g): " + JSON.stringify(match2) + "\n";
        
        let text3 = "Hello World";
        let match3 = text3.match(/xyz/);
        output += "match(/xyz/): " + JSON.stringify(match3) + "\n";
        
        let text4 = "test1test2test3";
        let match4 = text4.match(/test\d/g);
        output += "match(/test\\d/g): " + JSON.stringify(match4) + "\n";
        
        let text5 = "I like apples, bananas, and cherries";
        let match5 = text5.match(/[aeiou]/g);
        output += "match(/[aeiou]/g): " + JSON.stringify(match5) + "\n";
        
        let text6 = "abc123DEF";
        let match6 = text6.match(/[A-Z]+/g);
        output += "match(/[A-Z]+/g): " + JSON.stringify(match6);

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
