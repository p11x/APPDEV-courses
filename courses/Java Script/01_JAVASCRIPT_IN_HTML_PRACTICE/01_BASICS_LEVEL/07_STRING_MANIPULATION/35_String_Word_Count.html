<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Word Count</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>35. String Word Count</h2>
    <p>Count the number of words in a string.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        function countWords(str) {
            if (!str.trim()) return 0;
            return str.trim().split(/\s+/).length;
        }
        
        output += "countWords('Hello World'): " + countWords("Hello World") + "\n";
        output += "countWords('The quick brown fox'): " + countWords("The quick brown fox") + "\n";
        output += "countWords(''): " + countWords("") + "\n";
        output += "countWords('   spaces   '): " + countWords("   spaces   ") + "\n";
        output += "countWords('One'): " + countWords("One") + "\n";
        output += "countWords('Multiple   spaces'): " + countWords("Multiple   spaces") + "\n";
        output += "countWords('Line1\nLine2\nLine3'): " + countWords("Line1\nLine2\nLine3");

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
