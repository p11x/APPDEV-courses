<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Reverse</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>30. String Reverse</h2>
    <p>Reversing a string in JavaScript by converting to array and back.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        function reverseString(str) {
            return str.split("").reverse().join("");
        }
        
        let text1 = "Hello";
        output += "Reverse 'Hello': " + reverseString(text1) + "\n";
        
        let text2 = "JavaScript";
        output += "Reverse 'JavaScript': " + reverseString(text2) + "\n";
        
        let text3 = "12345";
        output += "Reverse '12345': " + reverseString(text3) + "\n";
        
        let text4 = "";
        output += "Reverse empty: '" + reverseString(text4) + "'\n";
        
        let text5 = "a";
        output += "Reverse single char: " + reverseString(text5) + "\n";
        
        let text6 = "racecar";
        output += "Reverse 'racecar': " + reverseString(text6);

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
