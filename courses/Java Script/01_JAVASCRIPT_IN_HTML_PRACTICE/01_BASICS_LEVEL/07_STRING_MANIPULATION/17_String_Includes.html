<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String includes()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>17. String includes()</h2>
    <p>The includes() method checks if a string contains a specified value, returning true or false.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "Hello World";
        output += "'Hello World'.includes('World'): " + text1.includes("World") + "\n";
        
        let text2 = "JavaScript is fun";
        output += "includes('Python'): " + text2.includes("Python") + "\n";
        
        let text3 = "Hello";
        output += "includes('ell'): " + text3.includes("ell") + "\n";
        
        let text4 = "Hello";
        output += "includes('ell', 1): " + text4.includes("ell", 1) + "\n";
        
        let text5 = "Hello";
        output += "includes('ell', 2): " + text5.includes("ell", 2) + "\n";
        
        let text6 = "";
        output += "Empty string includes empty: " + text6.includes("");

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
