<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Palindrome</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>31. String Palindrome</h2>
    <p>A palindrome reads the same forwards and backwards.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        function isPalindrome(str) {
            let reversed = str.split("").reverse().join("");
            return str === reversed;
        }
        
        function isPalindromeCaseInsensitive(str) {
            let lower = str.toLowerCase();
            let reversed = lower.split("").reverse().join("");
            return lower === reversed;
        }
        
        output += "'racecar' is palindrome: " + isPalindrome("racecar") + "\n";
        output += "'hello' is palindrome: " + isPalindrome("hello") + "\n";
        output += "'madam' is palindrome: " + isPalindrome("madam") + "\n";
        output += "'A man a plan a canal Panama' (case-insensitive): " + isPalindromeCaseInsensitive("A man a plan a canal Panama") + "\n";
        output += "'Was it a car or a cat I saw': " + isPalindromeCaseInsensitive("Was it a car or a cat I saw") + "\n";
        output += "'12321' is palindrome: " + isPalindrome("12321");

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
