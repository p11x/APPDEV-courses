<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Truncate</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>34. String Truncate</h2>
    <p>Truncate a string to a specified length and add an ellipsis.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        function truncate(str, maxLength, suffix) {
            if (str.length <= maxLength) return str;
            return str.substring(0, maxLength - suffix.length) + suffix;
        }
        
        let text1 = "Hello World";
        output += "truncate('Hello World', 8): '" + truncate(text1, 8, "...") + "'\n";
        
        let text2 = "This is a very long string that needs truncating";
        output += "truncate(long, 20): '" + truncate(text2, 20, "...") + "'\n";
        
        let text3 = "Short";
        output += "truncate('Short', 10): '" + truncate(text3, 10, "...") + "'\n";
        
        let text4 = "Testing";
        output += "truncate('Testing', 5, '...'): '" + truncate(text4, 5, "...") + "'\n";
        
        let text5 = "Hello";
        output += "truncate('Hello', 5, '...'): '" + truncate(text5, 5, "...") + "'\n";
        
        let text6 = "Exactly ten";
        output += "truncate('Exactly ten', 11, '..'): '" + truncate(text6, 11, "..") + "'";

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
