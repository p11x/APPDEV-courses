<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String encodeURI()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>37. String encodeURI()</h2>
    <p>The encodeURI() method encodes a URI by replacing certain characters with escape sequences.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "https://example.com/path?name=john doe";
        output += "encodeURI: " + encodeURI(text1) + "\n";
        
        let text2 = "Hello World";
        output += "encodeURI('Hello World'): " + encodeURI(text2) + "\n";
        
        let text3 = "test=value with spaces";
        output += "encodeURI with spaces: " + encodeURI(text3) + "\n";
        
        let text4 = "https://site.com/search?q=JavaScript&lang=en";
        output += "encodeURI full URL: " + encodeURI(text4) + "\n";
        
        let text5 = "café";
        output += "encodeURI('café'): " + encodeURI(text5) + "\n";
        
        let text6 = "file:///path/to file";
        output += "encodeURI with special chars: " + encodeURI(text6);

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
