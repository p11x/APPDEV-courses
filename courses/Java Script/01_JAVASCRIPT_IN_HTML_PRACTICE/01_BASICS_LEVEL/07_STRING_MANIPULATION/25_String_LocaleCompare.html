<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String localeCompare()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>25. String localeCompare()</h2>
    <p>The localeCompare() method compares two strings in the current locale and returns -1, 0, or 1.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "apple";
        let text2 = "banana";
        output += "'apple'.localeCompare('banana'): " + text1.localeCompare(text2) + "\n";
        
        let text3 = "banana";
        let text4 = "apple";
        output += "'banana'.localeCompare('apple'): " + text3.localeCompare(text4) + "\n";
        
        let text5 = "apple";
        let text6 = "apple";
        output += "'apple'.localeCompare('apple'): " + text5.localeCompare(text6) + "\n";
        
        let text7 = "cherry";
        let text8 = "banana";
        output += "'cherry'.localeCompare('banana'): " + text7.localeCompare(text8) + "\n";
        
        let text9 = "a";
        let text10 = "b";
        output += "'a'.localeCompare('b'): " + text9.localeCompare(text10) + "\n";
        
        let text11 = "Z";
        let text12 = "a";
        output += "'Z'.localeCompare('a'): " + text11.localeCompare(text12);

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
