<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String padStart()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>14. String padStart()</h2>
    <p>The padStart() method pads a string with another string until it reaches the specified length.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "5";
        output += "'5'.padStart(3, '0'): '" + text1.padStart(3, "0") + "'\n";
        
        let text2 = "Hello";
        output += "'Hello'.padStart(10): '" + text2.padStart(10) + "'\n";
        
        let text3 = "abc";
        output += "'abc'.padStart(6, '-'): '" + text3.padStart(6, "-") + "'\n";
        
        let text4 = "42";
        output += "'42'.padStart(5): '" + text4.padStart(5) + "'\n";
        
        let text5 = "Hi";
        output += "'Hi'.padStart(4, '*'): '" + text5.padStart(4, "*") + "'";

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
