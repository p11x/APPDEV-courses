<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String trimEnd()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>13. String trimEnd()</h2>
    <p>The trimEnd() method removes whitespace from the end of a string.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "   Hello World   ";
        output += "Original: '" + text1 + "'\n";
        output += "trimEnd(): '" + text1.trimEnd() + "'\n";
        
        let text2 = "Test    ";
        output += "trimEnd() removes trailing: '" + text2.trimEnd() + "'\n";
        
        let text3 = "Hello";
        output += "No whitespace to trim: '" + text3.trimEnd() + "'\n";
        
        let text4 = "Text\n\n\n";
        output += "trimEnd() removes newlines: '" + text4.trimEnd() + "'";

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
