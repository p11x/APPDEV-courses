<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String RegEx Replace</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>22. String RegEx Replace</h2>
    <p>The replace() method replaces a pattern in a string using a regular expression.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "Hello World";
        output += "replace(/World/, 'JavaScript'): " + text1.replace(/World/, "JavaScript") + "\n";
        
        let text2 = "apple banana apple";
        output += "replace(/apple/, 'orange'): " + text2.replace(/apple/, "orange") + "\n";
        
        let text3 = "apple banana apple";
        output += "replace(/apple/g, 'orange'): " + text3.replace(/apple/g, "orange") + "\n";
        
        let text4 = "Hello123World456";
        output += "replace(/[0-9]+/g, 'X'): " + text4.replace(/[0-9]+/g, "X") + "\n";
        
        let text5 = "John Doe";
        output += "replace(/(\\w+)\\s(\\w+)/, '$2, $1'): " + text5.replace(/(\w+)\s(\w+)/, "$2, $1") + "\n";
        
        let text6 = "  Too   many   spaces  ";
        output += "replace(/\\s+/g, ' '): '" + text6.replace(/\s+/g, " ").trim() + "'";

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
