<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String startsWith()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>18. String startsWith()</h2>
    <p>The startsWith() method checks if a string starts with a specified value.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "Hello World";
        output += "'Hello World'.startsWith('Hello'): " + text1.startsWith("Hello") + "\n";
        
        let text2 = "JavaScript";
        output += "startsWith('Java'): " + text2.startsWith("Java") + "\n";
        
        let text3 = "JavaScript";
        output += "startsWith('Script'): " + text3.startsWith("Script") + "\n";
        
        let text4 = "Hello";
        output += "startsWith('He', 0): " + text4.startsWith("He", 0) + "\n";
        
        let text5 = "Hello";
        output += "startsWith('el', 1): " + text5.startsWith("el", 1) + "\n";
        
        let text6 = "";
        output += "Empty string starts with empty: " + text6.startsWith("");

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
