<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Case Mapping</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>27. String Case Mapping (toLowerCase, toUpperCase)</h2>
    <p>JavaScript provides methods to convert strings to uppercase or lowercase.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "Hello World";
        output += "'Hello World'.toUpperCase(): " + text1.toUpperCase() + "\n";
        
        let text2 = "Hello World";
        output += "toLowerCase(): " + text2.toLowerCase() + "\n";
        
        let text3 = "javASCRIPT";
        output += "'javASCRIPT'.toUpperCase(): " + text3.toUpperCase() + "\n";
        
        let text4 = "javASCRIPT";
        output += "toLowerCase(): " + text4.toLowerCase() + "\n";
        
        let text5 = "abc";
        output += "'abc'.toUpperCase(): " + text5.toUpperCase() + "\n";
        
        let text6 = "ABC";
        output += "'ABC'.toLowerCase(): " + text6.toLowerCase() + "\n";
        
        let text7 = "number123";
        output += "'number123'.toUpperCase(): " + text7.toUpperCase() + "\n";
        
        let text8 = "café";
        output += "'café'.toUpperCase(): " + text8.toUpperCase();

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
