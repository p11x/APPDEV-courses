<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Capitalize</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>33. String Capitalize</h2>
    <p>Capitalize the first letter of a string.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        function capitalize(str) {
            if (!str) return "";
            return str.charAt(0).toUpperCase() + str.slice(1);
        }
        
        function capitalizeWords(str) {
            return str.split(" ").map(word => capitalize(word)).join(" ");
        }
        
        output += "capitalize('hello'): " + capitalize("hello") + "\n";
        output += "capitalize('javascript'): " + capitalize("javascript") + "\n";
        output += "capitalize(''): '" + capitalize("") + "'\n";
        output += "capitalizeWords('hello world'): " + capitalizeWords("hello world") + "\n";
        output += "capitalizeWords('the quick brown fox'): " + capitalizeWords("the quick brown fox") + "\n";
        output += "capitalize('a'): " + capitalize("a");

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
