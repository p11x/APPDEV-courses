<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String search()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>20. String search()</h2>
    <p>The search() method searches for a pattern and returns the index of the first match. Returns -1 if not found.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "Hello World";
        output += "'Hello World'.search('World'): " + text1.search("World") + "\n";
        
        let text2 = "JavaScript is great";
        output += "search('is'): " + text2.search("is") + "\n";
        
        let text3 = "Hello";
        output += "search('XYZ'): " + text3.search("XYZ") + "\n";
        
        let text4 = "abc123def456";
        output += "search(/[0-9]+/): " + text4.search(/[0-9]+/) + "\n";
        
        let text5 = "Hello World";
        output += "search(/o/): " + text5.search(/o/) + "\n";
        
        let text6 = "Test";
        output += "search('test'): " + text6.search("test");

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
