<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String RegEx exec()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>24. String RegEx exec()</h2>
    <p>The exec() method executes a search for a match and returns an array of information or null.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let pattern1 = /hello/;
        let text1 = "hello world hello";
        let result1 = pattern1.exec(text1);
        output += "exec() with match: " + JSON.stringify(result1) + "\n";
        
        let pattern2 = /xyz/;
        let text2 = "abc def";
        let result2 = pattern2.exec(text2);
        output += "exec() no match: " + result2 + "\n";
        
        let pattern3 = /(\d+)-(\d+)-(\d+)/;
        let text3 = "2024-04-03";
        let result3 = pattern3.exec(text3);
        output += "exec() with groups: " + JSON.stringify(result3) + "\n";
        
        let pattern4 = /\d+/g;
        let text4 = "abc123def456";
        let match4;
        let matches4 = [];
        while ((match4 = pattern4.exec(text4)) !== null) {
            matches4.push(match4[0]);
        }
        output += "exec() loop (global): " + JSON.stringify(matches4) + "\n";
        
        let pattern5 = /[A-Z]+/;
        let text5 = "Hello World";
        let result5 = pattern5.exec(text5);
        output += "exec() first match: " + JSON.stringify(result5);

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
