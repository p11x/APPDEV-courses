<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String HTML Wrapper Methods</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>29. String HTML Wrapper Methods</h2>
    <p>JavaScript provides methods that return strings wrapped in HTML tags.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "Hello";
        output += "anchor('myLink'): " + text1.anchor("myLink") + "\n";
        
        let text2 = "Click Me";
        output += "link('https://example.com'): " + text2.link("https://example.com") + "\n";
        
        let text3 = "Bold Text";
        output += "bold(): " + text3.bold() + "\n";
        
        let text4 = "Italic Text";
        output += "italics(): " + text4.italics() + "\n";
        
        let text5 = "Big Text";
        output += "big(): " + text5.big() + "\n";
        
        let text6 = "Small Text";
        output += "small(): " + text6.small() + "\n";
        
        let text7 = "Colored";
        output += "fontcolor('red'): " + text7.fontcolor("red") + "\n";
        
        let text8 = "20px";
        output += "fontsize(5): " + text8.fontsize(5);

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
