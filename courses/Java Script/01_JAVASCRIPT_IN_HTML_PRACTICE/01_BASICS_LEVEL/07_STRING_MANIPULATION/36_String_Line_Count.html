<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Line Count</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>36. String Line Count</h2>
    <p>Count the number of lines in a string.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        function countLines(str) {
            if (!str) return 0;
            return str.split(/\r\n|\r|\n/).length;
        }
        
        output += "countLines('Line1\\nLine2\\nLine3'): " + countLines("Line1\nLine2\nLine3") + "\n";
        output += "countLines('Single line'): " + countLines("Single line") + "\n";
        output += "countLines(''): " + countLines("") + "\n";
        output += "countLines('\\n'): " + countLines("\n") + "\n";
        output += "countLines('Line1\\nLine2'): " + countLines("Line1\nLine2") + "\n";
        output += "countLines('A\\nB\\nC\\nD'): " + countLines("A\nB\nC\nD");

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
