<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String charCodeAt()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>10. String charCodeAt()</h2>
    <p>The charCodeAt() method returns the Unicode value of the character at a specified index.</p>

    <div class="code-box">
        <h3>Syntax</h3>
        <pre>str.charCodeAt(index)</pre>
    </div>

    <div class="code-box">
        <h3>Example 1: Get Unicode value</h3>
        <pre>
let text = "ABC";
let code = text.charCodeAt(0);
console.log(code); // 65</pre>
    </div>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "ABC";
        output += "text1.charCodeAt(0): " + text1.charCodeAt(0) + "\n";
        
        let text2 = "Hello";
        output += "text2.charCodeAt(1): " + text2.charCodeAt(1) + "\n";
        
        let text3 = "a";
        output += "'a'.charCodeAt(0): " + text3.charCodeAt(0) + "\n";
        
        let text4 = "1";
        output += "'1'.charCodeAt(0): " + text4.charCodeAt(0) + "\n";
        
        let text5 = " ";
        output += "' '.charCodeAt(0): " + text5.charCodeAt(0) + "\n";

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
