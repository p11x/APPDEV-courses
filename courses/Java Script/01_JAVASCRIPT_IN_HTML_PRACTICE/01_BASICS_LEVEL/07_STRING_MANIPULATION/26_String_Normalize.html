<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String normalize()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>26. String normalize()</h2>
    <p>The normalize() method returns the Unicode Normalization Form of a string.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "\u00C5";
        output += "Original (A-ring): '" + text1 + "'\n";
        output += "normalize('NFD'): '" + text1.normalize("NFD") + "'\n";
        
        let text2 = "\u0041\u030A";
        output += "Base + combining: '" + text2.normalize("NFD") + "'\n";
        output += "After NFD: " + (text1 === text2.normalize("NFD") ? "equal" : "not equal") + "\n";
        
        let text3 = "café";
        output += "'café' normalize('NFC'): '" + text3.normalize("NFC") + "'\n";
        
        let text4 = "\u1E69";
        output += "S with dot below: '" + text4.normalize("NFD") + "' (length: " + text4.normalize("NFD").length + ")";
        
        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
