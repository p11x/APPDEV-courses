<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String decodeURI()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>38. String decodeURI()</h2>
    <p>The decodeURI() method decodes a URI that was encoded with encodeURI().</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let encoded1 = "https%3A%2F%2Fexample.com%2Fpath%3Fname%3Djohn%20doe";
        output += "decodeURI: " + decodeURI(encoded1) + "\n";
        
        let encoded2 = "Hello%20World";
        output += "decodeURI('Hello%20World'): " + decodeURI(encoded2) + "\n";
        
        let encoded3 = "test%3Dvalue%20with%20spaces";
        output += "decodeURI with spaces: " + decodeURI(encoded3) + "\n";
        
        let encoded4 = "caf%C3%A9";
        output += "decodeURI('caf%C3%A9'): " + decodeURI(encoded4) + "\n";
        
        let encoded5 = "%26%3D%3D";
        output += "decodeURI('%26%3D%3D'): " + decodeURI(encoded5) + "\n";
        
        let original = "Hello World";
        let encoded = encodeURI(original);
        let decoded = decodeURI(encoded);
        output += "Round trip: " + original + " -> " + encoded + " -> " + decoded;

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
