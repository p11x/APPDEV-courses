<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Anagram</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>32. String Anagram</h2>
    <p>An anagram is a word formed by rearranging the letters of another word.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        function sortString(str) {
            return str.toLowerCase().split("").sort().join("");
        }
        
        function isAnagram(str1, str2) {
            return sortString(str1) === sortString(str2);
        }
        
        output += "'listen' and 'silent': " + isAnagram("listen", "silent") + "\n";
        output += "'hello' and 'world': " + isAnagram("hello", "world") + "\n";
        output += "'astronomer' and 'moon starer': " + isAnagram("astronomer", "moon starer") + "\n";
        output += "'Debit card' and 'Bad credit': " + isAnagram("Debit card", "Bad credit") + "\n";
        output += "'abc' and 'abd': " + isAnagram("abc", "abd") + "\n";
        output += "'aabb' and 'abba': " + isAnagram("aabb", "abba");

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
