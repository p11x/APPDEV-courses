<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String endsWith()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>19. String endsWith()</h2>
    <p>The endsWith() method checks if a string ends with a specified value.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "Hello World";
        output += "'Hello World'.endsWith('World'): " + text1.endsWith("World") + "\n";
        
        let text2 = "JavaScript";
        output += "endsWith('Script'): " + text2.endsWith("Script") + "\n";
        
        let text3 = "JavaScript";
        output += "endsWith('Java'): " + text3.endsWith("Java") + "\n";
        
        let text4 = "Hello";
        output += "endsWith('lo', 5): " + text4.endsWith("lo", 5) + "\n";
        
        let text5 = "Hello";
        output += "endsWith('el', 4): " + text5.endsWith("el", 4) + "\n";
        
        let text6 = "";
        output += "Empty string ends with empty: " + text6.endsWith("");

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
