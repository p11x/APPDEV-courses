<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Emoji Handling</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>28. String Emoji Handling</h2>
    <p>JavaScript strings can contain Unicode characters including emojis. Each emoji may use multiple code units.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "Hello 😀";
        output += "String with emoji: '" + text1 + "'\n";
        output += "length: " + text1.length + " (not emoji-aware)\n";
        
        let text2 = "👍🏽";
        output += "Emoji: '" + text2 + "'\n";
        output += "length: " + text2.length + " (skin tone modifier adds units)\n";
        
        let text3 = "🇺🇸";
        output += "Flag emoji: '" + text3 + "'\n";
        output += "length: " + text3.length + " (flag uses regional indicators)\n";
        
        let text4 = "👨‍👩‍👧‍👦";
        output += "Family emoji: '" + text4 + "'\n";
        output += "length: " + text4.length + " (ZWJ sequence)\n";
        
        let text5 = "😀";
        output += "Code point: " + text5.codePointAt(0).toString(16) + "\n";
        
        let text6 = "abc😀def";
        output += "CharAt(3): '" + text6.charAt(3) + "'\n";
        output += "CharCodeAt(3): " + text6.charCodeAt(3);

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
