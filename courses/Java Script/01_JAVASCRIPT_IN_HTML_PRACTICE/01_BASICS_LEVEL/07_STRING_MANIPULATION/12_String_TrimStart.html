<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String trimStart() & trimEnd()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>12. String trimStart() & trimEnd()</h2>
    <p>trimStart() removes whitespace from the beginning, trimEnd() removes from the end.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "   Hello World   ";
        output += "Original: '" + text1 + "'\n";
        output += "trimStart(): '" + text1.trimStart() + "'\n";
        
        let text2 = "   Hello World   ";
        output += "trimEnd(): '" + text2.trimEnd() + "'\n";
        
        let text3 = "   Hello World   ";
        output += "trim(): '" + text3.trim() + "'\n";
        
        let text4 = "\t\nLeading and trailing whitespace\t\n";
        output += "trim() removes tabs/newlines: '" + text4.trim() + "'";

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
