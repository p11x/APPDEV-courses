<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String.fromCharCode()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>11. String.fromCharCode()</h2>
    <p>The fromCharCode() method converts Unicode values to characters.</p>

    <div class="code-box">
        <h3>Syntax</h3>
        <pre>String.fromCharCode(num1, num2, ...)</pre>
    </div>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        output += "fromCharCode(65): " + String.fromCharCode(65) + "\n";
        output += "fromCharCode(66, 67, 68): " + String.fromCharCode(66, 67, 68) + "\n";
        output += "fromCharCode(72, 101, 108, 108, 111): " + String.fromCharCode(72, 101, 108, 108, 111) + "\n";
        output += "fromCharCode(8364): " + String.fromCharCode(8364) + "\n";
        output += "fromCharCode(97, 98, 99): " + String.fromCharCode(97, 98, 99);

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
