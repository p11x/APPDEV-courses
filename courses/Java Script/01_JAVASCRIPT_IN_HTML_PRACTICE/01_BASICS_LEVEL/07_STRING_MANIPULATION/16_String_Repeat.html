<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String repeat()</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 4px solid #2196F3; margin: 20px 0; }
        .output-box { background: #e8f5e9; padding: 15px; border-radius: 5px; border-left: 4px solid #4CAF50; margin: 20px 0; }
        h2 { color: #333; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>16. String repeat()</h2>
    <p>The repeat() method returns a new string with the original string repeated a specified number of times.</p>

    <h3>Output:</h3>
    <div class="output-box" id="output"></div>

    <script>
        let output = "";
        
        let text1 = "Ha";
        output += "'Ha'.repeat(3): '" + text1.repeat(3) + "'\n";
        
        let text2 = "*";
        output += "'*'.repeat(10): '" + text2.repeat(10) + "'\n";
        
        let text3 = "Yo";
        output += "'Yo'.repeat(0): '" + text3.repeat(0) + "'\n";
        
        let text4 = "ABC";
        output += "'ABC'.repeat(2): '" + text4.repeat(2) + "'\n";
        
        let text5 = " ";
        output += "' '.repeat(5): '" + text5.repeat(5) + "' (5 spaces)";

        document.getElementById("output").innerText = output;
        console.log(output);
    </script>
</body>
</html>
