<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Reverse</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        h1 { color: #333; }
        .example { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 5px; }
        pre { background: #282c34; color: #abb2bf; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .output { background: #1e1e1e; color: #50fa7b; padding: 15px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Array.reverse()</h1>
    <p>The reverse() method reverses the order of elements in an array (mutates original).</p>

    <div class="example">
        <h2>1. Reverse Array</h2>
        <pre>const arr = [1, 2, 3, 4, 5];
arr.reverse();</pre>
        <div class="output" id="output1"></div>
    </div>

    <div class="example">
        <h2>2. Reverse Strings Array</h2>
        <pre>const fruits = ["apple", "banana", "cherry"];
fruits.reverse();</pre>
        <div class="output" id="output2"></div>
    </div>

    <script>
        const arr = [1, 2, 3, 4, 5];
        arr.reverse();
        document.getElementById("output1").textContent = JSON.stringify(arr);

        const fruits = ["apple", "banana", "cherry"];
        fruits.reverse();
        document.getElementById("output2").textContent = JSON.stringify(fruits);
    </script>
</body>
</html>
