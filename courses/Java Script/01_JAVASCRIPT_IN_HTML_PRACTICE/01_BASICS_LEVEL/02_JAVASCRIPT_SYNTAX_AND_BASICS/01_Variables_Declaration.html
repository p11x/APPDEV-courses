<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables Declaration</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript Variable Declarations: var, let, const</h1>
    
    <h2>1. Using var</h2>
    <p>Function-scoped, can be re-declared and updated:</p>
    <div class="output" id="varDemo"></div>
    
    <h2>2. Using let</h2>
    <p>Block-scoped, can be updated but not re-declared:</p>
    <div class="output" id="letDemo"></div>
    
    <h2>3. Using const</h2>
    <p>Block-scoped, cannot be updated or re-declared:</p>
    <div class="output" id="constDemo"></div>
    
    <h2>Key Differences</h2>
    <div class="output" id="comparison"></div>

    <script>
        // var - function scoped, can be re-declared
        var name = "John";
        var name = "Jane"; // re-declaration allowed
        name = "Mike"; // update allowed
        document.getElementById("varDemo").innerHTML = 
            "name = " + name + " (var allows re-declaration and update)";

        // let - block scoped, cannot be re-declared but can be updated
        let age = 25;
        // let age = 30; // ERROR: cannot re-declare in same scope
        age = 30; // update allowed
        document.getElementById("letDemo").innerHTML = 
            "age = " + age + " (let allows update but not re-declaration)";

        // const - block scoped, cannot be updated or re-declared
        const country = "USA";
        // country = "Canada"; // ERROR: cannot update
        // const country = "Canada"; // ERROR: cannot re-declare
        document.getElementById("constDemo").innerHTML = 
            "country = " + country + " (const cannot be changed)";

        // Comparison example
        let output = "<table border='1' cellpadding='5'>";
        output += "<tr><th>Feature</th><th>var</th><th>let</th><th>const</th></tr>";
        output += "<tr><td>Scope</td><td>Function</td><td>Block</td><td>Block</td></tr>";
        output += "<tr><td>Re-declare</td><td>Yes</td><td>No</td><td>No</td></tr>";
        output += "<tr><td>Update</td><td>Yes</td><td>Yes</td><td>No</td></tr>";
        output += "<tr><td>Hoisting</td><td>Yes (undefined)</td><td>Yes (TDZ)</td><td>Yes (TDZ)</td></tr>";
        output += "</table>";
        document.getElementById("comparison").innerHTML = output;
    </script>
</body>
</html>
