<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Formatting</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript Code Formatting</h1>
    
    <h2>1. Indentation</h2>
    <p>Use spaces (2 or 4) or tabs for indentation:</p>
    <div class="output" id="indentation"></div>
    
    <h2>2. Line Length</h2>
    <p>Keep lines under 80-100 characters:</p>
    <div class="output" id="lineLength"></div>
    
    <h2>3. Spacing</h2>
    <p>Add spaces around operators and after commas:</p>
    <div class="output" id="spacing"></div>
    
    <h2>4. Block Formatting</h2>
    <div class="output" id="blocks"></div>

    <script>
        // ===== INDENTATION =====
        // Good: Consistent 2 or 4 spaces
        function greet(name) {
            if (name) {
                return "Hello, " + name + "!";
            } else {
                return "Hello, World!";
            }
        }
        
        // Alternative: Use tabs (better for accessibility)
        // Each project should choose one style and stick to it
        
        let indentOutput = "<h3>Good Indentation:</h3>";
        indentOutput += "<pre>function greet(name) {\n";
        indentOutput += "    if (name) {\n";
        indentOutput += "        return \"Hello, \" + name + \"!\";\n";
        indentOutput += "    }\n";
        indentOutput += "}</pre>";
        indentOutput += "<p>Avoid: Mixing tabs and spaces</p>";
        document.getElementById("indentation").innerHTML = indentOutput;

        // ===== LINE LENGTH =====
        // Bad: Very long line
        // let long = "This is a very long line that goes on and on and on and on and on and makes code hard to read";
        
        // Good: Break into multiple lines
        let config = {
            apiUrl: "https://api.example.com/v1",
            timeout: 5000,
            maxRetries: 3
        };
        
        // Good: Break long function calls
        let result = someFunction(
            argument1,
            argument2,
            argument3
        );
        
        let lengthOutput = "<ul>";
        lengthOutput += "<li>Keep lines under 80-100 characters</li>";
        lengthOutput += "<li>Break long strings with + or template literals</li>";
        lengthOutput += "<li>Break function arguments onto new lines</li>";
        lengthOutput += "<li>Use objects spanning multiple lines</li>";
        lengthOutput += "</ul>";
        document.getElementById("lineLength").innerHTML = lengthOutput;

        // ===== SPACING =====
        // Good: Spaces around operators
        let a = 1 + 2;
        let b = a * 3;
        
        // Good: Spaces after commas
        let arr = [1, 2, 3, 4, 5];
        function call(a, b, c) { }
        call(1, 2, 3);
        
        // Good: Spaces in conditionals
        if (a === b) { }
        for (let i = 0; i < 10; i++) { }
        
        // Optional: No spaces needed for:
        // - Unary operators: arr[i], !flag
        // - Object properties: obj.key
        
        let spaceOutput = "<table border='1' cellpadding='5'>";
        spaceOutput += "<tr><th>Do</th><th>Avoid</th></tr>";
        spaceOutput += "<tr><td><code>a = 1 + 2</code></td><td><code>a=1+2</code></td></tr>";
        spaceOutput += "<tr><td><code>arr = [1, 2, 3]</code></td><td><code>arr=[1,2,3]</code></td></tr>";
        spaceOutput += "<tr><td><code>if (a === b)</code></td><td><code>if(a===b)</code></td></tr>";
        spaceOutput += "<tr><td><code>for (let i = 0; ...)</code></td><td><code>for(let i=0;...)</code></td></tr>";
        spaceOutput += "</table>";
        document.getElementById("spacing").innerHTML = spaceOutput;

        // ===== BLOCK FORMATTING =====
        // Curly braces on same line (K&R style)
        function kAndRStyle() {
            // code
        }
        
        // For loops
        for (let i = 0; i < 5; i++) {
            // code
        }
        
        // If statements
        if (condition) {
            // code
        } else {
            // code
        }
        
        // One-liners (only for simple cases)
        if (x > 0) return x;
        
        let blockOutput = "<pre>if (condition) {\n";
        blockOutput += "    // code\n";
        blockOutput += "} else {\n";
        blockOutput += "    // code\n";
        blockOutput += "}\n\n";
        blockOutput += "if (x > 0) return x;  // Simple one-liner OK</pre>";
        document.getElementById("blocks").innerHTML = blockOutput;
    </script>
</body>
</html>
