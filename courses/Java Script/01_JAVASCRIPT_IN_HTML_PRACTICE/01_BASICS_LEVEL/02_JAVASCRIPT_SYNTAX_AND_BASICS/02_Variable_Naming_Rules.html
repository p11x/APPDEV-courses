<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable Naming Rules</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        .valid { color: green; }
        .invalid { color: red; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript Variable Naming Rules</h1>
    
    <h2>Valid Variable Names</h2>
    <div class="output" id="validNames"></div>
    
    <h2>Invalid Variable Names</h2>
    <div class="output" id="invalidNames"></div>
    
    <h2>Naming Conventions</h2>
    <div class="output" id="conventions"></div>

    <script>
        // ===== VALID VARIABLE NAMES =====
        // 1. Start with letter, underscore, or dollar sign
        let myVariable = "starts with letter";
        let _privateVar = "starts with underscore";
        let $jqueryVar = "starts with dollar sign";
        
        // 2. Can contain letters, numbers, underscore, dollar
        let var1 = "valid";
        let my_var_2 = "valid with underscore";
        
        // 3. Can use camelCase (recommended)
        let firstName = "John";
        let lastName = "Doe";
        
        let validOutput = "<ul class='valid'>";
        validOutput += "<li><code>myVariable</code> - starts with letter</li>";
        validOutput += "<li><code>_privateVar</code> - starts with underscore</li>";
        validOutput += "<li><code>$jqueryVar</code> - starts with dollar sign</li>";
        validOutput += "<li><code>var1</code> - letter followed by number</li>";
        validOutput += "<li><code>my_var_2</code> - contains underscore</li>";
        validOutput += "<li><code>firstName</code> - camelCase (recommended)</li>";
        validOutput += "</ul>";
        document.getElementById("validNames").innerHTML = validOutput;

        // ===== INVALID VARIABLE NAMES =====
        // JavaScript keywords cannot be used as variable names
        // let var = "invalid"; // ERROR: var is a keyword
        // let if = "invalid"; // ERROR: if is a keyword
        // let return = "invalid"; // ERROR: return is a keyword
        
        // Cannot start with number
        // let 1stPlace = "invalid"; // ERROR: starts with number
        
        // Cannot contain spaces
        // let my var = "invalid"; // ERROR: contains space
        
        // Cannot use hyphens
        // let my-var = "invalid"; // ERROR: hyphen not allowed

        let invalidOutput = "<ul class='invalid'>";
        invalidOutput += "<li><code>var</code> - JavaScript keyword</li>";
        invalidOutput += "<li><code>if</code> - JavaScript keyword</li>";
        invalidOutput += "<li><code>1stPlace</code> - starts with number</li>";
        invalidOutput += "<li><code>my var</code> - contains space</li>";
        invalidOutput += "<li><code>my-var</code> - contains hyphen</li>";
        invalidOutput += "<li><code>@home</code> - contains invalid character</li>";
        invalidOutput += "</ul>";
        document.getElementById("invalidNames").innerHTML = invalidOutput;

        // ===== NAMING CONVENTIONS =====
        // camelCase - recommended for variables and functions
        let userName = "john";
        let userAge = 25;
        let getUserData = function() { return "user data"; };
        
        // PascalCase - recommended for classes and constructors
        let UserAccount = class { };
        
        // SCREAMING_SNAKE_CASE - recommended for constants
        const MAXIMUM_SCORE = 100;
        const API_BASE_URL = "https://api.example.com";
        
        // Hungarian notation (less common in JS)
        let bIsActive = true; // boolean
        let nCount = 0; // number
        let sName = "text"; // string
        
        let convOutput = "<table border='1' cellpadding='5'>";
        convOutput += "<tr><th>Convention</th><th>Use Case</th><th>Example</th></tr>";
        convOutput += "<tr><td>camelCase</td><td>Variables, functions</td><td>userName, getUserData</td></tr>";
        convOutput += "<tr><td>PascalCase</td><td>Classes, constructors</td><td>UserAccount</td></tr>";
        convOutput += "<tr><td>SCREAMING_SNAKE_CASE</td><td>Constants</td><td>MAXIMUM_SCORE</td></tr>";
        convOutput += "<tr><td>snake_case</td><td>Sometimes for constants</td><td>max_score</td></tr>";
        convOutput += "</table>";
        document.getElementById("conventions").innerHTML = convOutput;
    </script>
</body>
</html>
