<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Null Values</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript Null Values</h1>
    
    <h2>1. Null Assignment</h2>
    <p>Null represents intentional absence of a value:</p>
    <div class="output" id="nullDemo"></div>
    
    <h2>2. Null Type Check</h2>
    <div class="output" id="typeCheck"></div>
    
    <h2>3. Null in Comparisons</h2>
    <div class="output" id="comparisons"></div>
    
    <h2>4. Null with Operators</h2>
    <div class="output" id="operators"></div>

    <script>
        // null - intentional absence of value
        let user = null;
        document.getElementById("nullDemo").innerHTML = "user = " + user + " (type: " + typeof user + ")";

        // typeof null returns 'object' (historical bug)
        let typeResult = typeof null;
        document.getElementById("typeCheck").innerHTML = 
            "typeof null = " + typeResult + " (this is a known JavaScript quirk)";

        // null comparisons
        let compOutput = "<table border='1' cellpadding='5'>";
        compOutput += "<tr><th>Comparison</th><th>Result</th></tr>";
        compOutput += "<tr><td>null == undefined</td><td>" + (null == undefined) + "</td></tr>";
        compOutput += "<tr><td>null === undefined</td><td>" + (null === undefined) + "</td></tr>";
        compOutput += "<tr><td>null == 0</td><td>" + (null == 0) + "</td></tr>";
        compOutput += "<tr><td>null === 0</td><td>" + (null === 0) + "</td></tr>";
        compOutput += "<tr><td>null == false</td><td>" + (null == false) + "</td></tr>";
        compOutput += "</table>";
        document.getElementById("comparisons").innerHTML = compOutput;

        // null with arithmetic operators
        let sum = 5 + null;
        let str = "Hello " + null;
        document.getElementById("operators").innerHTML = 
            "5 + null = " + sum + "<br>" +
            '"Hello " + null = ' + str;
    </script>
</body>
</html>
