<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destructuring Defaults</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Destructuring with Default Values</h1>
    
    <h2>1. Object with Defaults</h2>
    <div class="output" id="objDefaults"></div>
    
    <h2>2. Array with Defaults</h2>
    <div class="output" id="arrDefaults"></div>
    
    <h2>3. Default with Renaming</h2>
    <div class="output" id="renameDefaults"></div>
    
    <h2>4. Calculated Defaults</h2>
    <div class="output" id="calcDefaults"></div>

    <script>
        // Object with defaults
        let user = { name: "John" };
        let { name, role = "guest", active = true } = user;
        
        document.getElementById("objDefaults").innerHTML = 
            "let user = { name: 'John' }<br>" +
            "let { name, role='guest', active=true } = user<br>" +
            "name: " + name + "<br>" +
            "role: " + role + "<br>" +
            "active: " + active;

        // Array with defaults
        let nums = [1];
        let [a = 0, b = 0, c = 0] = nums;
        
        document.getElementById("arrDefaults").innerHTML = 
            "let nums = [1]<br>" +
            "let [a=0, b=0, c=0] = nums<br>" +
            "a: " + a + ", b: " + b + ", c: " + c;

        // Default with renaming
        let config = { debug: true };
        let { debug: isEnabled = false, verbose = false } = config;
        
        document.getElementById("renameDefaults").innerHTML = 
            "let config = { debug: true }<br>" +
            "let { debug: isEnabled=false, verbose=false } = config<br>" +
            "isEnabled: " + isEnabled + "<br>" +
            "verbose: " + verbose;

        // Evaluated defaults
        let defaultName = "User";
        let data = {};
        
        let { name = defaultName.toUpperCase(), count = (1 + 1) } = data;
        
        document.getElementById("calcDefaults").innerHTML = 
            "Defaults are evaluated only when property is missing:<br><br>" +
            "let data = {}<br>" +
            "let { name = defaultName.toUpperCase() } = data<br>" +
            "name: " + name + "<br>" +
            "(defaultName.toUpperCase() evaluated)";
    </script>
</body>
</html>
