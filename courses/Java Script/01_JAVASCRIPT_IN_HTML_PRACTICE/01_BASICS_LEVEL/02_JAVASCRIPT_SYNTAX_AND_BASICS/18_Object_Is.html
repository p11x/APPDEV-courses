<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object.is()</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript Object.is()</h1>
    
    <h2>1. Object.is() vs ===</h2>
    <p>Object.is() provides more accurate comparison than ===:</p>
    <div class="output" id="comparison"></div>
    
    <h2>2. Special Cases</h2>
    <div class="output" id="specialCases"></div>
    
    <h2>3. Object.is() Examples</h2>
    <div class="output" id="examples"></div>
    
    <h2>4. Use Cases</h2>
    <div class="output" id="useCases"></div>

    <script>
        // Object.is() vs === comparison
        let compTable = "<table border='1' cellpadding='5'>";
        compTable += "<tr><th>Comparison</th><th>===</th><th>Object.is()</th></tr>";
        compTable += "<tr><td>NaN, NaN</td><td>" + (NaN === NaN) + "</td><td>" + Object.is(NaN, NaN) + "</td></tr>";
        compTable += "<tr><td>0, -0</td><td>" + (0 === -0) + "</td><td>" + Object.is(0, -0) + "</td></tr>";
        compTable += "<tr><td>'hello', 'hello'</td><td>" + ("hello" === "hello") + "</td><td>" + Object.is("hello", "hello") + "</td></tr>";
        compTable += "<tr><td>true, true</td><td>" + (true === true) + "</td><td>" + Object.is(true, true) + "</td></tr>";
        compTable += "</table>";
        document.getElementById("comparison").innerHTML = compTable;

        // Special cases with Object.is()
        let specialTable = "<table border='1' cellpadding='5'>";
        specialTable += "<tr><th>Values</th><th>Object.is()</th></tr>";
        specialTable += "<tr><td>undefined, undefined</td><td>" + Object.is(undefined, undefined) + "</td></tr>";
        specialTable += "<tr><td>null, null</td><td>" + Object.is(null, null) + "</td></tr>";
        specialTable += "<tr><td>5, 5</td><td>" + Object.is(5, 5) + "</td></tr>";
        specialTable += "<tr><td>5, '5'</td><td>" + Object.is(5, "5") + "</td></tr>";
        specialTable += "<tr><td>new String('a'), new String('a')</td><td>" + Object.is(new String("a"), new String("a")) + "</td></tr>";
        specialTable += "</table>";
        document.getElementById("specialCases").innerHTML = specialTable;

        // Object.is() examples
        let x = Object.is([1,2,3], [1,2,3]);
        let y = Object.is("foo", "foo");
        let z = Object.is(null, null);
        
        document.getElementById("examples").innerHTML = 
            "Object.is([1,2,3], [1,2,3]): " + x + " (different arrays)<br>" +
            "Object.is('foo', 'foo'): " + y + "<br>" +
            "Object.is(null, null): " + z;

        // Practical use cases
        let a = Object.is(0, -0);
        let b = Object.is(NaN, NaN);
        let c = Object.is("test", "test");
        
        document.getElementById("useCases").innerHTML = 
            "Detecting -0 vs 0: " + a + "<br>" +
            "Detecting NaN: " + b + "<br>" +
            "String comparison: " + c;
    </script>
</body>
</html>
