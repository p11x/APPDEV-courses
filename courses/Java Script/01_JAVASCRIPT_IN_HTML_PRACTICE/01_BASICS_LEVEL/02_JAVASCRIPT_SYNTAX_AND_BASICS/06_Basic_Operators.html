<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Operators</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript Basic Operators</h1>
    
    <h2>1. Arithmetic Operators</h2>
    <div class="output" id="arithmeticOps"></div>
    
    <h2>2. Assignment Operators</h2>
    <div class="output" id="assignmentOps"></div>
    
    <h2>3. Increment/Decrement</h2>
    <div class="output" id="incrementDecrement"></div>
    
    <h2>4. Comparison Operators</h2>
    <div class="output" id="comparisonOps"></div>
    
    <h2>5. Logical Operators</h2>
    <div class="output" id="logicalOps"></div>

    <script>
        // ===== ARITHMETIC OPERATORS =====
        let a = 10, b = 3;
        let sum = a + b;        // 13
        let diff = a - b;       // 7
        let product = a * b;    // 30
        let quotient = a / b;   // 3.333...
        let remainder = a % b;  // 1
        let power = a ** b;     // 1000
        
        let arithOutput = "<table border='1' cellpadding='5'>";
        arithOutput += "<tr><th>Operator</th><th>Description</th><th>Example</th><th>Result</th></tr>";
        arithOutput += "<tr><td>+</td><td>Addition</td><td>10 + 3</td><td>" + sum + "</td></tr>";
        arithOutput += "<tr><td>-</td><td>Subtraction</td><td>10 - 3</td><td>" + diff + "</td></tr>";
        arithOutput += "<tr><td>*</td><td>Multiplication</td><td>10 * 3</td><td>" + product + "</td></tr>";
        arithOutput += "<tr><td>/</td><td>Division</td><td>10 / 3</td><td>" + quotient.toFixed(2) + "</td></tr>";
        arithOutput += "<tr><td>%</td><td>Modulus (remainder)</td><td>10 % 3</td><td>" + remainder + "</td></tr>";
        arithOutput += "<tr><td>**</td><td>Exponentiation</td><td>10 ** 3</td><td>" + power + "</td></tr>";
        arithOutput += "</table>";
        document.getElementById("arithmeticOps").innerHTML = arithOutput;

        // ===== ASSIGNMENT OPERATORS =====
        let x = 5;              // =  (assign)
        x += 3;                 // 8  (x = x + 3)
        let y = 10;
        y -= 4;                 // 6  (y = y - 4)
        let z = 2;
        z *= 3;                 // 6  (z = z * 3)
        let w = 12;
        w /= 4;                 // 3  (w = w / 4)
        let v = 5;
        v %= 3;                 // 2  (v = v % 3)
        let p = 2;
        p **= 3;                // 8  (p = p ** 3)
        
        let assignOutput = "<table border='1' cellpadding='5'>";
        assignOutput += "<tr><th>Operator</th><th>Example</th><th>Equivalent To</th><th>Result</th></tr>";
        assignOutput += "<tr><td>=</td><td>x = 5</td><td>-</td><td>5</td></tr>";
        assignOutput += "<tr><td>+=</td><td>x += 3</td><td>x = x + 3</td><td>8</td></tr>";
        assignOutput += "<tr><td>-=</td><td>y -= 4</td><td>y = y - 4</td><td>6</td></tr>";
        assignOutput += "<tr><td>*=</td><td>z *= 3</td><td>z = z * 3</td><td>6</td></tr>";
        assignOutput += "<tr><td>/=</td><td>w /= 4</td><td>w = w / 4</td><td>3</td></tr>";
        assignOutput += "<tr><td>%=</td><td>v %= 3</td><td>v = v % 3</td><td>2</td></tr>";
        assignOutput += "<tr><td>**=</td><td>p **= 3</td><td>p = p ** 3</td><td>8</td></tr>";
        assignOutput += "</table>";
        document.getElementById("assignmentOps").innerHTML = assignOutput;

        // ===== INCREMENT/DECREMENT =====
        let i = 5;
        let preInc = ++i;       // 6 (increment then assign)
        let postInc = i++;      // 6 (assign then increment)
        
        let j = 5;
        let preDec = --j;       // 4
        let postDec = j--;      // 4
        
        let incOutput = "<table border='1' cellpadding='5'>";
        incOutput += "<tr><th>Operator</th><th>Description</th><th>Example</th><th>Result</th></tr>";
        incOutput += "<tr><td>++</td><td>Pre-increment</td><td>++i</td><td>Increment first, then use</td></tr>";
        incOutput += "<tr><td>++</td><td>Post-increment</td><td>i++</td><td>Use first, then increment</td></tr>";
        incOutput += "<tr><td>--</td><td>Pre-decrement</td><td>--j</td><td>Decrement first, then use</td></tr>";
        incOutput += "<tr><td>--</td><td>Post-decrement</td><td>j--</td><td>Use first, then decrement</td></tr>";
        incOutput += "</table>";
        incOutput += "<p>Example: let i=5; preInc=++i => " + preInc + ", postInc=i++ => " + postInc + ", i now = " + i + "</p>";
        document.getElementById("incrementDecrement").innerHTML = incOutput;

        // ===== COMPARISON OPERATORS =====
        let num1 = 5, num2 = "5";
        let result1 = num1 == num2;    // true  (loose - type coercion)
        let result2 = num1 === num2;   // false (strict - no type coercion)
        
        let compOutput = "<table border='1' cellpadding='5'>";
        compOutput += "<tr><th>Operator</th><th>Name</th><th>Example</th><th>Result</th></tr>";
        compOutput += "<tr><td>==</td><td>Equal (loose)</td><td>5 == '5'</td><td>" + result1 + "</td></tr>";
        compOutput += "<tr><td>===</td><td>Identical (strict)</td><td>5 === '5'</td><td>" + result2 + "</td></tr>";
        compOutput += "<tr><td>!=</td><td>Not equal (loose)</td><td>5 != '6'</td><td>" + (5 != 6) + "</td></tr>";
        compOutput += "<tr><td>!==</td><td>Not identical (strict)</td><td>5 !== '5'</td><td>" + (5 !== "5") + "</td></tr>";
        compOutput += "<tr><td>></td><td>Greater than</td><td>5 > 3</td><td>" + (5 > 3) + "</td></tr>";
        compOutput += "<tr><td><</td><td>Less than</td><td>5 < 3</td><td>" + (5 < 3) + "</td></tr>";
        compOutput += "<tr><td>>=</td><td>Greater or equal</td><td>5 >= 5</td><td>" + (5 >= 5) + "</td></tr>";
        compOutput += "<tr><td><=</td><td>Less or equal</td><td>5 <= 3</td><td>" + (5 <= 3) + "</td></tr>";
        compOutput += "</table>";
        document.getElementById("comparisonOps").innerHTML = compOutput;

        // ===== LOGICAL OPERATORS =====
        let trueVal = true, falseVal = false;
        
        let logOutput = "<table border='1' cellpadding='5'>";
        logOutput += "<tr><th>Operator</th><th>Name</th><th>Description</th><th>Example</th><th>Result</th></tr>";
        logOutput += "<tr><td>&&</td><td>AND</td><td>True if both true</td><td>true && false</td><td>" + (trueVal && falseVal) + "</td></tr>";
        logOutput += "<tr><td>||</td><td>OR</td><td>True if either true</td><td>true || false</td><td>" + (trueVal || falseVal) + "</td></tr>";
        logOutput += "<tr><td>!</td><td>NOT</td><td>Negates boolean</td><td>!false</td><td>" + (!falseVal) + "</td></tr>";
        logOutput += "</table>";
        logOutput += "<p>Short-circuit evaluation: 'hello' && 'world' => 'world', 'hello' || 'world' => 'hello'</p>";
        document.getElementById("logicalOps").innerHTML = logOutput;
    </script>
</body>
</html>
