<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eval() Function</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript eval() Function</h1>
    
    <h2>1. Basic eval() Usage</h2>
    <p>Evaluates JavaScript code from a string:</p>
    <div class="output" id="basicEval"></div>
    
    <h2>2. Complex Expressions</h2>
    <div class="output" id="complexEval"></div>
    
    <h2>3. Variable Access</h2>
    <div class="output" id="varAccess"></div>
    
    <h2>4. Security Warning</h2>
    <div class="output" id="security"></div>

    <script>
        // Basic eval() - evaluates string as code
        let result = eval("2 + 2");
        document.getElementById("basicEval").innerHTML = 
            "eval('2 + 2') = " + result + "<br>" +
            "eval('10 * 5') = " + eval("10 * 5") + "<br>" +
            "eval('Math.sqrt(16)') = " + eval("Math.sqrt(16)");

        // Complex expressions
        let code = "3 + 4 * 2";
        let funcCode = "function add(a, b) { return a + b; }; add(5, 3)";
        
        let complexTable = "<table border='1' cellpadding='5'>";
        complexTable += "<tr><th>Code</th><th>Result</th></tr>";
        complexTable += "<tr><td>'3 + 4 * 2'</td><td>" + eval(code) + "</td></tr>";
        complexTable += "<tr><td>'Math.max(1,5,3)'</td><td>" + eval("Math.max(1,5,3)") + "</td></tr>";
        complexTable += "<tr><td>'Math.min(1,5,3)'</td><td>" + eval("Math.min(1,5,3)") + "</td></tr>";
        complexTable += "<tr><td>\"'Hello'.toUpperCase()\"</td><td>" + eval("'Hello'.toUpperCase()") + "</td></tr>";
        complexTable += "</table>";
        document.getElementById("complexEval").innerHTML = complexTable;

        // Variable access
        let x = 10;
        let y = 20;
        
        document.getElementById("varAccess").innerHTML = 
            "let x = 10, y = 20<br>" +
            "eval('x + y'): " + eval("x + y") + "<br>" +
            "eval('x * y'): " + eval("x * y") + "<br>" +
            "eval('x > y'): " + eval("x > y") + "<br>" +
            "(eval can access local variables)";

        // Security warning
        document.getElementById("security").innerHTML = 
            "<strong>WARNING: eval() is dangerous!</strong><br><br>" +
            "- Allows code injection attacks<br>" +
            "- Slow performance (interpreted at runtime)<br>" +
            "- Hard to debug and maintain<br>" +
            "- Use alternatives: JSON.parse(), Function constructor<br><br>" +
            "Example of malicious use: eval('document.cookie') would expose cookies";
    </script>
</body>
</html>
