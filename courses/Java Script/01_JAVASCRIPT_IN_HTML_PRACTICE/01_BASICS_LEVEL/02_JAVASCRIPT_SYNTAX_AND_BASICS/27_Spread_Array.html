<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spread Array</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Spread Operator with Arrays</h1>
    
    <h2>1. Array Spread Basics</h2>
    <div class="output" id="basicSpread"></div>
    
    <h2>2. Concatenating Arrays</h2>
    <div class="output" id="concat"></div>
    
    <h2>3. Copying Arrays</h2>
    <div class="output" id="copy"></div>
    
    <h2>4. Math and Array Functions</h2>
    <div class="output" id="mathFunc"></div>

    <script>
        // Basic spread
        let numbers = [1, 2, 3];
        let moreNumbers = [...numbers, 4, 5];
        
        document.getElementById("basicSpread").innerHTML = 
            "let numbers = [1, 2, 3]<br>" +
            "[...numbers, 4, 5] = " + JSON.stringify(moreNumbers) + "<br><br>" +
            "Add at beginning: [" + [...[0], ...numbers] + "]<br>" +
            "Add at end: [...numbers, ...[4,5]] = " + [...numbers, ...[4,5]];

        // Concatenating arrays
        let arr1 = [1, 2];
        let arr2 = [3, 4];
        let arr3 = [5, 6];
        let combined = [...arr1, ...arr2, ...arr3];
        
        document.getElementById("concat").innerHTML = 
            "arr1: " + JSON.stringify(arr1) + "<br>" +
            "arr2: " + JSON.stringify(arr2) + "<br>" +
            "arr3: " + JSON.stringify(arr3) + "<br>" +
            "[...arr1, ...arr2, ...arr3] = " + JSON.stringify(combined);

        // Copying arrays
        let original = [1, 2, 3];
        let shallowCopy = [...original];
        let modifyOriginal = original.push(4);
        
        document.getElementById("copy").innerHTML = 
            "original: " + JSON.stringify(original) + "<br>" +
            "shallowCopy: " + JSON.stringify(shallowCopy) + "<br>" +
            "original.push(4): original now = " + JSON.stringify(original) + "<br>" +
            "shallowCopy unchanged: " + JSON.stringify(shallowCopy);

        // Math and array functions
        let nums = [5, 2, 8, 1, 9];
        
        let funcTable = "<table border='1' cellpadding='5'>";
        funcTable += "<tr><th>Operation</th><th>Result</th></tr>";
        funcTable += "<tr><td>Math.max(...[5,2,8])</td><td>" + Math.max(...[5,2,8]) + "</td></tr>";
        funcTable += "<tr><td>Math.min(...[5,2,8])</td><td>" + Math.min(...[5,2,8]) + "</td></tr>";
        funcTable += "<tr><td>[...nums].sort()</td><td>" + [...nums].sort() + "</td></tr>";
        funcTable += "</table>";
        document.getElementById("mathFunc").innerHTML = funcTable;
    </script>
</body>
</html>
