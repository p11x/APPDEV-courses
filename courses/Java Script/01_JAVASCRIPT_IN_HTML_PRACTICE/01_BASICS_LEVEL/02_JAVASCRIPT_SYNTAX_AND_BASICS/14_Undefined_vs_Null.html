<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undefined vs Null</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Undefined vs Null</h1>
    
    <h2>1. Creating Undefined</h2>
    <p>Undefined - variable declared but not assigned:</p>
    <div class="output" id="undefinedDemo"></div>
    
    <h2>2. Creating Null</h2>
    <p>Null - intentionally assigned empty value:</p>
    <div class="output" id="nullDemo"></div>
    
    <h2>3. Key Differences</h2>
    <div class="output" id="differences"></div>
    
    <h2>4. Type Checks</h2>
    <div class="output" id="typeChecks"></div>

    <script>
        // undefined - declared but not assigned
        let notAssigned;
        document.getElementById("undefinedDemo").innerHTML = 
            "let notAssigned; => " + notAssigned + " (typeof: " + typeof notAssigned + ")";

        // null - intentionally set to nothing
        let emptyValue = null;
        document.getElementById("nullDemo").innerHTML = 
            "let emptyValue = null; => " + emptyValue + " (typeof: " + typeof emptyValue + ")";

        // Key differences
        let diffTable = "<table border='1' cellpadding='5'>";
        diffTable += "<tr><th>Aspect</th><th>undefined</th><th>null</th></tr>";
        diffTable += "<tr><td>Meaning</td><td>Not yet assigned</td><td>Intentionally empty</td></tr>";
        diffTable += "<tr><td>typeof</td><td>'undefined'</td><td>'object'</td></tr>";
        diffTable += "<tr><td>JSON</td><td>No</td><td>Yes</td></tr>";
        diffTable += "<tr><td>== comparison</td><td>true (with null)</td><td>true (with undefined)</td></tr>";
        diffTable += "</table>";
        document.getElementById("differences").innerHTML = diffTable;

        // Type checks
        let typeOutput = "<table border='1' cellpadding='5'>";
        typeOutput += "<tr><th>Check</th><th>Result</th></tr>";
        typeOutput += "<tr><td>undefined === undefined</td><td>" + (undefined === undefined) + "</td></tr>";
        typeOutput += "<tr><td>null === null</td><td>" + (null === null) + "</td></tr>";
        typeOutput += "<tr><td>undefined == null</td><td>" + (undefined == null) + "</td></tr>";
        typeOutput += "<tr><td>undefined === null</td><td>" + (undefined === null) + "</td></tr>";
        typeOutput += "</table>";
        document.getElementById("typeChecks").innerHTML = typeOutput;
    </script>
</body>
</html>
