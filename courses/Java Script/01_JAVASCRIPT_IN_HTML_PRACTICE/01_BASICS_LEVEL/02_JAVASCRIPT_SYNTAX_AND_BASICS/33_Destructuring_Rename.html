<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destructuring Rename</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Destructuring with Renaming</h1>
    
    <h2>1. Object Property Renaming</h2>
    <div class="output" id="objRename"></div>
    
    <h2>2. With Defaults</h2>
    <div name="defaults"></div>
    
    <h2>3. Nested Renaming</h2>
    <div class="output" id="nestedRename"></div>
    
    <h2>4. Multiple Renames</h2>
    <div class="output" id="multiple"></div>

    <script>
        // Object property renaming
        let apiResponse = {
            user_id: 123,
            user_name: "John",
            user_email: "john@test.com"
        };
        
        let { 
            user_id: id, 
            user_name: name, 
            user_email: email 
        } = apiResponse;
        
        document.getElementById("objRename").innerHTML = 
            "apiResponse: { user_id:123, user_name:'John', user_email:'john@test.com' }<br>" +
            "let { user_id: id, user_name: name, user_email: email }<br>" +
            "id: " + id + "<br>" +
            "name: " + name + "<br>" +
            "email: " + email;

        // With defaults
        let data = { first_name: "Alice" };
        let { first_name: first = "Unknown", last_name: last = "Doe" } = data;
        
        document.getElementById("defaults").innerHTML = 
            "first: " + first + "<br>" +
            "last: " + last;
        document.getElementById("defaults").style.background = "#f4f4f4";
        document.getElementById("defaults").style.padding = "15px";

        // Nested renaming
        let config = {
            database: {
                host_name: "localhost",
                port_num: 5432
            }
        };
        
        let { database: { host_name: host, port_num: port } } = config;
        
        document.getElementById("nestedRename").innerHTML = 
            "host: " + host + "<br>" +
            "port: " + port;

        // Multiple renames in one destructuring
        let source = { a: 1, b: 2, c: 3 };
        let { a: x, b: y, c: z } = source;
        
        document.getElementById("multiple").innerHTML = 
            "Source: { a:1, b:2, c:3 }<br>" +
            "Renamed to x, y, z:<br>" +
            "x: " + x + ", y: " + y + ", z: " + z;
    </script>
</body>
</html>
