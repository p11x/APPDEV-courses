<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Checking Methods</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript Type Checking Methods</h1>
    
    <h2>1. typeof Operator</h2>
    <p>Returns a string indicating the type:</p>
    <div class="output" id="typeofDemo"></div>
    
    <h2>2. typeof with Primitives</h2>
    <div class="output" id="typeofPrimitives"></div>
    
    <h2>3. typeof with Objects</h2>
    <div class="output" id="typeofObjects"></div>
    
    <h2>4. instanceof Operator</h2>
    <p>Checks if object is instance of a constructor:</p>
    <div class="output" id="instanceofDemo"></div>
    
    <h2>5. Array.isArray()</h2>
    <p>Best way to check for arrays:</p>
    <div class="output" id="arrayCheck"></div>
    
    <h2>6. null Check</h2>
    <div class="output" id="nullCheck"></div>

    <script>
        // ===== TYPEOF BASIC =====
        let str = "hello";
        let num = 42;
        let bool = true;
        let arr = [1, 2, 3];
        let obj = { key: "value" };
        let func = function() {};
        let und;
        let nul = null;
        
        let typeOutput = "<table border='1' cellpadding='5'>";
        typeOutput += "<tr><th>Value</th><th>typeof</th></tr>";
        typeOutput += "<tr><td>'hello'</td><td>" + typeof str + "</td></tr>";
        typeOutput += "<tr><td>42</td><td>" + typeof num + "</td></tr>";
        typeOutput += "<tr><td>true</td><td>" + typeof bool + "</td></tr>";
        typeOutput += "<tr><td>[1,2,3]</td><td>" + typeof arr + "</td></tr>";
        typeOutput += "<tr><td>{key:'value'}</td><td>" + typeof obj + "</td></tr>";
        typeOutput += "<tr><td>function</td><td>" + typeof func + "</td></tr>";
        typeOutput += "<tr><td>undefined</td><td>" + typeof und + "</td></tr>";
        typeOutput += "<tr><td>null</td><td>" + typeof nul + "</td></tr>";
        typeOutput += "</table>";
        document.getElementById("typeofDemo").innerHTML = typeOutput;

        // ===== TYPEOF PRIMITIVES =====
        let primOutput = "<ul>";
        primOutput += "<li><code>typeof 'text'</code> => 'string'</li>";
        primOutput += "<li><code>typeof 123</code> => 'number'</li>";
        primOutput += "<li><code>typeof 3.14</code> => 'number'</li>";
        primOutput += "<li><code>typeof true</code> => 'boolean'</li>";
        primOutput += "<li><code>typeof undefined</code> => 'undefined'</li>";
        primOutput += "<li><code>typeof Symbol('id')</code> => 'symbol'</li>";
        primOutput += "<li><code>typeof 123n</code> => 'bigint'</li>";
        primOutput += "<li><code>typeof null</code> => 'object' (JS bug!)</li>";
        primOutput += "</ul>";
        document.getElementById("typeofPrimitives").innerHTML = primOutput;

        // ===== TYPEOF WITH OBJECTS =====
        let objOutput = "<table border='1' cellpadding='5'>";
        objOutput += "<tr><th>Expression</th><th>typeof Result</th></tr>";
        objOutput += "<tr><td>{}</td><td>" + typeof {} + "</td></tr>";
        objOutput += "<td>[]</td><td>" + typeof [] + "</td></tr>";
        objOutput += "<tr><td>new Date()</td><td>" + typeof new Date() + "</td></tr>";
        objOutput += "<tr><td>/regex/</td><td>" + typeof /regex/ + "</td></tr>";
        objOutput += "<tr><td>function(){}</td><td>" + typeof function(){} + "</td></tr>";
        objOutput += "</table>";
        document.getElementById("typeofObjects").innerHTML = objOutput;

        // ===== INSTANCEOF =====
        let date = new Date();
        let regex = /abc/;
        let myArray = [1, 2, 3];
        let myString = "hello";
        
        let instOutput = "<table border='1' cellpadding='5'>";
        instOutput += "<tr><th>Value</th><th>instanceof</th><th>Result</th></tr>";
        instOutput += "<tr><td>new Date()</td><td>instanceof Date</td><td>" + (date instanceof Date) + "</td></tr>";
        instOutput += "<tr><td>/abc/</td><td>instanceof RegExp</td><td>" + (regex instanceof RegExp) + "</td></tr>";
        instOutput += "<tr><td>[1,2,3]</td><td>instanceof Array</td><td>" + (myArray instanceof Array) + "</td></tr>";
        instOutput += "<tr><td>'hello'</td><td>instanceof String</td><td>" + (myString instanceof String) + "</td></tr>";
        instOutput += "<tr><td>new String('hi')</td><td>instanceof String</td><td>" + (new String('hi') instanceof String) + "</td></tr>";
        instOutput += "</table>";
        document.getElementById("instanceofDemo").innerHTML = instOutput;

        // ===== ARRAY.ISARRAY =====
        let arr1 = [];
        let arr2 = new Array();
        let notArr = "not array";
        let obj2 = {};
        
        let arrCheckOutput = "<table border='1' cellpadding='5'>";
        arrCheckOutput += "<tr><th>Value</th><th>Array.isArray()</th><th>typeof</th></tr>";
        arrCheckOutput += "<tr><td>[]</td><td>" + Array.isArray(arr1) + "</td><td>" + typeof arr1 + "</td></tr>";
        arrCheckOutput += "<tr><td>new Array()</td><td>" + Array.isArray(arr2) + "</td><td>" + typeof arr2 + "</td></tr>";
        arrCheckOutput += "<tr><td>'not array'</td><td>" + Array.isArray(notArr) + "</td><td>" + typeof notArr + "</td></tr>";
        arrCheckOutput += "<tr><td>{}</td><td>" + Array.isArray(obj2) + "</td><td>" + typeof obj2 + "</td></tr>";
        arrCheckOutput += "</table>";
        document.getElementById("arrayCheck").innerHTML = arrCheckOutput;

        // ===== NULL CHECK =====
        let testNull = null;
        let testUnd = undefined;
        
        let nullCheckOutput = "<ul>";
        nullCheckOutput += "<li><code>testNull === null</code> => " + (testNull === null) + "</li>";
        nullCheckOutput += "<li><code>testUnd === undefined</code> => " + (testUnd === undefined) + "</li>";
        nullCheckOutput += "<li><code>testNull == null</code> => " + (testNull == null) + "</li>";
        nullCheckOutput += "<li><code>testUnd == null</code> => " + (testUnd == null) + "</li>";
        nullCheckOutput += "<li><code>typeof testNull === 'object'</code> => " + (typeof testNull === 'object') + "</li>";
        nullCheckOutput += "<li>Use <code>== null</code> to check both null and undefined</li>";
        nullCheckOutput += "</ul>";
        document.getElementById("nullCheck").innerHTML = nullCheckOutput;
    </script>
</body>
</html>
