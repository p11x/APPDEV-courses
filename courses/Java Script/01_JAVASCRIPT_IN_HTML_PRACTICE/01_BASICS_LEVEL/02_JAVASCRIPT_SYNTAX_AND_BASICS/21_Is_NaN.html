<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>isNaN()</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript isNaN()</h1>
    
    <h2>1. Global isNaN()</h2>
    <p>Coerces values before checking (can be confusing):</p>
    <div class="output" id="globalNan"></div>
    
    <h2>2. Number.isNaN()</h2>
    <p>More reliable - no type coercion:</p>
    <div class="output" id="numberNan"></div>
    
    <h2>3. Difference Between Methods</h2>
    <div class="output" id="difference"></div>
    
    <h2>4. Recommended Usage</h2>
    <div class="output" id="recommended"></div>

    <script>
        // Global isNaN() - coerces values
        let globalTable = "<table border='1' cellpadding='5'>";
        globalTable += "<tr><th>Value</th><th>isNaN()</th></tr>";
        globalTable += "<tr><td>NaN</td><td>" + isNaN(NaN) + "</td></tr>";
        globalTable += "<tr><td>'hello'</td><td>" + isNaN("hello") + "</td></tr>";
        globalTable += "<tr><td>'123'</td><td>" + isNaN("123") + "</td></tr>";
        globalTable += "<tr><td>undefined</td><td>" + isNaN(undefined) + "</td></tr>";
        globalTable += "<tr><td>null</td><td>" + isNaN(null) + "</td></tr>";
        globalTable += "<tr><td>0/0</td><td>" + isNaN(0/0) + "</td></tr>";
        globalTable += "<tr><td>123</td><td>" + isNaN(123) + "</td></tr>";
        globalTable += "</table>";
        document.getElementById("globalNan").innerHTML = globalTable;

        // Number.isNaN() - no coercion
        let numTable = "<table border='1' cellpadding='5'>";
        numTable += "<tr><th>Value</th><th>Number.isNaN()</th></tr>";
        numTable += "<tr><td>NaN</td><td>" + Number.isNaN(NaN) + "</td></tr>";
        numTable += "<tr><td>'hello'</td><td>" + Number.isNaN("hello") + "</td></tr>";
        numTable += "<tr><td>'123'</td><td>" + Number.isNaN("123") + "</td></tr>";
        numTable += "<tr><td>undefined</td><td>" + Number.isNaN(undefined) + "</td></tr>";
        numTable += "<tr><td>null</td><td>" + Number.isNaN(null) + "</td></tr>";
        numTable += "<tr><td>0/0</td><td>" + Number.isNaN(0/0) + "</td></tr>";
        numTable += "<tr><td>123</td><td>" + Number.isNaN(123) + "</td></tr>";
        numTable += "</table>";
        document.getElementById("numberNan").innerHTML = numTable;

        // Key difference
        let diffTable = "<table border='1' cellpadding='5'>";
        diffTable += "<tr><th>Value</th><th>isNaN()</th><th>Number.isNaN()</th></tr>";
        diffTable += "<tr><td>'hello'</td><td>" + isNaN("hello") + " (coerced to NaN)</td><td>" + Number.isNaN("hello") + " (not a number)</td></tr>";
        diffTable += "<tr><td>undefined</td><td>" + isNaN(undefined) + " (coerced to NaN)</td><td>" + Number.isNaN(undefined) + " (not NaN)</td></tr>";
        diffTable += "<tr><td>null</td><td>" + isNaN(null) + " (coerced to 0)</td><td>" + Number.isNaN(null) + " (not NaN)</td></tr>";
        diffTable += "</table>";
        document.getElementById("difference").innerHTML = diffTable;

        // Recommended usage
        document.getElementById("recommended").innerHTML = 
            "Use Number.isNaN() for accuracy:<br>" +
            "Number.isNaN(NaN): " + Number.isNaN(NaN) + "<br>" +
            "Number.isNaN('hello'): " + Number.isNaN("hello") + "<br>" +
            "Or use comparison: value !== value returns true only for NaN";
    </script>
</body>
</html>
