<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>typeof Operator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript typeof Operator</h1>
    
    <h2>1. Basic typeof Checks</h2>
    <div class="output" id="basicType"></div>
    
    <h2>2. typeof with Primitives</h2>
    <div class="output" id="primitives"></div>
    
    <h2>3. typeof with Objects</h2>
    <div class="output" id="objects"></div>
    
    <h2>4. typeof Quirk</h2>
    <div class="output" id="quirk"></div>

    <script>
        // Basic typeof
        let basicTable = "<table border='1' cellpadding='5'>";
        basicTable += "<tr><th>Expression</th><th>typeof</th></tr>";
        basicTable += "<tr><td>typeof 123</td><td>" + typeof 123 + "</td></tr>";
        basicTable += "<tr><td>typeof 'hello'</td><td>" + typeof "hello" + "</td></tr>";
        basicTable += "<tr><td>typeof true</td><td>" + typeof true + "</td></tr>";
        basicTable += "<tr><td>typeof undefined</td><td>" + typeof undefined + "</td></tr>";
        basicTable += "<tr><td>typeof null</td><td>" + typeof null + "</td></tr>";
        basicTable += "<tr><td>typeof {}</td><td>" + typeof {} + "</td></tr>";
        basicTable += "<tr><td>typeof []</td><td>" + typeof [] + "</td></tr>";
        basicTable += "<tr><td>typeof function(){}</td><td>" + typeof function(){} + "</td></tr>";
        basicTable += "</table>";
        document.getElementById("basicType").innerHTML = basicTable;

        // Primitives
        let primTable = "<table border='1' cellpadding='5'>";
        primTable += "<tr><th>Value</th><th>typeof</th></tr>";
        primTable += "<tr><td>42</td><td>" + typeof 42 + "</td></tr>";
        primTable += "<tr><td>3.14</td><td>" + typeof 3.14 + "</td></tr>";
        primTable += "<tr><td>'text'</td><td>" + typeof "text" + "</td></tr>";
        primTable += "<tr><td>Symbol('id')</td><td>" + typeof Symbol("id") + "</td></tr>";
        primTable += "<tr><td>BigInt(123)</td><td>" + typeof BigInt(123) + "</td></tr>";
        primTable += "</table>";
        document.getElementById("primitives").innerHTML = primTable;

        // Objects
        let objTable = "<table border='1' cellpadding='5'>";
        objTable += "<tr><th>Value</th><th>typeof</th></tr>";
        objTable += "<tr><td>{}</td><td>" + typeof {} + "</td></tr>";
        objTable += "<tr><td>[]</td><td>" + typeof [] + "</td></tr>";
        objTable += "<tr><td>/regex/</td><td>" + typeof /regex/ + "</td></tr>";
        objTable += "<tr><td>new Date()</td><td>" + typeof new Date() + "</td></tr>";
        objTable += "<tr><td>new Map()</td><td>" + typeof new Map() + "</td></tr>";
        objTable += "<tr><td>new Set()</td><td>" + typeof new Set() + "</td></tr>";
        objTable += "</table>";
        document.getElementById("objects").innerHTML = objTable;

        // typeof quirk with null
        document.getElementById("quirk").innerHTML = 
            "<strong>KNOWN BUG:</strong> typeof returns 'object' for null<br><br>" +
            "typeof null === 'object': " + (typeof null === "object") + "<br><br>" +
            "This is a historical bug from early JavaScript.<br>" +
            "Use: value === null to check for null specifically.";
    </script>
</body>
</html>
