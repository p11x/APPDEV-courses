<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments Styles</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript Comment Styles</h1>
    
    <h2>1. Single-line Comments (//)</h2>
    <p>Use // for short explanations:</p>
    <div class="output" id="singleLine"></div>
    
    <h2>2. Multi-line Comments (/* */)</h2>
    <p>Use /* */ for longer explanations:</p>
    <div class="output" id="multiLine"></div>
    
    <h2>3. Comment Uses</h2>
    <div class="output" id="uses"></div>
    
    <h2>Output</h2>
    <div class="output" id="result"></div>

    <script>
        // ===== SINGLE-LINE COMMENTS =====
        // This is a single-line comment
        let x = 5; // Inline comment
        
        // Calculate sum
        // of two numbers
        let sum = 10 + 20;
        
        document.getElementById("singleLine").innerHTML = 
            "<ul><li><code>// comment</code> - single line</li>" +
            "<li><code>let x = 5; // inline</code> - inline comment</li>" +
            "<li>Everything after // on that line is ignored</li></ul>";

        /* ===== MULTI-LINE COMMENTS ===== */
        /* This is a multi-line comment
           that can span multiple lines
           without any special characters needed */
        let name = "John";
        
        /* Function: calculateArea
           Parameters: width, height
           Returns: width * height */
        function calculateArea(w, h) {
            return w * h;
        }
        
        let area = calculateArea(5, 3);
        
        document.getElementById("multiLine").innerHTML = 
            "<ul><li><code>/* comment */</code> - block comment</li>" +
            "<li>Everything between /* and */ is ignored</li>" +
            "<li>Useful for multi-line explanations</li>" +
            "<li>Used for code blocks, function documentation</li></ul>";

        // ===== COMMENT USES =====
        // 1. Document what code does
        // 2. Temporarily disable code
        // 3. Add TODO notes
        // 4. Explain complex logic
        
        // TODO: Refactor this code later
        // FIXME: This has a bug
        // NOTE: Important information
        
        /* TODO: Add error handling
           FIXME: Handle negative numbers
           NOTE: This function needs testing */
        
        // ===== DISABLING CODE =====
        // let disabled = "This won't run";
        /* let alsoDisabled = "Also won't run"; */
        
        // The calculateArea function result:
        // Uncomment below to see disabled code:
        // let test = "disabled";
        
        let usesOutput = "<table border='1' cellpadding='5'>";
        usesOutput += "<tr><th>Use</th><th>Example</th></tr>";
        usesOutput += "<tr><td>Documentation</td><td>// Explains what code does</td></tr>";
        usesOutput += "<tr><td>Temporarily disable</td><td>// let x = 5;</td></tr>";
        usesOutput += "<tr><td>TODOs/FIXMEs</td><td>// TODO: Fix this later</td></tr>";
        usesOutput += "<tr><td>Explain logic</td><td>/* Complex calculation here */</td></tr>";
        usesOutput += "</table>";
        document.getElementById("uses").innerHTML = usesOutput;

        // ===== OUTPUT =====
        document.getElementById("result").innerHTML = 
            "sum = " + sum + ", area = " + area + ", name = " + name;
    </script>
</body>
</html>
