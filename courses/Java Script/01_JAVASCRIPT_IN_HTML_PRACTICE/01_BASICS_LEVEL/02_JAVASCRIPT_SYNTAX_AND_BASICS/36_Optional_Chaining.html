<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optional Chaining</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Optional Chaining Operator (?.)</h1>
    
    <h2>1. Safe Property Access</h2>
    <p>Returns undefined instead of error for missing properties:</p>
    <div class="output" id="safeProp"></div>
    
    <h2>2. ?. vs []</h2>
    <div class="output" id="bracket"></div>
    
    <h2>3. Chain Examples</h2>
    <div class="output" id="chains"></div>
    
    <h2>4. With Methods</h2>
    <div class="output" id="methods"></div>

    <script>
        // Safe property access
        let user = {
            profile: {
                name: "John"
            }
        };
        
        let city = user?.address?.city;
        let country = user?.address?.country ?? "Unknown";
        
        document.getElementById("safeProp").innerHTML = 
            "user = { profile: { name: 'John' } }<br>" +
            "user?.address?.city = " + city + "<br>" +
            "user?.address?.country ?? 'Unknown' = " + country;

        // ?. vs bracket notation
        let data = {
            items: [1, 2, 3]
        };
        
        let val1 = data?.items?.[0];
        let val2 = data?.items?.[10];
        
        let compTable = "<table border='1' cellpadding='5'>";
        compTable += "<tr><th>Expression</th><th>Result</th></tr>";
        compTable += "<tr><td>data?.items?.[0]</td><td>" + val1 + "</td></tr>";
        compTable += "<tr><td>data?.items?.[10]</td><td>" + val2 + "</td></tr>";
        compTable += "<tr><td>data?.missing?.[0]</td><td>" + data?.missing?.[0] + "</td></tr>";
        compTable += "</table>";
        document.getElementById("bracket").innerHTML = compTable;

        // Chaining examples
        let obj = {
            user: {
                company: {
                    name: "Acme"
                }
            }
        };
        
        let company1 = obj?.user?.company?.name;
        let company2 = obj?.user?.missing?.name;
        let company3 = obj?.user?.company?.CEO?.name;
        
        document.getElementById("chains").innerHTML = 
            "obj?.user?.company?.name: " + company1 + "<br>" +
            "obj?.user?.missing?.name: " + company2 + "<br>" +
            "obj?.user?.company?.CEO?.name: " + company3;

        // With methods
        let obj2 = {
            calculate: function(a, b) {
                return a + b;
            }
        };
        
        let result1 = obj2?.calculate?.(5, 3);
        let result2 = obj2?.missing?.();
        
        document.getElementById("methods").innerHTML = 
            "obj2.calculate(5, 3) = " + result1 + "<br>" +
            "obj2.missing() = " + result2 + "<br><br>" +
            "Method only called if it exists";
    </script>
</body>
</html>
