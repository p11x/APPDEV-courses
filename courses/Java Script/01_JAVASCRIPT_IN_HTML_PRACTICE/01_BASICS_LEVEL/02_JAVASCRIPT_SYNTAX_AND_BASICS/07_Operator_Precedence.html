<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Precedence</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript Operator Precedence</h1>
    
    <h2>Precedence Order (Highest to Lowest)</h2>
    <div class="output" id="precedenceTable"></div>
    
    <h2>Examples</h2>
    <div class="output" id="examples"></div>

    <script>
        // ===== PRECEDENCE TABLE =====
        let tableOutput = "<table border='1' cellpadding='5'>";
        tableOutput += "<tr><th>Precedence</th><th>Operators</th><th>Description</th></tr>";
        tableOutput += "<tr><td>1 (highest)</td><td>()</td><td>Parentheses</td></tr>";
        tableOutput += "<tr><td>2</td><td>++ -- ! typeof</td><td>Unary operators</td></tr>";
        tableOutput += "<tr><td>3</td><td>**</td><td>Exponentiation</td></tr>";
        tableOutput += "<tr><td>4</td><td>* / %</td><td>Multiplicative</td></tr>";
        tableOutput += "<tr><td>5</td><td>+ -</td><td>Additive</td></tr>";
        tableOutput += "<tr><td>6</td><td>< <= > >=</td><td>Relational</td></tr>";
        tableOutput += "<tr><td>7</td><td>== != === !==</td><td>Equality</td></tr>";
        tableOutput += "<tr><td>8</td><td>&&</td><td>Logical AND</td></tr>";
        tableOutput += "<tr><td>9 (lowest)</td><td>|| ??</td><td>Logical OR / Nullish</td></tr>";
        tableOutput += "</table>";
        document.getElementById("precedenceTable").innerHTML = tableOutput;

        // ===== EXAMPLES =====
        // Example 1: Multiplication before addition
        let result1 = 2 + 3 * 4;      // 14, not 20
        let result1Explicit = 2 + (3 * 4);
        
        // Example 2: Parentheses override precedence
        let result2 = (2 + 3) * 4;    // 20
        
        // Example 3: Left-to-right for same precedence
        let result3 = 10 - 3 - 2;     // 5, not 8 (10 - 3 = 7, then 7 - 2 = 5)
        
        // Example 4: Assignment with precedence
        let a;
        let result4 = a = 5 + 3;     // 8 (assignment returns the value)
        
        // Example 5: Comparison and logical
        let result5 = 5 > 3 && 2 < 4; // true && true = true
        
        // Example 6: typeof has high precedence
        let result6 = typeof 5 + 3;   // "number" + 3 = "number3"
        
        // Example 7: Exponentiation is right-to-left
        let result7 = 2 ** 3 ** 2;    // 2^9 = 512, not (2^3)^2 = 64
        
        let exOutput = "<table border='1' cellpadding='5'>";
        exOutput += "<tr><th>Expression</th><th>Evaluation</th><th>Result</th></tr>";
        exOutput += "<tr><td>2 + 3 * 4</td><td>2 + (3 * 4)</td><td>" + result1 + "</td></tr>";
        exOutput += "<tr><td>(2 + 3) * 4</td><td>(2 + 3) * 4</td><td>" + result2 + "</td></tr>";
        exOutput += "<tr><td>10 - 3 - 2</td><td>(10 - 3) - 2</td><td>" + result3 + "</td></tr>";
        exOutput += "<tr><td>a = 5 + 3</td><td>a = (5 + 3)</td><td>" + result4 + "</td></tr>";
        exOutput += "<tr><td>5 > 3 && 2 < 4</td><td>(5 > 3) && (2 < 4)</td><td>" + result5 + "</td></tr>";
        exOutput += "<tr><td>typeof 5 + 3</td><td>(typeof 5) + 3</td><td>'" + result6 + "'</td></tr>";
        exOutput += "<tr><td>2 ** 3 ** 2</td><td>2 ** (3 ** 2) = 2^9</td><td>" + result7 + "</td></tr>";
        exOutput += "</table>";
        exOutput += "<p>Use parentheses to make code clearer and avoid confusion!</p>";
        document.getElementById("examples").innerHTML = exOutput;
    </script>
</body>
</html>
