<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destructuring Swap</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Variable Swapping with Destructuring</h1>
    
    <h2>1. Basic Swap</h2>
    <p>Swap two values without temp variable:</p>
    <div class="output" id="basicSwap"></div>
    
    <h2>2. Swap Multiple</h2>
    <div class="output" id="multiSwap"></div>
    
    <h2>3. Array Element Swap</h2>
    <div class="output" id="arraySwap"></div>
    
    <h2>4. Traditional vs Destructuring</h2>
    <div class="output" id="compare"></div>

    <script>
        // Basic swap
        let a = 1, b = 2;
        [a, b] = [b, a];
        
        document.getElementById("basicSwap").innerHTML = 
            "Before: a = 1, b = 2<br>" +
            "[a, b] = [b, a]<br>" +
            "After: a = " + a + ", b = " + b;

        // Multiple swap
        let x = "first", y = "second", z = "third";
        [x, y, z] = [z, x, y];
        
        document.getElementById("multiSwap").innerHTML = 
            "Before: x='first', y='second', z='third'<br>" +
            "[x, y, z] = [z, x, y]<br>" +
            "After: x = " + x + ", y = " + y + ", z = " + z;

        // Array element swap
        let nums = [10, 20, 30, 40];
        [nums[0], nums[2]] = [nums[2], nums[0]];
        
        document.getElementById("arraySwap").innerHTML = 
            "Before: [10, 20, 30, 40]<br>" +
            "[nums[0], nums[2]] = [nums[2], nums[0]]<br>" +
            "After: " + JSON.stringify(nums);

        // Traditional vs destructuring
        let i = 5, j = 10;
        
        // Old way comments
        // let temp = i;
        // i = j;
        // j = temp;
        
        // Destructuring way
        [i, j] = [j, i];
        
        document.getElementById("compare").innerHTML = 
            "<strong>Traditional (3 lines):</strong><br>" +
            "let temp = i; i = j; j = temp;<br><br>" +
            "<strong>Destructuring (1 line):</strong><br>" +
            "[i, j] = [j, i]<br><br>" +
            "Result: i = " + i + ", j = " + j;
    </script>
</body>
</html>
