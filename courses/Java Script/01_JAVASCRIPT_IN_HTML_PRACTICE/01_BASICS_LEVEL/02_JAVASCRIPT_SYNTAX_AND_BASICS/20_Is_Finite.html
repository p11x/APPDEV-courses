<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>isFinite()</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript isFinite()</h1>
    
    <h2>1. Global isFinite()</h2>
    <p>Checks if value is a finite number:</p>
    <div class="output" id="globalFinite"></div>
    
    <h2>2. Number.isFinite()</h2>
    <p>More strict version (no type coercion):</p>
    <div class="output" id="numberFinite"></div>
    
    <h2>3. Comparison: isFinite() vs Number.isFinite()</h2>
    <div class="output" id="comparison"></div>
    
    <h2>4. Practical Use</h2>
    <div class="output" id="practical"></div>

    <script>
        // Global isFinite() - coerces values
        let globalTable = "<table border='1' cellpadding='5'>";
        globalTable += "<tr><th>Value</th><th>isFinite()</th></tr>";
        globalTable += "<tr><td>123</td><td>" + isFinite(123) + "</td></tr>";
        globalTable += "<tr><td>'123'</td><td>" + isFinite("123") + "</td></tr>";
        globalTable += "<tr><td>'hello'</td><td>" + isFinite("hello") + "</td></tr>";
        globalTable += "<tr><td>Infinity</td><td>" + isFinite(Infinity) + "</td></tr>";
        globalTable += "<tr><td>-Infinity</td><td>" + isFinite(-Infinity) + "</td></tr>";
        globalTable += "<tr><td>NaN</td><td>" + isFinite(NaN) + "</td></tr>";
        globalTable += "<tr><td>null</td><td>" + isFinite(null) + "</td></tr>";
        globalTable += "<tr><td>''</td><td>" + isFinite("") + "</td></tr>";
        globalTable += "</table>";
        document.getElementById("globalFinite").innerHTML = globalTable;

        // Number.isFinite() - no coercion
        let numTable = "<table border='1' cellpadding='5'>";
        numTable += "<tr><th>Value</th><th>Number.isFinite()</th></tr>";
        numTable += "<tr><td>123</td><td>" + Number.isFinite(123) + "</td></tr>";
        numTable += "<tr><td>'123'</td><td>" + Number.isFinite("123") + "</td></tr>";
        numTable += "<tr><td>'hello'</td><td>" + Number.isFinite("hello") + "</td></tr>";
        numTable += "<tr><td>Infinity</td><td>" + Number.isFinite(Infinity) + "</td></tr>";
        numTable += "<tr><td>-Infinity</td><td>" + Number.isFinite(-Infinity) + "</td></tr>";
        numTable += "<tr><td>NaN</td><td>" + Number.isFinite(NaN) + "</td></tr>";
        numTable += "<tr><td>null</td><td>" + Number.isFinite(null) + "</td></tr>";
        numTable += "<tr><td>''</td><td>" + Number.isFinite("") + "</td></tr>";
        numTable += "</table>";
        document.getElementById("numberFinite").innerHTML = numTable;

        // Comparison table
        let compTable = "<table border='1' cellpadding='5'>";
        compTable += "<tr><th>Value</th><th>isFinite()</th><th>Number.isFinite()</th></tr>";
        compTable += "<tr><td>0</td><td>" + isFinite(0) + "</td><td>" + Number.isFinite(0) + "</td></tr>";
        compTable += "<tr><td>-0</td><td>" + isFinite(-0) + "</td><td>" + Number.isFinite(-0) + "</td></tr>";
        compTable += "<tr><td>3.14</td><td>" + isFinite(3.14) + "</td><td>" + Number.isFinite(3.14) + "</td></tr>";
        compTable += "</table>";
        document.getElementById("comparison").innerHTML = compTable;

        // Practical use
        function divide(a, b) {
            if (!Number.isFinite(a / b)) {
                return "Cannot divide by zero or overflow";
            }
            return a / b;
        }
        
        document.getElementById("practical").innerHTML = 
            "divide(10, 2): " + divide(10, 2) + "<br>" +
            "divide(10, 0): " + divide(10, 0) + "<br>" +
            "divide(Infinity, 2): " + divide(Infinity, 2);
    </script>
</body>
</html>
