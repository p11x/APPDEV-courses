<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destructuring Nested</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Nested Destructuring</h1>
    
    <h2>1. Nested Objects</h2>
    <div class="output" id="nestedObj"></div>
    
    <h2>2. Nested Arrays in Objects</h2>
    <div class="output" id="nestedArr"></div>
    
    <h2>3. Mixed Nesting</h2>
    <div class="output" id="mixed"></div>
    
    <h2>4. Deeper Nesting</h2>
    <div class="output" id="deep"></div>

    <script>
        // Nested objects
        let user = {
            info: {
                name: "John",
                address: {
                    city: "NYC",
                    zip: "10001"
                }
            }
        };
        
        let { 
            info: { 
                name, 
                address: { city, zip } 
            } 
        } = user;
        
        document.getElementById("nestedObj").innerHTML = 
            "user = { info: { name:'John', address:{city:'NYC', zip:'10001'} } }<br>" +
            "name: " + name + "<br>" +
            "city: " + city + "<br>" +
            "zip: " + zip;

        // Nested arrays in objects
        let data = {
            items: ["apple", "banana", "cherry"]
        };
        
        let { items: [first, second, third] } = data;
        
        document.getElementById("nestedArr").innerHTML = 
            "data = { items: ['apple', 'banana', 'cherry'] }<br>" +
            "let { items: [first, second, third] } = data<br>" +
            "first: " + first + "<br>" +
            "second: " + second + "<br>" +
            "third: " + third;

        // Mixed nesting
        let company = {
            departments: [
                { name: "Engineering", head: "Alice" },
                { name: "Sales", head: "Bob" }
            ]
        };
        
        let { departments: [{ name: d1Name, head: d1Head }, { name: d2Name, head: d2Head }] } = company;
        
        document.getElementById("mixed").innerHTML = 
            "departments[0].name: " + d1Name + " (head: " + d1Head + ")<br>" +
            "departments[1].name: " + d2Name + " (head: " + d2Head + ")";

        // Deeper nesting
        let deep = {
            level1: {
                level2: {
                    level3: {
                        value: "deep value"
                    }
                }
            }
        };
        
        let { level1: { level2: { level3: { value } } } = deep;
        
        document.getElementById("deep").innerHTML = 
            "level1.level2.level3.value: " + value;
    </script>
</body>
</html>
