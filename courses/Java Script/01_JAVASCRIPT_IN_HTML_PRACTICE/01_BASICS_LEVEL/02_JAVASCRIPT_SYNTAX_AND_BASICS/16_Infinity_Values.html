<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Values</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript Infinity Values</h1>
    
    <h2>1. Creating Infinity</h2>
    <div class="output" id="infinityCreation"></div>
    
    <h2>2. Infinity Arithmetic</h2>
    <div class="output" id="infinityMath"></div>
    
    <h2>3. Infinity Comparisons</h2>
    <div class="output" id="infinityCompare"></div>
    
    <h2>4. isFinite() Check</h2>
    <div class="output" id="isFiniteCheck"></div>

    <script>
        // Creating Infinity
        let posInf = Infinity;
        let negInf = -Infinity;
        let divByZero = 10 / 0;
        let largeNum = Math.pow(10, 1000);
        
        document.getElementById("infinityCreation").innerHTML = 
            "Infinity = " + posInf + "<br>" +
            "-Infinity = " + negInf + "<br>" +
            "10 / 0 = " + divByZero + "<br>" +
            "Math.pow(10, 1000) = " + largeNum;

        // Infinity math
        let infTable = "<table border='1' cellpadding='5'>";
        infTable += "<tr><th>Operation</th><th>Result</th></tr>";
        infTable += "<tr><td>Infinity + 1</td><td>" + (Infinity + 1) + "</td></tr>";
        infTable += "<tr><td>Infinity + Infinity</td><td>" + (Infinity + Infinity) + "</td></tr>";
        infTable += "<tr><td>Infinity - Infinity</td><td>" + (Infinity - Infinity) + "</td></tr>";
        infTable += "<tr><td>Infinity * 2</td><td>" + (Infinity * 2) + "</td></tr>";
        infTable += "<tr><td>Infinity / Infinity</td><td>" + (Infinity / Infinity) + "</td></tr>";
        infTable += "<tr><td>1 / Infinity</td><td>" + (1 / Infinity) + "</td></tr>";
        infTable += "</table>";
        document.getElementById("infinityMath").innerHTML = infTable;

        // Infinity comparisons
        let compTable = "<table border='1' cellpadding='5'>";
        compTable += "<tr><th>Comparison</th><th>Result</th></tr>";
        compTable += "<tr><td>Infinity > 1000000</td><td>" + (Infinity > 1000000) + "</td></tr>";
        compTable += "<tr><td>Infinity === Infinity</td><td>" + (Infinity === Infinity) + "</td></tr>";
        compTable += "<tr><td>-Infinity < Infinity</td><td>" + (-Infinity < Infinity) + "</td></tr>";
        compTable += "<tr><td>Infinity == Infinity</td><td>" + (Infinity == Infinity) + "</td></tr>";
        compTable += "</table>";
        document.getElementById("infinityCompare").innerHTML = compTable;

        // isFinite check
        let finiteTable = "<table border='1' cellpadding='5'>";
        finiteTable += "<tr><th>Value</th><th>isFinite()</th></tr>";
        finiteTable += "<tr><td>123</td><td>" + isFinite(123) + "</td></tr>";
        finiteTable += "<tr><td>Infinity</td><td>" + isFinite(Infinity) + "</td></tr>";
        finiteTable += "<tr><td>-Infinity</td><td>" + isFinite(-Infinity) + "</td></tr>";
        finiteTable += "<tr><td>NaN</td><td>" + isFinite(NaN) + "</td></tr>";
        finiteTable += "<tr><td>'50'</td><td>" + isFinite("50") + "</td></tr>";
        finiteTable += "</table>";
        document.getElementById("isFiniteCheck").innerHTML = finiteTable;
    </script>
</body>
</html>
