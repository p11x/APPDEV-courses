<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spread Function</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Spread Operator in Function Calls</h1>
    
    <h2>1. Spread as Arguments</h2>
    <p>Expand array into individual arguments:</p>
    <div class="output" id="spreadArgs"></div>
    
    <h2>2. Apply Alternative</h2>
    <div class="output" id="applyAlt"></div>
    
    <h2>3. Variable Arguments</h2>
    <div class="output" id="varArgs"></div>
    
    <h2>4. Rest vs Spread</h2>
    <div class="output" id="restSpread"></div>

    <script>
        // Spread as arguments
        function sum(a, b, c) {
            return a + b + c;
        }
        
        let nums = [1, 2, 3];
        let result = sum(...nums);
        
        document.getElementById("spreadArgs").innerHTML = 
            "function sum(a, b, c) { return a + b + c; }<br>" +
            "let nums = [1, 2, 3]<br>" +
            "sum(...nums) = " + result + "<br><br>" +
            "sum(...[10, 20, 30]) = " + sum(...[10, 20, 30]);

        // Apply alternative (older way)
        let maxResult = Math.max.apply(null, [3, 1, 5, 2]);
        let spreadResult = Math.max(...[3, 1, 5, 2]);
        
        document.getElementById("applyAlt").innerHTML = 
            "Math.max.apply(null, [3,1,5,2]) = " + maxResult + "<br>" +
            "Math.max(...[3,1,5,2]) = " + spreadResult + "<br><br>" +
            "(Spread is cleaner than apply)";

        // Variable arguments
        function greet(message, ...names) {
            return names.map(name => message + ", " + name + "!");
        }
        
        let greetings = greet("Hello", "Alice", "Bob", "Charlie");
        
        document.getElementById("varArgs").innerHTML = 
            "function greet(msg, ...names)<br>" +
            "greet('Hello', 'Alice', 'Bob', 'Charlie'):<br>" +
            JSON.stringify(greetings);

        // Rest vs Spread difference
        document.getElementById("restSpread").innerHTML = 
            "<strong>REST (...params):</strong> collects into array<br>" +
            "function f(...args) {} - args is an array<br><br>" +
            "<strong>SPREAD (...arr):</strong> spreads array to elements<br>" +
            "f(...arr) - expands array to individual arguments";
    </script>
</body>
</html>
