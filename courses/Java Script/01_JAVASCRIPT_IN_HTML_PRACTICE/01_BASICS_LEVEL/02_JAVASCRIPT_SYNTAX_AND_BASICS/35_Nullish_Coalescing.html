<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nullish Coalescing</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Nullish Coalescing Operator (??)</h1>
    
    <h2>1. What is Nullish Coalescing</h2>
    <p>Returns right operand when left is null/undefined only:</p>
    <div class="output" id="basic"></div>
    
    <h2>2. ?? vs ||</h2>
    <div class="output" id="compare"></div>
    
    <h2>3. Practical Examples</h2>
    <div class="output" id="practical"></div>
    
    <h2>4. Chains and Combining</h2>
    <div class="output" id="chains"></div>

    <script>
        // Basic nullish coalescing
        let nullVal = null;
        let undefinedVal = undefined;
        let zero = 0;
        let empty = "";
        
        let basicTable = "<table border='1' cellpadding='5'>";
        basicTable += "<tr><th>Value</th><th>Value ?? 'default'</th></tr>";
        basicTable += "<tr><td>null</td><td>" + (nullVal ?? "default") + "</td></tr>";
        basicTable += "<tr><td>undefined</td><td>" + (undefinedVal ?? "default") + "</td></tr>";
        basicTable += "<tr><td>0</td><td>" + (zero ?? "default") + "</td></tr>";
        basicTable += "<tr><td>''</td><td>'" + (empty ?? "default") + "'</td></tr>";
        basicTable += "<tr><td>false</td><td>" + (false ?? "default") + "</td></tr>";
        basicTable += "</table>";
        document.getElementById("basic").innerHTML = basicTable;

        // ?? vs ||
        let val = 0;
        
        let compTable = "<table border='1' cellpadding='5'>";
        compTable += "<tr><th>Value</th><th>?? 'fallback'</th><th>|| 'fallback'</th></tr>";
        compTable += "<tr><td>0</td><td>" + (val ?? "fallback") + "</td><td>" + (val || "fallback") + "</td></tr>";
        compTable += "<tr><td>''</td><td>" + ("" ?? "fallback") + "</td><td>" + ("" || "fallback") + "</td></tr>";
        compTable += "<tr><td>false</td><td>" + (false ?? "fallback") + "</td><td>" + (false || "fallback") + "</td></tr>";
        compTable += "<tr><td>null</td><td>" + (null ?? "fallback") + "</td><td>" + (null || "fallback") + "</td></tr>";
        compTable += "</table>";
        document.getElementById("compare").innerHTML = compTable;

        // Practical examples
        let config = { count: 0, name: "" };
        let total = config.count ?? "N/A";
        let username = config.name ?? "Anonymous";
        
        document.getElementById("practical").innerHTML = 
            "config.count = 0<br>" +
            "config.count ?? 'N/A' = " + total + "<br>" +
            "config.name = ''<br>" +
            "config.name ?? 'Anonymous' = " + username;

        // Chains
        let user = null;
        let result = user?.name ?? "Guest";
        
        document.getElementById("chains").innerHTML = 
            "Chaining: user?.name ?? 'Guest' = " + result + "<br><br>" +
            "Multiple: a ?? b ?? c ?? 'default'<br>" +
            "(Returns first non-nullish value)";
    </script>
</body>
</html>
