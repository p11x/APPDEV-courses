<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semicolons Rules</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript Semicolons Rules</h1>
    
    <h2>1. Automatic Semicolon Insertion (ASI)</h2>
    <p>JavaScript automatically inserts semicolons:</p>
    <div class="output" id="asi"></div>
    
    <h2>2. When ASI Works</h2>
    <div class="output" id="asiWorks"></div>
    
    <h2>3. ASI Pitfalls</h2>
    <div class="output" id="asiPitfalls"></div>
    
    <h2>4. Best Practices</h2>
    <div class="output" id="bestPractices"></div>

    <script>
        // ===== AUTOMATIC SEMICOLON INSERTION =====
        // JavaScript automatically inserts semicolons where needed
        let a = 5
        let b = 10
        // The above is treated as: let a = 5; let b = 10;
        
        let asiOutput = "<ul>";
       asiOutput += "<li>ASI = Automatic Semicolon Insertion</li>";
        asiOutput += "<li>JS parser automatically adds ; where needed</li>";
        asiOutput += "<li>This makes semicolons technically optional (sometimes)</li>";
        asiOutput += "<li>But relying on ASI can cause bugs!</li>";
        asiOutput += "</ul>";
        document.getElementById("asi").innerHTML = asiOutput;

        // ===== WHEN ASI WORKS =====
        // Works when statement is followed by:
        // - Newline
        // - Closing brace }
        
        // Works fine:
        let x = 5;
        let y = 10;
        
        function test() {
            return
            {
                result: "success"
            };
        }
        // test() returns undefined! ( ASI inserts ; after return )
        
        let worksOutput = "<ul>";
        worksOutput += "<li>Semicolons are inserted at newlines</li>";
        worksOutput += "<li>Example: return with object on new line</li>";
        worksOutput += "<li><code>return\\n{result:'success'}</code> becomes <code>return;\\n{result:'success'}</code></li>";
        worksOutput += "<li>This returns <code>undefined</code> instead of the object!</li>";
        worksOutput += "</ul>";
        document.getElementById("asiWorks").innerHTML = worksOutput;

        // ===== ASI PITFALLS =====
        // Pitfall 1: Return statement
        function getObject() {
            return {
                name: "John",
                age: 30
            };
        }
        // This works correctly because { is not on new line
        
        // Pitfall 2: IIFE without semicolon
        (function() {
            var iife = "IIFE ran";
            // window.result = iife;
        })();
        
        // Pitfall 3: Array concatenation
        let arr = [1, 2]
        [3, 4].forEach(n => console.log(n));
        // This is valid - the array [3,4] is called on arr's value
        
        let pitfallsOutput = "<h3>Common Pitfall: return statement</h3>";
        pitfallsOutput += "<pre>function getObject() {\n";
        pitfallsOutput += "    return   // ASI inserts ; here!\n";
        pitfallsOutput += "    {\n";
        pitfallsOutput += "        name: 'John'\n";
        pitfallsOutput += "    };\n";
        pitfallsOutput += "}\n";
        pitfallsOutput += "// Returns undefined instead of object</pre>";
        
        pitfallsOutput += "<h3>Safe: keep { on same line</h3>";
        pitfallsOutput += "<pre>function getObject() {\n";
        pitfallsOutput += "    return {\n";
        pitfallsOutput += "        name: 'John'\n";
        pitfallsOutput += "    };\n";
        pitfallsOutput += "}</pre>";
        
        document.getElementById("asiPitfalls").innerHTML = pitfallsOutput;

        // ===== BEST PRACTICES =====
        // 1. Always use semicolons (recommended)
        let name = "John";      // Good
        let age = 30;          // Good
        
        // 2. UseASI-safe patterns
        // - Keep opening braces on same line
        // - Use semicolons after IIFE
        
        // 3. Lint your code (ESLint can catch issues)
        
        let bestOutput = "<ul>";
        bestOutput += "<li><strong>Always use semicolons</strong> - explicit is better</li>";
        bestOutput += "<li><strong>Put { on same line</strong> as if/for/function</li>";
        bestOutput += "<li><strong>Use linter</strong> like ESLint to catch issues</li>";
        bestOutput += "<li><strong>Be consistent</strong> - choose a style and stick to it</li>";
        bestOutput += "<li><strong>Top-level</strong> - use semicolons to prevent concatenation bugs</li>";
        bestOutput += "</ul>";
        
        // Example of problematic concatenation without semicolon
        let greeting = "Hello"
        ["World"].forEach(w => {});
        // This would try to access property of greeting (treated as greeting["World"])
        
        bestOutput += "<h3>Why use semicolons:</h3>";
        bestOutput += "<pre>let a = 'test'\n";
        bestOutput += "['value'].forEach(...)  // Treated as a['value']!</pre>";
        
        document.getElementById("bestPractices").innerHTML = bestOutput;
    </script>
</body>
</html>
