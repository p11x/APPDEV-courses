<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comma Operator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript Comma Operator</h1>
    
    <h2>1. Comma in Expressions</h2>
    <p>Evaluates left to right, returns last value:</p>
    <div class="output" id="commaExpr"></div>
    
    <h2>2. Comma in for Loops</h2>
    <div class="output" id="forLoop"></div>
    
    <h2>3. Comma with IIFE</h2>
    <div class="output" id="iife"></div>
    
    <h2>4. Practical Uses</h2>
    <div class="output" id="practical"></div>

    <script>
        // Comma in expressions
        let a = 10;
        let result = (a = a + 5, a * 2);
        
        document.getElementById("commaExpr").innerHTML = 
            "let a = 10<br>" +
            "(a = a + 5, a * 2) = " + result + "<br>" +
            "(First a becomes 15, then 15 * 2 = 30)<br><br>" +
            "let x = (1, 2, 3) => " + (1, 2, 3) + "<br>" +
            "(Returns last value: 3)";

        // Comma in for loops
        let output = "<table border='1' cellpadding='5'>";
        output += "<tr><th>i</th><th>j</th></tr>";
        for (let i = 0, j = 0; i < 3; i++, j += 2) {
            output += "<tr><td>" + i + "</td><td>" + j + "</td></tr>";
        }
        output += "</table>";
        document.getElementById("forLoop").innerHTML = 
            "for (let i = 0, j = 0; i < 3; i++, j += 2)<br>" + output;

        // Comma with IIFE
        let value = (function() { 
            let temp = 10; 
            return temp; 
        })();
        
        let iifeResult = ((x = 5), (y = x + 10), y);
        
        document.getElementById("iife").innerHTML = 
            "IIFE: (function() { return 10; })() = " + value + "<br><br>" +
            "Comma chain: ((x=5), (y=x+10), y) = " + iifeResult;

        // Practical uses
        document.getElementById("practical").innerHTML = 
            "<strong>Common use cases:</strong><br><br>" +
            "1. Multiple increments in loop:<br>" +
            "   for(let i=0, j=10; i<j; i++, j--)<br><br>" +
            "2. Short variable assignment:<br>" +
            "   let a = (b=5, c=10) => c is 10<br><br>" +
            "3. Swapping variables:<br>" +
            "   a = [b, b=a][0] (uses comma in array)";
    </script>
</body>
</html>
