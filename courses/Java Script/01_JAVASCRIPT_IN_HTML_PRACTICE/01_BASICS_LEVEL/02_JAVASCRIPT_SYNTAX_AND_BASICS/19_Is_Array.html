<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is Array</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Checking if Value is Array</h1>
    
    <h2>1. Array.isArray() Method</h2>
    <p>The recommended way to check for arrays:</p>
    <div class="output" id="isArrayMethod"></div>
    
    <h2>2. instanceof vs Array.isArray()</h2>
    <div class="output" id="instanceofCompare"></div>
    
    <h2>3. Edge Cases</h2>
    <div class="output" id="edgeCases"></div>
    
    <h2>4. Practical Examples</h2>
    <div class="output" id="practical"></div>

    <script>
        // Array.isArray() method
        let arr1 = [1, 2, 3];
        let arr2 = new Array(3);
        let notArr = "hello";
        let obj = { length: 3 };
        
        let methodTable = "<table border='1' cellpadding='5'>";
        methodTable += "<tr><th>Value</th><th>Array.isArray()</th></tr>";
        methodTable += "<tr><td>[1, 2, 3]</td><td>" + Array.isArray(arr1) + "</td></tr>";
        methodTable += "<tr><td>new Array(3)</td><td>" + Array.isArray(arr2) + "</td></tr>";
        methodTable += "<tr><td>'hello'</td><td>" + Array.isArray(notArr) + "</td></tr>";
        methodTable += "<tr><td>{length: 3}</td><td>" + Array.isArray(obj) + "</td></tr>";
        methodTable += "<tr><td>null</td><td>" + Array.isArray(null) + "</td></tr>";
        methodTable += "<tr><td>undefined</td><td>" + Array.isArray(undefined) + "</td></tr>";
        methodTable += "</table>";
        document.getElementById("isArrayMethod").innerHTML = methodTable;

        // instanceof vs Array.isArray()
        let instTable = "<table border='1' cellpadding='5'>";
        instTable += "<tr><th>Value</th><th>instanceof Array</th><th>Array.isArray()</th></tr>";
        instTable += "<tr><td>[1,2,3]</td><td>" + ([1,2,3] instanceof Array) + "</td><td>" + Array.isArray([1,2,3]) + "</td></tr>";
        instTable += "<tr><td>null</td><td>" + (null instanceof Array) + "</td><td>" + Array.isArray(null) + "</td></tr>";
        instTable += "<tr><td>{}</td><td>" + ({} instanceof Array) + "</td><td>" + Array.isArray({}) + "</td></tr>";
        instTable += "</table>";
        document.getElementById("instanceofCompare").innerHTML = instTable;

        // Edge cases
        document.getElementById("edgeCases").innerHTML = 
            "Array.isArray([]): " + Array.isArray([]) + "<br>" +
            "Array.isArray(Array.prototype): " + Array.isArray(Array.prototype) + "<br>" +
            "Array.isArray({0: 'a', length: 1}): " + Array.isArray({0: "a", length: 1});

        // Practical examples
        function processArray(arr) {
            if (Array.isArray(arr)) {
                return "Array with " + arr.length + " elements";
            }
            return "Not an array, converted to: [" + arr + "]";
        }
        
        document.getElementById("practical").innerHTML = 
            "processArray([1,2]): " + processArray([1,2]) + "<br>" +
            "processArray('test'): " + processArray("test") + "<br>" +
            "processArray(123): " + processArray(123);
    </script>
</body>
</html>
