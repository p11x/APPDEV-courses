<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destructuring Array</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Array Destructuring</h1>
    
    <h2>1. Basic Array Destructuring</h2>
    <div class="output" id="basic"></div>
    
    <h2>2. Skip Elements</h2>
    <div class="output" id="skip"></div>
    
    <h2>3. Rest Pattern</h2>
    <div class="output" id="rest"></div>
    
    <h2>4. Default Values</h2>
    <div class="output" id="defaults"></div>

    <script>
        // Basic array destructuring
        let colors = ["red", "green", "blue"];
        let [first, second, third] = colors;
        
        document.getElementById("basic").innerHTML = 
            "let colors = ['red', 'green', 'blue']<br>" +
            "let [first, second, third] = colors<br>" +
            "first: " + first + "<br>" +
            "second: " + second + "<br>" +
            "third: " + third;

        // Skip elements
        let nums = [1, 2, 3, 4, 5];
        let [a, , , b, c] = nums;
        
        document.getElementById("skip").innerHTML = 
            "let nums = [1, 2, 3, 4, 5]<br>" +
            "let [a, , , b, c] = nums<br>" +
            "a: " + a + ", b: " + b + ", c: " + c + "<br>" +
            "(Commas skip elements at positions 1 and 2)";

        // Rest pattern
        let arr = [1, 2, 3, 4, 5];
        let [head, ...tail] = arr;
        
        document.getElementById("rest").innerHTML = 
            "let arr = [1, 2, 3, 4, 5]<br>" +
            "let [head, ...tail] = arr<br>" +
            "head: " + head + "<br>" +
            "tail: " + JSON.stringify(tail);

        // Default values
        let colors2 = ["red"];
        let [c1 = "blue", c2 = "green", c3 = "yellow"] = colors2;
        
        document.getElementById("defaults").innerHTML = 
            "let colors2 = ['red']<br>" +
            "let [c1='blue', c2='green', c3='yellow'] = colors2<br>" +
            "c1: " + c1 + "<br>" +
            "c2: " + c2 + "<br>" +
            "c3: " + c3;
    </script>
</body>
</html>
