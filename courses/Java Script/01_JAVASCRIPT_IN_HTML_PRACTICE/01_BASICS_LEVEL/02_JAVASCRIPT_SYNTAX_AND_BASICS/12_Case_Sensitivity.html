<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Sensitivity</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript Case Sensitivity</h1>
    
    <h2>1. Variables are Case-Sensitive</h2>
    <p>myVar, myvar, and MYVAR are different:</p>
    <div class="output" id="variables"></div>
    
    <h2>2. Keywords are Case-Sensitive</h2>
    <div class="output" id="keywords"></div>
    
    <h2>3. Functions are Case-Sensitive</h2>
    <div class="output" id="functions"></div>
    
    <h2>4. HTML vs JavaScript</h2>
    <div class="output" id="html"></div>

    <script>
        // ===== VARIABLES ARE CASE-SENSITIVE =====
        let myVar = "first";
        let myvar = "second";
        let MYVAR = "third";
        // All three are different variables!
        
        // CamelCase is standard for variables
        let firstName = "John";
        let FirstName = "Jane";  // Different variable!
        let firstname = "Bob";    // Also different
        
        let varOutput = "<table border='1' cellpadding='5'>";
        varOutput += "<tr><th>Variable</th><th>Value</th></tr>";
        varOutput += "<tr><td>myVar</td><td>" + myVar + "</td></tr>";
        varOutput += "<tr><td>myvar</td><td>" + myvar + "</td></tr>";
        varOutput += "<tr><td>MYVAR</td><td>" + MYVAR + "</td></tr>";
        varOutput += "</table>";
        
        varOutput += "<h3>All are different:</h3>";
        varOutput += "<ul>";
        varOutput += "<li><code>firstName</code> = " + firstName + "</li>";
        varOutput += "<li><code>FirstName</code> = " + FirstName + "</li>";
        varOutput += "<li><code>firstname</code> = " + firstname + "</li>";
        varOutput += "</ul>";
        document.getElementById("variables").innerHTML = varOutput;

        // ===== KEYWORDS ARE CASE-SENSITIVE =====
        // JavaScript keywords MUST be lowercase
        let isTrue = true;
        let isFalse = false;
        
        // These would be errors:
        // LET x = 5;      // ERROR - must be 'let'
        // IF (x > 0) { }  // ERROR - must be 'if'
        // FUNCTION() { } // ERROR - must be 'function'
        
        // Common JS keywords (all lowercase):
        // var, let, const, function, if, else, for, while, return
        // true, false, null, undefined, new, this, class, extends
        
        let keywordOutput = "<table border='1' cellpadding='5'>";
        keywordOutput += "<tr><th>Correct</th><th>Wrong (will error)</th></tr>";
        keywordOutput += "<tr><td><code>let x = 5;</code></td><td><code>LET x = 5;</code></td></tr>";
        keywordOutput += "<tr><td><code>if (x > 0)</code></td><td><code>IF (x > 0)</code></td></tr>";
        keywordOutput += "<tr><td><code>true</code></td><td><code>True</code></td></tr>";
        keywordOutput += "<tr><td><code>null</code></td><td><code>Null</code></td></tr>";
        keywordOutput += "<tr><td><code>return</code></td><td><code>Return</code></td></tr>";
        keywordOutput += "</table>";
        document.getElementById("keywords").innerHTML = keywordOutput;

        // ===== FUNCTIONS ARE CASE-SENSITIVE =====
        // Built-in functions must use correct case
        let str = "Hello";
        let lower = str.toLowerCase();   // "hello"
        let upper = str.toUpperCase();  // "HELLO"
        // str.ToLowerCase(); // ERROR - function name is case-sensitive
        
        // User-defined functions too
        function myFunction() { return "A"; }
        function MyFunction() { return "B"; }
        // These are two different functions!
        
        let funcOutput = "<table border='1' cellpadding='5'>";
        funcOutput += "<tr><th>Call</th><th>Result</th></tr>";
        funcOutput += "<tr><td>str.toLowerCase()</td><td>" + lower + "</td></tr>";
        funcOutput += "<tr><td>str.toUpperCase()</td><td>" + upper + "</td></tr>";
        funcOutput += "<tr><td>myFunction()</td><td>" + myFunction() + "</td></tr>";
        funcOutput += "<tr><td>MyFunction()</td><td>" + MyFunction() + "</td></tr>";
        funcOutput += "</table>";
        
        funcOutput += "<p>Note: 'toLowerCase' not 'ToLowerCase' or 'tolowercase'</p>";
        document.getElementById("functions").innerHTML = funcOutput;

        // ===== HTML VS JAVASCRIPT =====
        // HTML attributes are NOT case-sensitive
        // <div ID="test"> same as <div id="test">
        
        // JavaScript IS case-sensitive
        // document.getElementById("test")
        // document.getElementByID("test") // ERROR!
        
        // In HTML: onClick, ONCLICK, OnClick all work
        // In JS: element.onclick only works
        
        let htmlOutput = "<h3>HTML (not case-sensitive):</h3>";
        htmlOutput += "<pre>&lt;div id='myId'&gt;  ==  &lt;div ID='myId'&gt;</pre>";
        
        htmlOutput += "<h3>JavaScript (case-sensitive):</h3>";
        htmlOutput += "<pre>document.getElementById('myId')  // Correct\n";
        htmlOutput += "document.getElementByID('myId')  // ERROR!</pre>";
        
        htmlOutput += "<h3>Common mistake:</h3>";
        htmlOutput += "<ul>";
        htmlOutput += "<li>HTML: <code>&lt;input onClick='...'&gt;</code> works</li>";
        htmlOutput += "<li>JS: <code>element.onclick = ...</code> only works lowercase</li>";
        htmlOutput += "<li>Use lowercase in JavaScript: <code>onclick</code>, <code>onchange</code></li>";
        htmlOutput += "</ul>";
        document.getElementById("html").innerHTML = htmlOutput;
    </script>
</body>
</html>
