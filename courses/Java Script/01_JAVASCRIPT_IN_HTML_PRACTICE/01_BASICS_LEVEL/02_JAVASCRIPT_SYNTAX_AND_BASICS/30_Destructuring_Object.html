<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destructuring Object</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Object Destructuring</h1>
    
    <h2>1. Basic Object Destructuring</h2>
    <div class="output" id="basic"></div>
    
    <h2>2. Different Variable Names</h2>
    <div class="output" id="rename"></div>
    
    <h2>3. Default Values</h2>
    <div class="output" id="defaults"></div>
    
    <h2>4. Nested Destructuring</h2>
    <div class="output" id="nested"></div>

    <script>
        // Basic object destructuring
        let person = { name: "John", age: 30, city: "NYC" };
        let { name, age, city } = person;
        
        document.getElementById("basic").innerHTML = 
            "let person = {name:'John', age:30, city:'NYC'}<br>" +
            "let {name, age, city} = person<br>" +
            "name: " + name + "<br>" +
            "age: " + age + "<br>" +
            "city: " + city;

        // Renaming variables
        let user = { firstName: "Jane", lastName: "Doe" };
        let { firstName: fname, lastName: lname } = user;
        
        document.getElementById("rename").innerHTML = 
            "let user = {firstName:'Jane', lastName:'Doe'}<br>" +
            "let {firstName: fname, lastName: lname} = user<br>" +
            "fname: " + fname + "<br>" +
            "lname: " + lname;

        // Default values
        let product = { name: "Laptop" };
        let { name: productName = "Unknown", price = 0, inStock = true } = product;
        
        document.getElementById("defaults").innerHTML = 
            "let product = {name:'Laptop'}<br>" +
            "let {name, price=0, inStock=true}<br>" +
            "name: " + productName + "<br>" +
            "price: " + price + "<br>" +
            "inStock: " + inStock;

        // Nested destructuring
        let data = { 
            user: { 
                profile: { 
                    email: "test@test.com" 
                } 
            } 
        };
        let { user: { profile: { email } } } = data;
        
        document.getElementById("nested").innerHTML = 
            "Data structure: { user: { profile: { email } } }<br>" +
            "let { user: { profile: { email } } } = data<br>" +
            "email: " + email;
    </script>
</body>
</html>
