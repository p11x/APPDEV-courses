<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaN Values</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript NaN Values</h1>
    
    <h2>1. Creating NaN</h2>
    <p>NaN (Not a Number) - result of invalid numeric operations:</p>
    <div class="output" id="nanCreation"></div>
    
    <h2>2. NaN with Operations</h2>
    <div class="output" id="nanOperations"></div>
    
    <h2>3. Checking for NaN</h2>
    <div class="output" id="nanCheck"></div>
    
    <h2>4. Number.isNaN() vs isNaN()</h2>
    <div class="output" id="nanMethods"></div>

    <script>
        // Creating NaN
        let invalidNum = Math.sqrt(-1);
        let invalidCalc = "hello" - 5;
        document.getElementById("nanCreation").innerHTML = 
            "Math.sqrt(-1) = " + invalidNum + "<br>" +
            '"hello" - 5 = ' + invalidCalc;

        // NaN operations
        let opTable = "<table border='1' cellpadding='5'>";
        opTable += "<tr><th>Operation</th><th>Result</th></tr>";
        opTable += "<tr><td>NaN + 5</td><td>" + (NaN + 5) + "</td></tr>";
        opTable += "<tr><td>NaN * 10</td><td>" + (NaN * 10) + "</td></tr>";
        opTable += "<tr><td>NaN - 1</td><td>" + (NaN - 1) + "</td></tr>";
        opTable += "<tr><td>NaN == NaN</td><td>" + (NaN == NaN) + "</td></tr>";
        opTable += "</table>";
        document.getElementById("nanOperations").innerHTML = opTable;

        // Checking for NaN - NaN !== NaN!
        let num = 10 - "hello";
        document.getElementById("nanCheck").innerHTML = 
            "let num = 10 - 'hello'<br>" +
            "num == NaN: " + (num == NaN) + "<br>" +
            "num === NaN: " + (num === NaN) + "<br>" +
            "(NaN !== NaN is true - can't use == or ===)";

        // Number.isNaN() vs isNaN()
        let methodTable = "<table border='1' cellpadding='5'>";
        methodTable += "<tr><th>Value</th><th>isNaN()</th><th>Number.isNaN()</th></tr>";
        methodTable += "<tr><td>NaN</td><td>" + isNaN(NaN) + "</td><td>" + Number.isNaN(NaN) + "</td></tr>";
        methodTable += "<tr><td>'hello'</td><td>" + isNaN("hello") + "</td><td>" + Number.isNaN("hello") + "</td></tr>";
        methodTable += "<tr><td>undefined</td><td>" + isNaN(undefined) + "</td><td>" + Number.isNaN(undefined) + "</td></tr>";
        methodTable += "<tr><td>123</td><td>" + isNaN(123) + "</td><td>" + Number.isNaN(123) + "</td></tr>";
        methodTable += "<tr><td>0/0</td><td>" + isNaN(0/0) + "</td><td>" + Number.isNaN(0/0) + "</td></tr>";
        methodTable += "</table>";
        document.getElementById("nanMethods").innerHTML = methodTable;
    </script>
</body>
</html>
