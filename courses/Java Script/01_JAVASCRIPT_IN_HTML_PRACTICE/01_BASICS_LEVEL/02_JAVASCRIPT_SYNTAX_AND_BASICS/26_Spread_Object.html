<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spread Object</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Spread Operator with Objects</h1>
    
    <h2>1. Object Spread (...)</h2>
    <p>Creates shallow copy of object:</p>
    <div class="output" id="basicSpread"></div>
    
    <h2>2. Merging Objects</h2>
    <div class="output" id="merge"></div>
    
    <h2>3. Overriding Properties</h2>
    <div class="output" id="override"></div>
    
    <h2>4. Adding/Removing Properties</h2>
    <div class="output" id="addRemove"></div>

    <script>
        // Basic spread
        let original = { name: "John", age: 30 };
        let copy = { ...original };
        
        document.getElementById("basicSpread").innerHTML = 
            "original: " + JSON.stringify(original) + "<br>" +
            "copy: " + JSON.stringify(copy) + "<br>" +
            "copy === original: " + (copy === original) + "<br>" +
            "(different reference - shallow copy)";

        // Merging objects
        let obj1 = { name: "John" };
        let obj2 = { age: 30 };
        let merged = { ...obj1, ...obj2 };
        
        document.getElementById("merge").innerHTML = 
            "obj1: " + JSON.stringify(obj1) + "<br>" +
            "obj2: " + JSON.stringify(obj2) + "<br>" +
            "merged: " + JSON.stringify(merged) + "<br>" +
            "(...obj1, ...obj2 combines both objects)";

        // Overriding properties
        let defaults = { theme: "dark", font: "Arial" };
        let userPrefs = { font: "Roboto" };
        let combined = { ...defaults, ...userPrefs };
        
        document.getElementById("override").innerHTML = 
            "defaults: " + JSON.stringify(defaults) + "<br>" +
            "userPrefs: " + JSON.stringify(userPrefs) + "<br>" +
            "combined: " + JSON.stringify(combined) + "<br>" +
            "(userPrefs overrides defaults.font)";

        // Adding/removing properties
        let user = { name: "John", age: 30 };
        let added = { ...user, city: "NYC" };
        
        document.getElementById("addRemove").innerHTML = 
            "Original: " + JSON.stringify(user) + "<br>" +
            "...user, city='NYC': " + JSON.stringify(added) + "<br><br>" +
            "Use delete after spread: spread adds, delete removes";
    </script>
</body>
</html>
