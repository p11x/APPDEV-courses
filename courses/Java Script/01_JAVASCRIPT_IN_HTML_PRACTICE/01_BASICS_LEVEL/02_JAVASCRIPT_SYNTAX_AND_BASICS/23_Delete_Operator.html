<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>delete Operator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript delete Operator</h1>
    
    <h2>1. Deleting Object Properties</h2>
    <div class="output" id="deleteProp"></div>
    
    <h2>2. Deleting Array Elements</h2>
    <div class="output" id="deleteArray"></div>
    
    <h2>3. When delete Works</h2>
    <div class="output" id="whenWorks"></div>
    
    <h2>4. When delete Doesn't Work</h2>
    <div class="output" id="whenNotWork"></div>

    <script>
        // Delete object properties
        let person = { name: "John", age: 30, city: "NYC" };
        let beforeDelete = JSON.stringify(person);
        delete person.age;
        let afterDelete = JSON.stringify(person);
        
        document.getElementById("deleteProp").innerHTML = 
            "Before: " + beforeDelete + "<br>" +
            "After delete person.age: " + afterDelete + "<br>" +
            "delete returns: " + (delete person.age);

        // Delete array elements - creates sparse array
        let arr = [1, 2, 3, 4, 5];
        let arrBefore = JSON.stringify(arr);
        delete arr[2];
        let arrAfter = JSON.stringify(arr);
        
        let arrTable = "<table border='1' cellpadding='5'>";
        arrTable += "<tr><th>Before</th><th>After</th></tr>";
        arrTable += "<tr><td>" + arrBefore + "</td><td>" + arrAfter + "</td></tr>";
        arrTable += "<tr><td>Length: 5</td><td>Length: " + arr.length + " (still 5)</td></tr>";
        arrTable += "</table>";
        document.getElementById("deleteArray").innerHTML = arrTable;

        // When delete works
        let obj1 = { a: 1, b: 2 };
        let works = delete obj1.a;
        
        let workTable = "<table border='1' cellpadding='5'>";
        workTable += "<tr><th>Operation</th><th>Result</th></tr>";
        workTable += "<tr><td>delete obj1.a</td><td>" + works + "</td></tr>";
        workTable += "<tr><td>delete {x:1}.x (literal)</td><td>" + delete ({x:1}).x + "</td></tr>";
        workTable += "<tr><td>delete window.myVar (if configurable)</td><td>Try in console</td></tr>";
        workTable += "</table>";
        document.getElementById("whenWorks").innerHTML = workTable;

        // When delete doesn't work
        let x = 10;
        let arr2 = [1, 2, 3];
        
        let notWorkTable = "<table border='1' cellpadding='5'>";
        notWorkTable += "<tr><th>Operation</th><th>Result</th></tr>";
        notWorkTable += "<tr><td>delete x (variable)</td><td>" + (delete x) + "</td></tr>";
        notWorkTable += "<tr><td>delete arr2[0] (array element)</td><td>" + delete arr2[0] + " (sparse, not remove)</td></tr>";
        notWorkTable += "<tr><td>delete Array.prototype</td><td>" + delete Array.prototype + "</td></tr>";
        notWorkTable += "<tr><td>delete 123 (literal)</td><td>" + delete 123 + "</td></tr>";
        notWorkTable += "<tr><td>delete obj.nonExistent</td><td>" + delete {}.nonExistent + " (always true)</td></tr>";
        notWorkTable += "</table>";
        document.getElementById("whenNotWork").innerHTML = notWorkTable;
    </script>
</body>
</html>
