<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whitespace Importance</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript Whitespace Importance</h1>
    
    <h2>1. Where Whitespace Matters</h2>
    <p>Whitespace is required in certain places:</p>
    <div class="output" id="requiredWhitespace"></div>
    
    <h2>2. Where Whitespace is Optional</h2>
    <p>Can be added for readability:</p>
    <div class="output" id="optionalWhitespace"></div>
    
    <h2>3. Template Literals and Whitespace</h2>
    <div class="output" id="templateLiterals"></div>
    
    <h2>4. Regular Expressions and Whitespace</h2>
    <div class="output" id="regex"></div>

    <script>
        // ===== WHITESPACE WHERE REQUIRED =====
        // Between keywords and identifiers
        if (x > 0) { }      // Need space after if
        for (let i = 0; ) { }  // Need space after for
        function myFunc() { }  // Need space after function
        
        // Between operators and operands (usually)
        let a = 1 + 2;      // Space optional but recommended
        let b = 1+2;        // Works but less readable
        
        // Between function name and ()
        myFunc();           // No space allowed here
        // myFunc ();        // ERROR - space not allowed
        
        let reqOutput = "<table border='1' cellpadding='5'>";
        reqOutput += "<tr><th>Pattern</th><th>Valid</th><th>Example</th></tr>";
        reqOutput += "<tr><td>keyword + identifier</td><td>Yes</td><td><code>if (x)</code></td></tr>";
        reqOutput += "<tr><td>identifier + (</td><td>No</td><td><code>myFunc()</code> - no space</td></tr>";
        reqOutput += "<tr><td>operator + operand</td><td>Usually</td><td><code>a + b</code></td></tr>";
        reqOutput += "<tr><td>between array elements</td><td>No</td><td><code>[1,2,3]</code></td></tr>";
        reqOutput += "</table>";
        document.getElementById("requiredWhitespace").innerHTML = reqOutput;

        // ===== WHITESPACE WHERE OPTIONAL =====
        // Around operators
        let sum = 1 + 2 + 3;           // Clear
        let sum2=1+2+3;                 // Works but hard to read
        
        // After commas in arrays/objects
        let arr = [1, 2, 3];            // Common
        let arr2 = [1,2,3];             // Also valid
        
        let obj = { a: 1, b: 2 };       // Common
        let obj2 = {a:1,b:2};           // Works but hard to read
        
        // Around braces
        function demo() { return 1; }   // Common
        function demo2(){return 1;}    // Works but not recommended
        
        let optOutput = "<h3>Recommended (readable):</h3>";
        optOutput += "<pre>let sum = 1 + 2 + 3;\n";
        optOutput += "let arr = [1, 2, 3];\n";
        optOutput += "let obj = { a: 1, b: 2 };\n";
        optOutput += "function demo() { return 1; }</pre>";
        
        optOutput += "<h3>Valid but not recommended:</h3>";
        optOutput += "<pre>let sum2=1+2+3;\n";
        optOutput += "let arr2=[1,2,3];\n";
        optOutput += "let obj2={a:1,b:2};</pre>";
        
        document.getElementById("optionalWhitespace").innerHTML = optOutput;

        // ===== TEMPLATE LITERALS =====
        // Whitespace in template literals is preserved!
        let message = `Hello
        World`;      // Preserves the newlines and spaces
        
        let name = "John";
        let greeting = `Hello, ${name}!`;  // No extra spaces needed
        
        let multiline = `This text
        spans multiple
        lines exactly as written`;
        
        // Use trim() to remove leading/trailing whitespace
        let trimmed = `   
        Hello   
        `.trim();    // "Hello"
        
        let templateOutput = "<h3>Template literal preserves whitespace:</h3>";
        templateOutput += "<pre>let msg = \\`Hello\n";
        templateOutput += "        World\\`;\n";
        templateOutput += "// Result: 'Hello\\n        World'</pre>";
        
        templateOutput += "<p>message includes newlines and spaces as written</p>";
        document.getElementById("templateLiterals").innerHTML = templateOutput;

        // ===== REGEX AND WHITESPACE =====
        // In regex, whitespace matters!
        let regex1 = /a b/;      // Matches "a b" (with space)
        let regex2 = /a\sb/;      // Matches "a b" (whitespace char)
        
        // Use \s for whitespace in regex
        let text = "a b";
        let result1 = text.match(regex1);    // ["a b"]
        
        // Regex can ignore whitespace with 'x' flag or (?:...)
        let regex3 = /a    b/;               // Looks for literal spaces
        let regex4 = /a\s+b/;               // One or more whitespace
        
        let regexOutput = "<table border='1' cellpadding='5'>";
        regexOutput += "<tr><th>Regex</th><th>Matches</th></tr>";
        regexOutput += "<tr><td>/a b/</td><td>'a b' (literal space)</td></tr>";
        regexOutput += "<tr><td>/a\\sb/</td><td>'a b' (whitespace char)</td></tr>";
        regexOutput += "<tr><td>/a\\s+b/</td><td>'a b', 'a  b' (1+ whitespace)</td></tr>";
        regexOutput += "</table>";
        
        regexOutput += "<p>In character classes: <code>/[a-z]/</code> vs <code>/[a-z ]/</code></p>";
        document.getElementById("regex").innerHTML = regexOutput;
    </script>
</body>
</html>
