<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Negative Zero</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .output { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 10px; }
        code { background: #e0e0e0; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>JavaScript Negative Zero (-0)</h1>
    
    <h2>1. Creating Negative Zero</h2>
    <div class="output" id="negZeroCreation"></div>
    
    <h2>2. Negative Zero Comparisons</h2>
    <div class="output" id="negZeroCompare"></div>
    
    <h2>3. Math Operations</h2>
    <div class="output" id="mathOps"></div>
    
    <h2>4. Object.is() Difference</h2>
    <div class="output" id="objectIs"></div>

    <script>
        // Creating negative zero
        let negZero = -0;
        let resultCalc = -5 * 0;
        
        document.getElementById("negZeroCreation").innerHTML = 
            "let negZero = -0 => " + negZero + "<br>" +
            "-5 * 0 = " + resultCalc + "<br>" +
            "(typeof negZero): " + typeof negZero;

        // Negative zero comparisons
        let compTable = "<table border='1' cellpadding='5'>";
        compTable += "<tr><th>Comparison</th><th>Result</th></tr>";
        compTable += "<tr><td>-0 === 0</td><td>" + (-0 === 0) + "</td></tr>";
        compTable += "<tr><td>-0 == 0</td><td>" + (-0 == 0) + "</td></tr>";
        compTable += "<tr><td>-0 < 0</td><td>" + (-0 < 0) + "</td></tr>";
        compTable += "<tr><td>0 < -0</td><td>" + (0 < -0) + "</td></tr>";
        compTable += "<tr><td>-0.toString()</td><td>'" + (-0).toString() + "'</td></tr>";
        compTable += "</table>";
        document.getElementById("negZeroCompare").innerHTML = compTable;

        // Math operations with -0
        let mathTable = "<table border='1' cellpadding='5'>";
        mathTable += "<tr><th>Operation</th><th>Result</th></tr>";
        mathTable += "<tr><td>Math.sign(-0)</td><td>" + Math.sign(-0) + "</td></tr>";
        mathTable += "<tr><td>Math.sign(0)</td><td>" + Math.sign(0) + "</td></tr>";
        mathTable += "<tr><td>1 / -0</td><td>" + (1 / -0) + "</td></tr>";
        mathTable += "<tr><td>-1 / -0</td><td>" + (-1 / -0) + "</td></tr>";
        mathTable += "<tr><td>Math.pow(-0, 2)</td><td>" + Math.pow(-0, 2) + "</td></tr>";
        mathTable += "</table>";
        document.getElementById("mathOps").innerHTML = mathTable;

        // Object.is() treats -0 and 0 as different
        document.getElementById("objectIs").innerHTML = 
            "Object.is(-0, 0): " + Object.is(-0, 0) + "<br>" +
            "Object.is(NaN, NaN): " + Object.is(NaN, NaN) + "<br>" +
            "Object.is(0, 0): " + Object.is(0, 0);
    </script>
</body>
</html>
