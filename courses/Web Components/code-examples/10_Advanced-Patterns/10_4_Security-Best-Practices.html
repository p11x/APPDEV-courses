<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Best Practices</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.5;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: #222; }
    .demo-grid {
      display: grid;
      gap: 1.5rem;
      max-width: 1200px;
    }
    @media (min-width: 768px) {
      body { padding: 2rem; }
      h1 { font-size: 2rem; }
      .demo-grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
    }
    .info-box {
      background: #e3f2fd;
      border: 1px solid #90caf9;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>Security Best Practices</h1>
  
  <div class="info-box">
    These components demonstrate XSS prevention, input validation, CSP compliance, and secure data handling patterns.
  </div>
  
  <div class="demo-grid">
    <secure-input label="Username" placeholder="Enter username" validate="alphanumeric"></secure-input>
    <secure-input label="Email" type="email" placeholder="user@example.com" validate="email"></secure-input>
    <secure-input label="Website URL" type="url" placeholder="https://example.com" validate="url"></secure-input>
    <secure-form></secure-form>
  </div>
  
  <script type="module" src="./10_4_Security-Best-Practices.js"></script>
</body>
</html>
