<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Framework-Neutral Patterns</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.5;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: #222; }
    .demo-grid {
      display: grid;
      gap: 1.5rem;
      max-width: 1200px;
    }
    @media (min-width: 768px) {
      body { padding: 2rem; }
      h1 { font-size: 2rem; }
      .demo-grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
    }
  </style>
</head>
<body>
  <h1>Framework-Neutral Patterns</h1>
  
  <div class="demo-grid">
    <universal-card title="Default Card" description="This works with React, Vue, Angular, or vanilla JS."></universal-card>
    <universal-card title="Outlined Card" variant="outlined" description="Styling variants for different use cases."></universal-card>
    <universal-card title="Card with Image" image="https://picsum.photos/300/150" description="Supports image slots and lazy loading."></universal-card>
    <universal-card title="Disabled Card" disabled description="Disabled state with proper ARIA support."></universal-card>
  </div>
  
  <script type="module" src="./08_1_Framework-Neutral-Patterns.js"></script>
</body>
</html>
