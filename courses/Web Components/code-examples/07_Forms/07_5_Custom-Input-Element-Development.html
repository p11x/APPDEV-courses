<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Input Element Development</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 1rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.5;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #222;
    }
    .inputs-demo {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    @media (min-width: 768px) {
      body {
        padding: 2rem;
      }
      h1 {
        font-size: 2rem;
      }
      .inputs-demo {
        max-width: 500px;
      }
    }
  </style>
</head>
<body>
  <h1>Custom Input Element Development</h1>
  <div class="inputs-demo">
    <custom-input type="text" name="username" label="Username" placeholder="Enter username" value="johndoe" required></custom-input>
    <custom-input type="email" name="email" label="Email" placeholder="Enter email" value="john@example.com" required></custom-input>
    <currency-input name="amount" label="Amount" placeholder="0.00" value="100.50" required></currency-input>
    <custom-input type="tel" name="phone" label="Phone" placeholder="Enter phone number" value="+1 234 567 8900"></custom-input>
    <custom-input type="url" name="website" label="Website" placeholder="https://" value="https://example.com"></custom-input>
    <percentage-input name="discount" label="Discount" value="15"></percentage-input>
  </div>
  <script type="module" src="./07_5_Custom-Input-Element-Development.js"></script>
</body>
</html>
