<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance Optimized Styling</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.5;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: #222; }
    .demo-grid {
      display: grid;
      gap: 1.5rem;
      max-width: 1200px;
    }
    @media (min-width: 768px) {
      body { padding: 2rem; }
      h1 { font-size: 2rem; }
      .demo-grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
    }
    .perf-info {
      background: #fff;
      padding: 1rem;
      border-radius: 4px;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <h1>Performance Optimized Styling</h1>
  
  <div class="perf-info">
    These cards use critical CSS inlining, lazy loading, and paint optimization techniques.
  </div>
  
  <div class="demo-grid">
    <style-optimized-card optimize="true" viewport="true" priority="high">
      High Priority Card
    </style-optimized-card>
    
    <style-optimized-card optimize="true" viewport="false" priority="medium">
      Medium Priority Card
    </style-optimized-card>
    
    <style-optimized-card optimize="true" viewport="true" priority="low">
      Low Priority Card
    </style-optimized-card>
  </div>
  
  <script type="module" src="./06_5_Performance-Optimized-Styling.js"></script>
</body>
</html>
