<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation and Transition Patterns</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.5;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: #222; }
    .demo-grid {
      display: grid;
      gap: 1.5rem;
      max-width: 1200px;
    }
    @media (min-width: 768px) {
      body { padding: 2rem; }
      h1 { font-size: 2rem; }
      .demo-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    }
  </style>
</head>
<body>
  <h1>Animation and Transition Patterns</h1>
  
  <div class="demo-grid">
    <animated-card animation="fadeIn" duration="500">
      Fade In Animation
    </animated-card>
    
    <animated-card animation="slideInLeft" duration="600">
      Slide In Left
    </animated-card>
    
    <animated-card animation="slideInUp" duration="600">
      Slide In Up
    </animated-card>
    
    <animated-card animation="scaleIn" duration="500">
      Scale In Animation
    </animated-card>
    
    <animated-card animation="bounceIn" duration="800">
      Bounce In Animation
    </animated-card>
    
    <animated-card animation="flipIn" duration="700">
      Flip In Animation
    </animated-card>
  </div>
  
  <script type="module" src="./06_7_Animation-and-Transition-Patterns.js"></script>
</body>
</html>
