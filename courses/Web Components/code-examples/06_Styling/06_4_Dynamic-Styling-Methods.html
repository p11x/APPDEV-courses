<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Styling Methods</title>
  <style>
    :root {
      --demo-bg: #f8f9fa;
      --demo-text: #212529;
    }
    * {
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--demo-bg);
      color: var(--demo-text);
      margin: 0;
      padding: 1rem;
      line-height: 1.6;
    }
    @media (min-width: 768px) {
      body { padding: 2rem; }
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 1.5rem;
    }
    @media (min-width: 768px) {
      h1 { font-size: 2.25rem; }
    }
    .demo-container {
      display: grid;
      gap: 1.5rem;
      max-width: 1200px;
    }
    @media (min-width: 768px) {
      .demo-container {
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      }
    }
    .demo-section {
      background: #fff;
      border-radius: 8px;
      padding: 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .demo-section h2 {
      font-size: 1.1rem;
      margin: 0 0 1rem 0;
      color: #495057;
    }
    .demo-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    button {
      padding: 0.5rem 1rem;
      border: 1px solid #ced4da;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    button:hover {
      background: #e9ecef;
      border-color: #adb5bd;
    }
    button:active {
      background: #dee2e6;
    }
    .demo-output {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.85rem;
      background: #f1f3f4;
      padding: 0.75rem;
      border-radius: 4px;
      overflow-x: auto;
      white-space: pre-wrap;
    }
    footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #dee2e6;
      font-size: 0.85rem;
      color: #6c757d;
    }
  </style>
</head>
<body>
  <h1>Dynamic Styling Methods Demo</h1>
  
  <div class="demo-container">
    <div class="demo-section">
      <h2>Basic Dynamic Styling</h2>
      <dynamic-stylist mode="light" scale="1" debug="false"></dynamic-stylist>
    </div>
    
    <div class="demo-section">
      <h2>Dark Mode Variant</h2>
      <dynamic-stylist mode="dark" scale="1" debug="true"></dynamic-stylist>
    </div>
    
    <div class="demo-section">
      <h2>Scaled Variant (1.25x)</h2>
      <dynamic-stylist mode="light" scale="1.25" debug="false"></dynamic-stylist>
    </div>
  </div>
  
  <footer>
    <p>Interactive demonstration of runtime dynamic styling in Web Components</p>
  </footer>
  
  <script type="module" src="./06_4_Dynamic-Styling-Methods.js"></script>
</body>
</html>
