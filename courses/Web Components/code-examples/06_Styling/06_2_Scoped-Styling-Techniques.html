<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scoped Styling Techniques</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.5;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: #222; }
    .demo-grid {
      display: grid;
      gap: 1.5rem;
      max-width: 1200px;
    }
    @media (min-width: 768px) {
      body { padding: 2rem; }
      h1 { font-size: 2rem; }
      .demo-grid { grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); }
    }
  </style>
</head>
<body>
  <h1>Scoped Styling Techniques</h1>
  
  <div class="demo-grid">
    <scoped-panel variant="primary">
      <span slot="header">Primary Panel</span>
      This panel uses Shadow DOM for style isolation.
    </scoped-panel>
    
    <scoped-panel variant="success">
      <span slot="header">Success Panel</span>
      Styles are scoped and won't leak to other components.
    </scoped-panel>
    
    <scoped-panel variant="danger">
      <span slot="header">Danger Panel</span>
      Constructable Stylesheets provide dynamic styling.
    </scoped-panel>
    
    <scoped-panel variant="outline" collapsed>
      <span slot="header">Collapsed Panel</span>
      Click to expand this panel.
    </scoped-panel>
  </div>
  
  <script type="module" src="./06_2_Scoped-Styling-Techniques.js"></script>
</body>
</html>
