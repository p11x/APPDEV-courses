<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Gateway Components</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 40px;
      background: #f5f5f5;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    h1 {
      color: #333;
      margin-bottom: 30px;
    }
    
    h2 {
      color: #555;
      margin-bottom: 15px;
      font-size: 1.25rem;
    }
    
    .example-section {
      background: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .demo-label {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-weight: 600;
    }
  </style>
  
  <script type="module" src="./11_6_Payment-Gateway-Components.js"></script>
</head>
<body>
  <div class="container">
    <h1>Payment Gateway Components Demo</h1>
    
    <div class="example-section">
      <div class="demo-label">UPI Payment</div>
      <upi-payment id="demo-upi" amount="5000" merchant-id="merchant@upi" merchant-name="Demo Store"></upi-payment>
    </div>

    <div class="example-section">
      <div class="demo-label">Razorpay Checkout</div>
      <razorpay-checkout id="demo-razorpay" amount="12500" name="Demo Store" description="Test Payment"></razorpay-checkout>
    </div>

    <div class="example-section">
      <div class="demo-label">Payment Card Form</div>
      <payment-card-form></payment-card-form>
    </div>

    <div class="example-section">
      <div class="demo-label">Paytm Checkout</div>
      <paytm-checkout id="demo-paytm" amount="7500" merchant-id="DEMO123" label="Pay with Paytm"></paytm-checkout>
    </div>

    <div class="example-section">
      <div class="demo-label">Payment Summary</div>
      <payment-summary id="demo-summary" amount="10000" gst="18" shipping="0"></payment-summary>
    </div>

    <div class="example-section">
      <div class="demo-label">Saved Payment Methods</div>
      <saved-payment-methods id="demo-saved"></saved-payment-methods>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const savedMethods = document.getElementById('demo-saved');
      savedMethods.addMethod({ id: '1', name: 'Visa **** 4242', last4: '4242' });
      savedMethods.addMethod({ id: '2', name: 'Mastercard **** 5555', last4: '5555' });
      
      document.getElementById('demo-upi').addEventListener('payment-initiate', (e) => {
        console.log('UPI Payment Initiated:', e.detail);
      });
      
      document.getElementById('demo-razorpay').addEventListener('payment-success', (e) => {
        console.log('Razorpay Payment Success:', e.detail);
      });
      
      document.getElementById('demo-paytm').addEventListener('payment-initiate', (e) => {
        console.log('Paytm Payment Initiated:', e.detail);
      });
    });
  </script>
</body>
</html>
