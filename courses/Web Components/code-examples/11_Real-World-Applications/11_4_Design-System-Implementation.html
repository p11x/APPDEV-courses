<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design System Implementation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.5;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: #222; }
    .demo-section { margin-bottom: 2rem; }
    .demo-section h2 { font-size: 1.25rem; margin-bottom: 1rem; color: #444; }
    .demo-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    }
    @media (min-width: 768px) {
      body { padding: 2rem; }
      h1 { font-size: 2rem; }
      .demo-section h2 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <h1>Design System Implementation</h1>
  
  <div class="demo-section">
    <h2>Buttons</h2>
    <div class="demo-grid">
      <design-button variant="primary">Primary</design-button>
      <design-button variant="secondary">Secondary</design-button>
      <design-button variant="outline">Outline</design-button>
      <design-button variant="ghost">Ghost</design-button>
    </div>
  </div>
  
  <div class="demo-section">
    <h2>Form Elements</h2>
    <design-textfield label="Name" placeholder="Enter your name" value="John Doe"></design-textfield>
    <design-textfield label="Email" type="email" placeholder="john@example.com" value="john@example.com"></design-textfield>
  </div>
  
  <div class="demo-section">
    <h2>Cards</h2>
    <design-card>
      <span slot="title">Sample Card</span>
      This is a design system card component with consistent styling.
    </design-card>
  </div>
  
  <script type="module" src="./11_4_Design-System-Implementation.js"></script>
</body>
</html>
