<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Dashboard Components</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Poppins', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background: #f0f2f5;
      color: #212529;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem;
    }
    .page-header {
      margin-bottom: 1.5rem;
    }
    .page-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #212529;
      margin: 0 0 0.5rem;
    }
    .page-subtitle {
      color: #6c757d;
      font-size: 0.875rem;
    }
    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr;
    }
    @media (min-width: 640px) {
      .grid.grid-2 { grid-template-columns: repeat(2, 1fr); }
      .grid.grid-3 { grid-template-columns: repeat(2, 1fr); }
      .grid.grid-4 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      .grid.grid-3 { grid-template-columns: repeat(3, 1fr); }
      .grid.grid-4 { grid-template-columns: repeat(4, 1fr); }
    }
    .full-width { grid-column: 1 / -1; }
  </style>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1 class="page-title">Analytics Dashboard Components</h1>
      <p class="page-subtitle">Business analytics, charts, KPIs, and data visualization for dashboards</p>
    </header>

    <div class="grid grid-4">
      <kpi-card title="Monthly Revenue" value="2850000" previous-value="2450000" format="currency" trend="up" icon="💰" goal="3000000"></kpi-card>
      <kpi-card title="Total Orders" value="4521" previous-value="3890" format="number" trend="up" icon="🛒" goal="5000"></kpi-card>
      <kpi-card title="Conversion Rate" value="3.2" previous-value="2.8" format="percentage" trend="up" icon="📈"></kpi-card>
      <kpi-card title="Avg. Delivery Time" value="42" previous-value="48" format="time" trend="down" icon="🚚"></kpi-card>
    </div>

    <div class="grid grid-2" style="margin-top: 1rem;">
      <chart-component title="Daily Sales" type="bar"></chart-component>
      <funnel-chart></funnel-chart>
    </div>

    <div class="grid grid-2" style="margin-top: 1rem;">
      <gauge-chart value="75" max="100" label="Monthly Target"></gauge-chart>
      <predictive-analytics></predictive-analytics>
    </div>

    <div class="grid" style="margin-top: 1rem;">
      <data-table-widget title="Top Products"></data-table-widget>
    </div>

    <div class="grid grid-2" style="margin-top: 1rem;">
      <heatmap-chart></heatmap-chart>
      <anomaly-detector></anomaly-detector>
    </div>
  </div>

  <script type="module" src="./11_8_Analytics-Dashboard-Components.js"></script>
  <script>
    document.querySelector('data-table-widget').setAttribute('columns', JSON.stringify(['Product', 'Units Sold', 'Revenue', 'Growth']));
    document.querySelector('data-table-widget').setAttribute('rows', JSON.stringify([
      ['iPhone 15 Pro', '342', '₹51,26,778', { status: 'success', value: '+24%' }],
      ['MacBook Air M3', '218', '₹22,86,820', { status: 'success', value: '+18%' }],
      ['Sony WH-1000XM5', '156', '₹3,89,844', { status: 'warning', value: '+5%' }],
      ['iPad Pro 12.9"', '89', '₹10,67,110', { status: 'info', value: '+12%' }],
      ['Apple Watch Ultra 2', '67', '₹6,02,300', { status: 'success', value: '+31%' }]
    ]));
  </script>
</body>
</html>
