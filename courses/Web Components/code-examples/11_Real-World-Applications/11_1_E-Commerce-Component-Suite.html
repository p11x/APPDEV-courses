<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Component Suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Poppins', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background: #f0f2f5;
      color: #212529;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem;
    }
    .page-header {
      margin-bottom: 1.5rem;
    }
    .page-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #212529;
      margin: 0 0 0.5rem;
    }
    .page-subtitle {
      color: #6c757d;
      font-size: 0.875rem;
    }
    .grid {
      display: grid;
      gap: 1.5rem;
      grid-template-columns: 1fr;
    }
    @media (min-width: 768px) {
      .grid.grid-2 { grid-template-columns: repeat(2, 1fr); }
      .grid.grid-3 { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 1024px) {
      .grid.grid-4 { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1 class="page-title">E-Commerce Component Suite</h1>
      <p class="page-subtitle">Complete shopping cart, product display, and checkout components with Indian context (INR, UPI)</p>
    </header>

    <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">Featured Products</h2>
    <div class="grid grid-3" id="products-grid">
      <product-card></product-card>
      <product-card></product-card>
      <product-card></product-card>
    </div>

    <h2 style="font-size: 1.25rem; margin: 1.5rem 0 1rem;">Shopping Cart</h2>
    <div class="grid grid-2">
      <shopping-cart show-summary="true" id="cart"></shopping-cart>
      <checkout-component></checkout-component>
    </div>

    <h2 style="font-size: 1.25rem; margin: 1.5rem 0 1rem;">Delivery Address</h2>
    <address-form></address-form>
  </div>

  <script type="module" src="./11_1_E-Commerce-Component-Suite.js"></script>
  <script>
    const productData = [
      {
        name: 'iPhone 15 Pro',
        category: 'Electronics',
        description: 'A17 Pro chip, 48MP camera, Titanium design',
        price: 134900,
        originalPrice: 149900,
        image: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect fill="%23e3f2fd" width="200" height="200"/><text fill="%231560c0" x="100" y="110" text-anchor="middle" font-size="20">iPhone 15 Pro</text></svg>',
        rating: 4.8,
        stock: 15
      },
      {
        name: 'MacBook Air M3',
        category: 'Laptops',
        description: 'M3 chip, 8GB RAM, 256GB SSD',
        price: 89900,
        originalPrice: 104900,
        image: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect fill="%23e8f5e9" width="200" height="200"/><text fill="%232e7d32" x="100" y="110" text-anchor="middle" font-size="18">MacBook Air</text></svg>',
        rating: 4.9,
        stock: 8
      },
      {
        name: 'Sony WH-1000XM5',
        category: 'Audio',
        description: 'Industry-leading ANC, 30hr battery',
        price: 19990,
        originalPrice: 24990,
        image: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect fill="%23f3e5f5" width="200" height="200"/><text fill="%237b1fa2" x="100" y="110" text-anchor="middle" font-size="18">XM5 Headphones</text></svg>',
        rating: 4.7,
        stock: 23
      }
    ];

    document.querySelectorAll('product-card').forEach((card, i) => {
      card.setAttribute('product', JSON.stringify(productData[i]));
    });

    const cart = document.querySelector('#cart');
    cart.items = [
      { id: 1, name: 'iPhone 15 Pro', price: 134900, quantity: 1, image: productData[0].image },
      { id: 2, name: 'MacBook Air M3', price: 89900, quantity: 1, image: productData[1].image }
    ];
    cart.render();
  </script>
</body>
</html>
