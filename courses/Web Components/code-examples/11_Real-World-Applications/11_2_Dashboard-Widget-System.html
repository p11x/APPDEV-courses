<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Widget System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Poppins', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background: #f0f2f5;
      color: #212529;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem;
    }
    .page-header {
      margin-bottom: 1.5rem;
    }
    .page-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #212529;
      margin: 0 0 0.5rem;
    }
    .page-subtitle {
      color: #6c757d;
      font-size: 0.875rem;
    }
    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr;
    }
    @media (min-width: 640px) {
      .grid.grid-2 { grid-template-columns: repeat(2, 1fr); }
      .grid.grid-3 { grid-template-columns: repeat(2, 1fr); }
      .grid.grid-4 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      .grid.grid-3 { grid-template-columns: repeat(3, 1fr); }
      .grid.grid-4 { grid-template-columns: repeat(4, 1fr); }
    }
    .full-width { grid-column: 1 / -1; }
  </style>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1 class="page-title">Dashboard Widget System</h1>
      <p class="page-subtitle">Analytics dashboard widgets with charts, metrics, and data visualization</p>
    </header>

    <dashboard-grid layout="4">
      <metric-card label="Total Revenue" value="4250000" change="12.5" prefix="₹" icon="💰"></metric-card>
      <metric-card label="Orders" value="8547" change="8.2" icon="🛒"></metric-card>
      <metric-card label="Customers" value="12450" change="15.3" icon="👥"></metric-card>
      <metric-card label="Avg. Order Value" value="497" change="-2.1" prefix="₹" icon="📊"></metric-card>
    </dashboard-grid>

    <div class="grid grid-2" style="margin-top: 1rem;">
      <chart-widget title="Revenue & Orders" type="line"></chart-widget>
      <stat-trend value="₹42.5L" period="This Month" label="Monthly Revenue" icon="📈"></stat-trend>
    </div>

    <div class="grid" style="margin-top: 1rem;">
      <data-table></data-table>
    </div>
  </div>

  <script type="module" src="./11_2_Dashboard-Widget-System.js"></script>
  <script>
    document.querySelector('data-table').setAttribute('columns', JSON.stringify([
      { key: 'orderId', label: 'Order ID' },
      { key: 'customer', label: 'Customer' },
      { key: 'product', label: 'Product' },
      { key: 'amount', label: 'Amount' },
      { key: 'status', label: 'Status' },
      { key: 'date', label: 'Date' }
    ]));
    document.querySelector('data-table').setAttribute('data', JSON.stringify([
      { orderId: '#ORD-001', customer: 'Rahul Sharma', product: 'iPhone 15 Pro', amount: '₹1,49,900', status: 'completed', date: '09 Apr 2026' },
      { orderId: '#ORD-002', customer: 'Priya Patel', product: 'MacBook Air M3', amount: '₹1,04,900', status: 'processing', date: '08 Apr 2026' },
      { orderId: '#ORD-003', customer: 'Amit Kumar', product: 'Sony WH-1000XM5', amount: '₹24,990', status: 'pending', date: '08 Apr 2026' },
      { orderId: '#ORD-004', customer: 'Sneha Reddy', product: 'iPad Pro 12.9"', amount: '₹1,19,900', status: 'completed', date: '07 Apr 2026' },
      { orderId: '#ORD-005', customer: 'Vikram Singh', product: 'Apple Watch Ultra 2', amount: '₹89,900', status: 'cancelled', date: '07 Apr 2026' },
      { orderId: '#ORD-006', customer: 'Anita Desai', product: 'AirPods Pro 2', amount: '₹24,990', status: 'completed', date: '06 Apr 2026' },
      { orderId: '#ORD-007', customer: 'Raj Malhotra', product: 'Samsung S24 Ultra', amount: '₹1,29,999', status: 'processing', date: '06 Apr 2026' },
      { orderId: '#ORD-008', customer: 'Meera Nair', product: 'OnePlus 12', amount: '₹64,999', status: 'completed', date: '05 Apr 2026' }
    ]));
  </script>
</body>
</html>
