<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Todo App - Mini Web Application</title>
    <style>
        /* CSS Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .app-info {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
        }

        .app-info div {
            text-align: center;
        }

        .app-info span {
            font-size: 24px;
            font-weight: bold;
        }

        .input-section {
            padding: 25px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        #todoInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #todoInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #addBtn {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #addBtn:hover {
            background: #5568d3;
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid #e9ecef;
            transition: background 0.2s;
        }

        .todo-item:hover {
            background: #f8f9fa;
        }

        .todo-item.completed {
            background: #e8f5e9;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        .todo-checkbox {
            width: 22px;
            height: 22px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .todo-text {
            flex: 1;
            font-size: 16px;
            color: #333;
        }

        .todo-date {
            font-size: 12px;
            color: #999;
            margin-right: 15px;
        }

        .delete-btn {
            padding: 6px 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .filter-section {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: #f8f9fa;
        }

        .filter-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            background: #e9ecef;
            color: #666;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .filter-btn:hover:not(.active) {
            background: #dee2e6;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: #28a745;
        }

        .toast.error {
            background: #dc3545;
        }
    </style>
</head>
<body>
    <!-- HTML Structure -->
    <div class="container">
        <div class="header">
            <h1>📝 Todo List App</h1>
            <p>A complete JavaScript application demonstrating core concepts</p>
            <div class="app-info">
                <div>
                    <span id="totalCount">0</span>
                    <br>Total
                </div>
                <div>
                    <span id="completedCount">0</span>
                    <br>Completed
                </div>
                <div>
                    <span id="pendingCount">0</span>
                    <br>Pending
                </div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="todoInput" placeholder="Enter a new task...">
                <button id="addBtn">Add Task</button>
            </div>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul class="todo-list" id="todoList">
            <!-- Todo items will be added here dynamically -->
        </ul>
    </div>

    <div class="toast" id="toast"></div>

    <!-- JavaScript Code -->
    <script>
        // ==================== Variables and State ====================
        // Using const and let - Topic 4
        let todos = [];  // Array to store todo items - Topic 13
        let currentFilter = 'all';  // Current filter state

        // ==================== DOM Elements ====================
        // DOM Selectors - Topic 19
        const todoInput = document.getElementById('todoInput');
        const addBtn = document.getElementById('addBtn');
        const todoList = document.getElementById('todoList');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const toast = document.getElementById('toast');

        // ==================== Functions ====================
        
        // Function to show toast notifications - Topic 11
        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            
            // setTimeout - Topic 23
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Function to get current date string - Topic 17
        function getCurrentDate() {
            const date = new Date();
            return date.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Function to add a new todo - Topic 11
        function addTodo() {
            // Get input value - Topic 8
            const text = todoInput.value.trim();
            
            // Validation - Topic 9
            if (text === '') {
                showToast('Please enter a task!', 'error');
                return;
            }
            
            // Create todo object - Topic 14
            const todo = {
                id: Date.now(),  // Using timestamp as unique ID
                text: text,
                completed: false,
                createdAt: getCurrentDate()
            };
            
            // Add to array - Topic 13
            todos.push(todo);
            
            // Clear input
            todoInput.value = '';
            
            // Save to localStorage - Topic 24
            saveToLocalStorage();
            
            // Render todos
            renderTodos();
            
            // Show success message
            showToast('Task added successfully!');
        }

        // Function to toggle todo completion - Topic 20
        function toggleTodo(id) {
            // Find and toggle todo - Topic 13
            todos = todos.map(todo => {
                if (todo.id === id) {
                    return { ...todo, completed: !todo.completed };
                }
                return todo;
            });
            
            // Save and render
            saveToLocalStorage();
            renderTodos();
            
            showToast('Task updated!');
        }

        // Function to delete a todo - Topic 20
        function deleteTodo(id) {
            // Filter out the deleted todo - Topic 13
            todos = todos.filter(todo => todo.id !== id);
            
            // Save and render
            saveToLocalStorage();
            renderTodos();
            
            showToast('Task deleted!', 'error');
        }

        // Function to render todos - Topic 20
        function renderTodos() {
            // Clear current list
            todoList.innerHTML = '';
            
            // Filter todos - Topic 10
            let filteredTodos = todos;
            if (currentFilter === 'pending') {
                filteredTodos = todos.filter(todo => !todo.completed);
            } else if (currentFilter === 'completed') {
                filteredTodos = todos.filter(todo => todo.completed);
            }
            
            // Check for empty state
            if (filteredTodos.length === 0) {
                todoList.innerHTML = `
                    <li class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        <p>No tasks found. Add a new task above!</p>
                    </li>
                `;
            }
            
            // Render each todo - Topic 10 (for loop)
            for (let i = 0; i < filteredTodos.length; i++) {
                const todo = filteredTodos[i];
                
                // Create list item
                const li = document.createElement('li');
                li.className = 'todo-item' + (todo.completed ? ' completed' : '');
                
                // Set innerHTML with template literal - Topic 28
                li.innerHTML = `
                    <input type="checkbox" class="todo-checkbox" 
                           ${todo.completed ? 'checked' : ''} 
                           onchange="toggleTodo(${todo.id})">
                    <span class="todo-text">${todo.text}</span>
                    <span class="todo-date">${todo.createdAt}</span>
                    <button class="delete-btn" onclick="deleteTodo(${todo.id})">Delete</button>
                `;
                
                todoList.appendChild(li);
            }
            
            // Update counts
            updateCounts();
        }

        // Function to update task counts
        function updateCounts() {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const pending = total - completed;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('pendingCount').textContent = pending;
        }

        // Function to save to localStorage - Topic 24
        function saveToLocalStorage() {
            // JSON.stringify - Topic 25
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // Function to load from localStorage - Topic 24
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('todos');
            if (saved) {
                // JSON.parse - Topic 25
                todos = JSON.parse(saved);
            }
        }

        // Function to handle filter - Topic 9
        function setFilter(filter) {
            currentFilter = filter;
            
            // Update button styles
            filterBtns.forEach(btn => {
                if (btn.dataset.filter === filter) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            renderTodos();
        }

        // ==================== Event Listeners ====================
        
        // Add button click - Topic 21
        addBtn.addEventListener('click', addTodo);

        // Enter key to add todo - Topic 21
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTodo();
            }
        });

        // Filter buttons - Topic 21
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                setFilter(btn.dataset.filter);
            });
        });

        // ==================== Initialize App ====================
        
        // Load saved todos and render - Topic 17
        loadFromLocalStorage();
        renderTodos();

        console.log('Todo App loaded successfully!');
    </script>
</body>
</html>
