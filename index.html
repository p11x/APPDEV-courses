    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --border: #475569;
            --card-bg: #1e293b;
            --card-hover: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 50%, #1a1a2e 100%);
            padding: 3rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
        }

        .stat-item span {
            color: var(--accent);
        }

        .search-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .course-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .course-card:hover {
            background: var(--card-hover);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .course-card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .course-card .description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .course-card .meta {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .course-card .topics {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .topic-tag {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-hover);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .view-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
            transition: gap 0.3s ease;
        }

        .course-card:hover .view-btn {
            gap: 0.75rem;
        }

        .file-tree {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .tree-item {
            margin-left: 0;
        }

        .tree-folder {
            display: flex;
            align-items: center;
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s ease;
        }

        .tree-folder:hover {
            background: var(--bg-tertiary);
        }

        .tree-folder .toggle {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.5rem;
            color: var(--text-secondary);
            transition: transform 0.2s ease;
        }

        .tree-folder .toggle.expanded {
            transform: rotate(90deg);
        }

        .tree-folder .icon {
            margin-right: 0.5rem;
        }

        .tree-folder .name {
            font-weight: 500;
        }

        .tree-folder .count {
            margin-left: auto;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .tree-content {
            margin-left: 1.5rem;
            border-left: 1px solid var(--border);
            display: none;
        }

        .tree-content.expanded {
            display: block;
        }

        .tree-file {
            display: flex;
            align-items: center;
            padding: 0.4rem 0.5rem;
            border-radius: 6px;
            transition: background 0.2s ease;
            text-decoration: none;
            color: var(--text-primary);
        }

        .tree-file:hover {
            background: var(--bg-tertiary);
        }

        .tree-file .icon {
            margin-right: 0.5rem;
        }

        .tree-file .name {
            flex: 1;
        }

        .file-badge {
            font-size: 0.7rem;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            margin-left: 0.5rem;
            font-weight: 600;
        }

        .badge-py { background: #3b82f6; color: white; }
        .badge-html { background: #f97316; color: white; }
        .badge-js { background: #eab308; color: black; }
        .badge-css { background: #14b8a6; color: white; }
        .badge-md { background: #6b7280; color: white; }
        .badge-java { background: #ef4444; color: white; }
        .badge-json { background: #8b5cf6; color: white; }
        .badge-txt { background: #64748b; color: white; }

        .hidden {
            display: none !important;
        }

        .footer {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .highlight {
            background: #fbbf24;
            color: #000;
            padding: 0 2px;
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            .courses-grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 1rem;
            }
            .stats-bar {
                gap: 0.5rem;
            }
            .stat-item {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

        function getFileIcon(type) {
            const icons = {
                md: "📄",
                py: "🐍",
                html: "🌐",
                js: "⚡",
                css: "🎨",
                java: "☕",
                json: "📋",
                txt: "📝",
                folder: "📁"
            };
            return icons[type] || "📄";
        }

        function getFileBadge(type) {
            const badges = {
                py: "PY",
                html: "HTML",
                js: "JS",
                css: "CSS",
                md: "MD",
                java: "JAVA",
                json: "JSON",
                txt: "TXT"
            };
            return badges[type] ? `<span class="file-badge badge-${type}">${badges[type]}</span>` : "";
        }

        function renderCourses() {
            const grid = document.getElementById("coursesGrid");
            grid.innerHTML = coursesData.map(course => `
                <div class="course-card" data-path="${course.path}" onclick="filterByCourse('${course.path}')">
                    <h3>${course.icon} ${course.name}</h3>
                    <p class="description">${course.description}</p>
                    <div class="meta">
                        <span>📁 ${course.topics.length} modules</span>
                    </div>
                    <div class="topics">
                        ${course.topics.map(t => `<span class="topic-tag">${t}</span>`).join("")}
                    </div>
                    <span class="view-btn">View Files →</span>
                </div>
            `).join("");
        }

        function renderFileTree() {
            const tree = document.getElementById("fileTree");
            tree.innerHTML = fileTreeData.map(folder => `
                <div class="tree-item tree-folder" onclick="toggleFolder(this)">
                    <span class="toggle">▶</span>
                    <span class="icon">${folder.icon}</span>
                    <span class="name">${folder.name}</span>
                    <span class="count">${folder.files.length} items</span>
                </div>
                <div class="tree-content">
                    ${folder.files.map(file => {
                        if (file.type === "folder") {
                            return `
                                <div class="tree-item tree-folder" onclick="toggleFolder(this)">
                                    <span class="toggle">▶</span>
                                    <span class="icon">📁</span>
                                    <span class="name">${file.name}</span>
                                </div>
                                <div class="tree-content"></div>
                            `;
                        }
                        return `<a href="./${folder.name}/${file.name}" target="_blank" class="tree-file">
                            <span class="icon">${getFileIcon(file.type)}</span>
                            <span class="name">${file.name}</span>
                            ${getFileBadge(file.type)}
                        </a>`;
                    }).join("")}
                </div>
            `).join("");
        }

        function toggleFolder(element) {
            const toggle = element.querySelector(".toggle");
            const content = element.nextElementSibling;
            if (content && content.classList.contains("tree-content")) {
                toggle.classList.toggle("expanded");
                content.classList.toggle("expanded");
            }
        }

        function filterByCourse(path) {
            const searchInput = document.getElementById("searchInput");
            searchInput.value = path;
            filterAll(path);
        }

        function filterAll(query) {
            query = query.toLowerCase();
            
            document.querySelectorAll(".course-card").forEach(card => {
                const name = card.querySelector("h3").textContent.toLowerCase();
                const desc = card.querySelector(".description").textContent.toLowerCase();
                const topics = card.querySelector(".topics").textContent.toLowerCase();
                
                if (name.includes(query) || desc.includes(query) || topics.includes(query)) {
                    card.classList.remove("hidden");
                } else {
                    card.classList.add("hidden");
                }
            });

            document.querySelectorAll(".tree-item.tree-folder").forEach(folder => {
                const name = folder.querySelector(".name").textContent.toLowerCase();
                if (name.includes(query)) {
                    folder.classList.remove("hidden");
                    const content = folder.nextElementSibling;
                    if (content) content.classList.add("expanded");
                } else {
                    folder.classList.add("hidden");
                }
            });

            document.querySelectorAll(".tree-file").forEach(file => {
                const name = file.querySelector(".name").textContent.toLowerCase();
                if (name.includes(query)) {
                    file.classList.remove("hidden");
                } else {
                    file.classList.add("hidden");
                }
            });
        }

        document.getElementById("searchInput").addEventListener("input", (e) => {
            filterAll(e.target.value);
        });

        const totalCourses = coursesData.length;
        const totalFiles = 15142;
        const totalModules = 450;

        document.getElementById("totalCourses").textContent = totalCourses;
        document.getElementById("totalFiles").textContent = totalFiles;
        document.getElementById("totalModules").textContent = totalModules;
        document.getElementById("footerStats").textContent = `${totalCourses} courses | ${totalModules} modules | ${totalFiles}+ files`;

        renderCourses();
        renderFileTree();
    </script>
